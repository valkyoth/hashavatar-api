[pages.terms]
title = "Условия"
description = "Best-effort service terms для public avatar API hashavatar.app и demo website."
eyebrow = "Условия сервиса"
lead = "Этот публичный сервис предоставляется в информационных целях и на best-effort основе. Используйте его только если такой risk profile подходит вашему приложению."
no_warranty = "Без гарантий"
no_warranty_text = "Сервис и все generated outputs предоставляются as-is и as-available, без каких-либо гарантий, явных или подразумеваемых. Мы не обещаем availability, correctness, fitness for a particular purpose, uninterrupted operation или compatibility with your systems."
no_liability = "Без ответственности"
no_liability_text = "Мы не отвечаем за downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures или прямые либо косвенные damages, возникшие из-за использования сервиса."
fallback_text = "Если вы зависите от этих аватаров в production, реализуйте собственное fallback behavior, caching strategy и availability plan."
acceptable_use = "Допустимое использование"
acceptable_use_text = "Не используйте сервис для перегрузки инфраструктуры, обхода rate limits или cache controls, тестирования abusive traffic patterns или хранения illegal material через persistence features."
changes = "Изменения"
changes_text = "Мы можем изменить, ограничить, приостановить или прекратить публичный сервис в любое время и без уведомления. Public endpoints, output details или operational limits могут меняться по мере развития сервиса."
legal_note = "Эта страница — operational guidance, а не legal advice. Если нужны formal legal terms для business deployment, опубликуйте reviewed version для вашей jurisdiction и operator entity."

[pages.privacy]
title = "Конфиденциальность"
description = "Privacy notice hashavatar.app о request data, logs и optional object storage behavior."
eyebrow = "Privacy notice"
lead = "Сервис намеренно прост, но public avatar API всё равно получает некоторые request data для работы. Эта страница описывает практический baseline."
receives = "Что получает сервис"
receives_identity = "opaque identifier, который вы помещаете в request, например internal id, username или one-way hash"
receives_parameters = "request parameters вроде avatar type, style options, size, format и background"
receives_http_metadata = "standard HTTP metadata, обрабатываемые сервером, reverse proxy и CDN, например IP address, user agent, referrer и request timing"
stores = "Что хранит само приложение"
stores_text = "Приложение не требует user accounts и по умолчанию не ставит application cookies. В базовом request flow оно генерирует avatar on demand и возвращает его напрямую."
storage_text = "Если включена поддержка object storage и используется signed-link или persistence route, generated avatar file и его object key могут быть сохранены в настроенном S3-compatible bucket."
telemetry = "Privacy-preserving telemetry"
telemetry_text = "Если operator включает telemetry, приложение отправляет aggregate OpenTelemetry metrics для page views, visible page time, repository и crate clicks, demo actions и avatar generation counts, сгруппированных по ограниченным style choices вроде kind, background, accessory, color, expression, shape и size bucket."
telemetry_limits = "Telemetry не включает raw identifiers, tenant или style namespace values, IP addresses, user agents, referrers, full URLs, cookies или free-form text. Telemetry endpoints принимают только allow-listed aggregate labels."
logging = "Logs и инфраструктура"
logging_text = "В зависимости от deployment, infrastructure components вроде nginx, Caddy, Cloudflare, hosting providers или S3-compatible storage могут хранить access logs и operational metadata. Эти logs являются частью работы public service и могут содержать requested identifier, если он присутствует в URL."
avoid = "Что лучше не отправлять"
avoid_text = "Email-shaped identifiers accepted для compatibility, но URLs могут появляться в infrastructure logs. Отправляйте stable internal id или one-way application hash, если хотите избежать personal data в request URL."
repository = "Repository и crate"
repository_text = "Вы можете проверить implementation в public API repository и reusable avatar renderer в Rust crate."
