[pages.terms]
title = "Condiciones"
description = "Condiciones ministerii best-effort pro API avatarum publico hashavatar.app et situ demonstrationis."
eyebrow = "Condiciones ministerii"
lead = "Hoc ministerium publicum informativum et best-effort praebetur. Utere eo solum si haec ratio periculi applicationi tuae convenit."
no_warranty = "Nulla cautio"
no_warranty_text = "Hoc ministerium et omnes exitus generati praebentur sicut sunt et secundum disponibilitatem, sine ulla cautione, expressa vel implicita. Non promittimus disponibilitatem, rectitudinem, idoneitatem ad propositum, operationem continuam, vel convenientiam cum systematibus tuis."
no_liability = "Nulla responsabilitas"
no_liability_text = "Non respondemus pro downtime, interruptionibus, effectu deminuto, nexibus fractis, moribus cache, amissione datorum, objectis corruptis, defectibus tertiorum, aut damnis directis vel indirectis ex usu ministerii."
fallback_text = "Si his avataribus in productione inniteris, proprium fallback, consilium cache, et consilium disponibilitatis efficere debes."
acceptable_use = "Usus acceptabilis"
acceptable_use_text = "Noli ministerio uti ad infrastructuram onerandam, limites frequentiae vel cache controles circumveniendos, exemplaria traffic abusus probanda, aut materiam illegalem per ullam functionem persistentiae servandam."
changes = "Mutationes"
changes_text = "Ministerium publicum quovis tempore et sine nuntio mutare, limitare, suspendere, aut desinere possumus. Endpoints publici, singula exitus, vel limites operationales mutari possunt dum ministerium evolvitur."
legal_note = "Haec pagina est moderatio operationalis, non consilium iuridicum. Si condiciones iuridicae formales pro deployment negotiali tibi opus sunt, versionem recognitam tuae iurisdictioni et entitati operatoriae propriam publica."

[pages.privacy]
title = "Privatum"
description = "Nuntium de secreto hashavatar.app de datis petitionum, actis, et moribus optionalibus repositorii objectorum."
eyebrow = "Nuntium de secreto"
lead = "Ministerium consulto simplex est, sed API avatarum publicum quaedam data petitionis accipit ut operetur. Haec pagina basim practicam describit."
receives = "Quid ministerium accipit"
receives_identity = "identificator opacus quem in petitione ponis, sicut id internum, nomen usoris, aut hash unius viae"
receives_parameters = "parametri petitionis sicut genus avataris, optiones stili, magnitudo, forma, et fundus"
receives_http_metadata = "metadata HTTP ordinaria a servo, reverse proxy, et CDN tractata, sicut IP address, user agent, referrer, et tempus petitionis"
stores = "Quid applicatio ipsa servat"
stores_text = "Applicatio rationes usorum non requirit et per defaltam cookies applicationis non ponit. In fluxu petitionis fundamentali avatarum postulatim generat et directe reddit."
storage_text = "Si auxilium repositorii objectorum activum est et route nexus subscripti vel persistentiae adhibetur, fasciculus avataris generatus et clavis objecti eius in bucket S3-compatible configurato servari possunt."
telemetry = "Telemetry secreto favens"
telemetry_text = "Si telemetry ab operatorio activatur, applicatio metrica OpenTelemetry aggregata emittit pro page views, tempore paginae visibili, cliccis ad repositorium et crate, actionibus demo, et numeris generationis avatarum secundum electiones stili limitatas sicut kind, background, accessory, color, expression, shape, et size bucket."
telemetry_limits = "Telemetry non includit identitates crudas, valores tenant vel style namespace, IP addresses, user agents, referrers, URLs plena, cookies, aut textum liberum. Endpoints telemetry tantum labels aggregatos permissos accipiunt."
logging = "Acta et infrastructura"
logging_text = "Secundum deployment, partes infrastructurae sicut nginx, Caddy, Cloudflare, provisores hosting, vel repositorium S3-compatible access logs et metadata operationalia servare possunt. Haec acta pars operandi ministerii publici sunt et identificatorem petitum continere possunt si in URL apparet."
avoid = "Quid vitare debes mittere"
avoid_text = "Identificatores formae electronicae pro compatibilitate accipiuntur, sed URLs in actis infrastructurae apparere possunt. Mitte id internum stabile vel hash applicationis unius viae cum data personalia in URL petitionis vitare vis."
repository = "Repositorium et crate"
repository_text = "Implementationem in repositorio GitHub publico et renderatorem avatarum reutilis in Rust crate inspicere potes."
