acceptable_use = "Leistinas Naudojimas"
acceptable_use_text = "Nenaudokite paslaugos infrastructure perkrovai, rate limits ar cache controls apėjimui, abusive traffic patterns testavimui arba illegal material saugojimui per persistence features."
