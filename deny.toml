# cargo-deny dependency policy for hashavatar-api.
#
# The project itself is licensed under EUPL-1.2. This allowlist admits the
# project license and permissive dependency licenses that do not conflict with
# EUPL-1.2 distribution. More restrictive reciprocal licenses should be reviewed
# and added as crate-specific exceptions rather than allowed globally.

[graph]
all-features = true

[licenses]
confidence-threshold = 0.95
include-dev = true
include-build = true
unused-allowed-license = "allow"
unused-license-exception = "deny"

allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "EUPL-1.2",
    "ISC",
    "MIT",
    "MIT-0",
    "Unicode-3.0",
    "Zlib",
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "allow"
wildcards = "allow"
highlight = "all"

[advisories]
db-path = "/tmp/hashavatar-api-cargo-deny-advisory-dbs"
yanked = "deny"
unmaintained = "workspace"
unsound = "workspace"
unused-ignored-advisory = "deny"
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
required-git-spec = "rev"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
