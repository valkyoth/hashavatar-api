[pages.privacy]
title = "プライバシー"
description = "hashavatar.appのリクエストデータ、ログ、任意のオブジェクトストレージ動作に関するプライバシー通知。"
eyebrow = "プライバシー通知"
lead = "このサービスは意図的にシンプルですが、公開アバターAPIとして機能するために一部のリクエストデータを受け取ります。このページではその実用上の基本線を説明します。"
receives = "サービスが受け取るもの"
