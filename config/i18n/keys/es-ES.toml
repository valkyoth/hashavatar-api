[pages.help]
title = "Ayuda"
description = "Guía de integración para usar la API de avatares de hashavatar.app en aplicaciones web, frontends y backends."
eyebrow = "Guía de integración"
lead = "Usa hashavatar.app directamente desde el navegador, tu frontend o tu backend. Cada URL de avatar es determinista, así que el mismo identificador y las mismas opciones siempre producen el mismo resultado."
basic_url = "URL básica"
basic_url_text = "Usa el endpoint con query cuando quieras una URL pública de imagen sencilla."
path_style = "URL con ruta"
path_style_text = "Usa la forma con ruta si prefieres URLs de integración más limpias."
html_example = "Ejemplo HTML"
javascript_example = "Ejemplo JavaScript"
supported_parameters = "Parámetros soportados"
style_layer_note = "Las capas de accesorio y expresión se aplican a familias con estilo de personaje. Las familias de objeto como planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup y shield se normalizan a accessory=none y expression=default."
signed_storage_links = "Enlaces de almacenamiento firmados"
signed_storage_links_text = "Si este deployment tiene almacenamiento de objetos configurado, solicita un enlace de almacenamiento prefirmado desde /v1/avatar/link. Ese endpoint almacena el objeto generado y devuelve JSON con la URL firmada, la clave del objeto y una clave de caché hasheada. Las respuestas de avatar estándar no exponen metadatos de enlaces firmados en los headers."
open_source = "Open source"
open_source_text = "El código del sitio público está en el repositorio de la API y el renderer reutilizable de avatares se publica en crates.io."

[pages.docs]
title = "Documentación"
description = "Documentación de referencia para la API pública de avatares de hashavatar.app, el endpoint de enlace de almacenamiento y el contrato de identidad con namespaces."
eyebrow = "Referencia API"
lead = "Esta es la referencia orientada a producto para la API pública. La misma identidad, tenant, versión de estilo, familia de avatar, opciones de estilo, tamaño y salida WebP están pensados para permanecer estables dentro de una versión major."
core_endpoints = "Endpoints principales"
operational_endpoints = "Endpoints operativos"
operational_text = "GET /healthz es público para load balancers y comprobaciones de disponibilidad. GET /metrics está limitado a loopback y devuelve 404 para peers no locales."
namespace_support = "Soporte de namespaces"
namespace_text = "Usa tenant y style_version para mantener separados los espacios de identidad visual entre productos o fases de despliegue."
anonymous_ids = "IDs anónimos"
anonymous_text = "Envía un id interno estable o un hash unidireccional de la aplicación en lugar de datos personales sin procesar."
rate_limits = "Límites de tasa"
rate_limits_text = "El servicio público aplica límites de tasa en el origin, con límites más estrictos en /v1/avatar/link, solicitudes directas de avatar con persist=true y /og.png porque las escrituras de almacenamiento de objetos y el renderizado Open Graph son más costosos que el renderizado directo."
timeouts = "Timeouts"
timeouts_text = "La generación de avatares y las operaciones de almacenamiento están acotadas por timeouts del servidor para que las solicitudes costosas no puedan monopolizar el origin indefinidamente."
errors = "Errores"
error_bad_request = "kind inválido, algoritmo o formato no soportado, tamaño o identidad ausente"
error_timeout = "timeout de generación o almacenamiento"
error_rate_limit = "límite de tasa excedido"
error_internal = "fallo de renderizado o almacenamiento"
openapi = "OpenAPI"
openapi_text = "Para clientes generados o herramientas, usa"

[pages.terms]
title = "Términos"
description = "Términos de servicio best-effort para la API pública de avatares de hashavatar.app y el sitio de demostración."
eyebrow = "Términos del servicio"
lead = "Este servicio público se ofrece con fines informativos y best-effort. Úsalo solo si ese perfil de riesgo encaja con tu aplicación."
no_warranty = "Sin garantía"
no_warranty_text = "Este servicio y todos los resultados generados se proporcionan tal cual y según disponibilidad, sin garantías de ningún tipo, expresas o implícitas. No prometemos disponibilidad, exactitud, idoneidad para un fin concreto, funcionamiento ininterrumpido ni compatibilidad con tus sistemas."
no_liability = "Sin responsabilidad"
no_liability_text = "No somos responsables de downtime, interrupciones, rendimiento degradado, enlaces rotos, comportamiento de caché, pérdida de datos, objetos corruptos, fallos de proveedores externos ni daños directos o indirectos derivados de tu uso del servicio."
fallback_text = "Si dependes de estos avatares en producción, deberías implementar tu propio comportamiento de fallback, estrategia de caché y plan de disponibilidad."
acceptable_use = "Uso aceptable"
acceptable_use_text = "No uses el servicio para sobrecargar la infraestructura, saltarte límites de tasa o controles de caché, probar patrones de tráfico abusivos o almacenar material ilegal mediante cualquier función de persistencia."
changes = "Cambios"
changes_text = "Podemos cambiar, limitar, suspender o discontinuar el servicio público en cualquier momento y sin aviso. Los endpoints públicos, detalles de salida o límites operativos pueden cambiar a medida que el servicio evoluciona."
legal_note = "Esta página es orientación operativa, no asesoría legal. Si necesitas términos legales formales para un deployment empresarial, publica una versión revisada específica para tu jurisdicción y entidad operadora."

[pages.privacy]
title = "Privacidad"
description = "Aviso de privacidad de hashavatar.app sobre datos de solicitudes, logs y comportamiento opcional de almacenamiento de objetos."
eyebrow = "Aviso de privacidad"
lead = "El servicio es intencionalmente simple, pero una API pública de avatares aun así recibe algunos datos de solicitud para funcionar. Esta página describe esa base práctica."
receives = "Qué recibe el servicio"
receives_identity = "el identificador opaco que incluyes en la solicitud, como un id interno, nombre de usuario o hash unidireccional"
receives_parameters = "parámetros de solicitud como tipo de avatar, opciones de estilo, tamaño, formato y fondo"
receives_http_metadata = "metadatos HTTP estándar gestionados por el servidor, reverse proxy y CDN, como dirección IP, user agent, referrer y timing de solicitud"
stores = "Qué almacena la app"
stores_text = "La aplicación no requiere cuentas de usuario y no establece cookies de aplicación por defecto. En el flujo básico de solicitud genera el avatar bajo demanda y lo devuelve directamente."
storage_text = "Si el soporte de almacenamiento de objetos está activado y se usa una ruta de enlace firmado o persistencia, el archivo de avatar generado y su clave de objeto pueden almacenarse en el bucket S3-compatible configurado."
telemetry = "Telemetría respetuosa con la privacidad"
telemetry_text = "Si el operador activa la telemetría, la app emite métricas OpenTelemetry agregadas para vistas de página, tiempo visible de página, clics al repositorio y crate, acciones de demo y generaciones de avatares agrupadas por elecciones de estilo acotadas como kind, background, accessory, color, expression, shape y bucket de tamaño."
telemetry_limits = "La telemetría no incluye identificadores sin procesar, valores tenant o style namespace, direcciones IP, user agents, referrers, URLs completas, cookies ni texto libre. Los endpoints de telemetría solo aceptan labels agregados permitidos."
logging = "Logs e infraestructura"
logging_text = "Según el deployment, componentes de infraestructura como nginx, Caddy, Cloudflare, proveedores de hosting o almacenamiento S3-compatible pueden conservar access logs y metadatos operativos. Esos logs forman parte de operar un servicio público y pueden contener el identificador solicitado si aparece en la URL."
avoid = "Qué evitar enviar"
avoid_text = "Los identificadores con forma de correo se aceptan por compatibilidad, pero las URLs pueden aparecer en logs de infraestructura. Envía un id interno estable o un hash unidireccional de la aplicación cuando quieras evitar poner datos personales en la URL de solicitud."
repository = "Repositorio y crate"
repository_text = "Puedes inspeccionar la implementación en el repositorio público de la API y el renderer reutilizable de avatares en el crate Rust."
translations = "Aviso sobre traducciones"
translations_text = "Las traducciones del sitio web están asistidas por IA y son de mejor esfuerzo. Si ves una redacción que debería mejorarse, las contribuciones son bienvenidas en GitHub."
translations_link = "Mejorar traducciones"
