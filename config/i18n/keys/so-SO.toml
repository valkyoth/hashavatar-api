eyebrow = "Integration Guide"
lead = "Ka isticmaal hashavatar.app browser, frontend, ama backend si toos ah. Avatar URL kasta waa deterministic, sidaas darteed identifier iyo options isku mid ah mar kasta waxay bixiyaan output isku mid ah."
basic_url = "Basic URL"
