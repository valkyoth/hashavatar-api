[pages.privacy]
title = "פרטיות"
description = "Privacy notice עבור hashavatar.app לגבי request data, logs ו-optional object storage behavior."
eyebrow = "הודעת פרטיות"
lead = "השירות הזה בנוי בכוונה בצורה פשוטה, אבל public avatar API עדיין מקבל חלק מ-request data כדי לפעול. עמוד זה מסביר את ה-practical baseline."
receives = "מה השירות מקבל"
receives_identity = "opaque identifier שאתם מכניסים ל-request, כמו internal id, username או one-way hash"
receives_parameters = "request parameters כמו avatar type, style options, size, format ו-background"
receives_http_metadata = "standard HTTP metadata שמטופל על ידי server, reverse proxy ו-CDN, כמו IP address, user agent, referrer ו-request timing"
stores = "מה האפליקציה שומרת"
stores_text = "האפליקציה לא דורשת user accounts ולא מגדירה application cookies כברירת מחדל. ב-basic request flow, האפליקציה יוצרת avatar on demand ומחזירה אותו ישירות."
storage_text = "אם object storage support מופעל ומשתמשים ב-signed-link או persistence route, generated avatar file ו-object key עשויים להישמר ב-configured S3-compatible bucket."
telemetry = "Telemetry ששומרת על פרטיות"
telemetry_text = "אם operator מפעיל telemetry, האפליקציה שולחת aggregate OpenTelemetry metrics עבור page views, visible page time, repository ו-crate clicks, demo actions ו-avatar generation counts שמקובצים לפי bounded style choices כמו kind, background, accessory, color, expression, shape ו-size bucket."
telemetry_limits = "Telemetry אינה כוללת raw identifiers, tenant או style namespace values, IP addresses, user agents, referrers, full URLs, cookies או free-form text. Telemetry endpoints מקבלים רק allow-listed aggregate labels."
logging = "Logs ותשתית"
logging_text = "בהתאם ל-deployment, infrastructure components כמו nginx, Caddy, Cloudflare, hosting providers או S3-compatible storage עשויים לשמור access logs ו-operational metadata. Logs אלה הם חלק מהפעלת public service ועשויים לכלול את requested identifier אם הוא מופיע ב-URL."
avoid = "מה עדיף לא לשלוח"
avoid_text = "Email-shaped identifiers מתקבלים לצורך compatibility, אך URLs עשויים להופיע ב-infrastructure logs. שלחו stable internal id או one-way application hash אם ברצונכם להימנע מ-personal data ב-request URL."
repository = "Repository ו-Crate"
