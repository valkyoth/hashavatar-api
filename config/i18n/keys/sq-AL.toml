[pages.help]
title = "Ndihmë"
description = "Integration guide për përdorimin e hashavatar.app avatar API në web apps, frontends dhe backends."
eyebrow = "Integration Guide"
lead = "Përdor hashavatar.app direkt nga browser, frontend ose backend. Çdo avatar URL është deterministic, ndaj i njëjti identifier dhe options japin gjithmonë të njëjtin output."
basic_url = "Basic URL"
basic_url_text = "Përdor query endpoint kur të duhet një public image URL e thjeshtë."
path_style = "Path Style URL"
