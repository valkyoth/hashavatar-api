[pages.privacy]
title = "الخصوصية"
description = "Privacy notice لـ hashavatar.app حول request data وlogs وoptional object storage behavior."
eyebrow = "إشعار الخصوصية"
lead = "الخدمة بسيطة عمدا، لكن public avatar API يستقبل بعض request data حتى يعمل. تشرح هذه الصفحة ذلك baseline العملي."
receives = "ما تستقبله الخدمة"
receives_identity = "opaque identifier الذي تضعه في request، مثل internal id أو username أو one-way hash"
receives_parameters = "request parameters مثل avatar type وstyle options وsize وformat وbackground"
receives_http_metadata = "standard HTTP metadata التي يعالجها server وreverse proxy وCDN، مثل IP address وuser agent وreferrer وrequest timing"
stores = "ما يخزنه التطبيق نفسه"
stores_text = "لا يتطلب التطبيق user accounts ولا يضبط application cookies افتراضيا. في basic request flow يولّد الأفاتار on demand ويعيده مباشرة."
storage_text = "إذا كان object storage support مفعلا واستُخدم signed-link أو persistence route، فقد يتم تخزين generated avatar file وobject key في S3-compatible bucket المعد."
telemetry = "Telemetry يحافظ على الخصوصية"
telemetry_text = "إذا فعّل operator ميزة telemetry، يرسل التطبيق aggregate OpenTelemetry metrics عن page views وvisible page time ونقرات repository وcrate وdemo actions وavatar generation counts، مجمعة حسب bounded style choices مثل kind وbackground وaccessory وcolor وexpression وshape وsize bucket."
telemetry_limits = "لا يتضمن telemetry أي raw identifiers أو tenant أو style namespace values أو IP addresses أو user agents أو referrers أو full URLs أو cookies أو free-form text. تقبل telemetry endpoints فقط allow-listed aggregate labels."
logging = "السجلات والبنية التحتية"
logging_text = "بحسب deployment، قد تحتفظ infrastructure components مثل nginx وCaddy وCloudflare وhosting providers أو S3-compatible storage بـ access logs وoperational metadata. هذه logs جزء من تشغيل public service وقد تحتوي على requested identifier إذا ظهر في URL."
avoid = "ما ينبغي تجنب إرساله"
avoid_text = "تُقبل email-shaped identifiers لأجل compatibility، لكن URLs قد تظهر في infrastructure logs. أرسل stable internal id أو one-way application hash عندما تريد تجنب وضع personal data في request URL."
repository = "Repository وCrate"
repository_text = "يمكنك مراجعة implementation في public API repository ومحرك reusable avatar renderer في Rust crate."
translations = "ملاحظة حول الترجمات"
translations_text = "ترجمات الموقع مدعومة بالذكاء الاصطناعي وتُقدَّم بأفضل جهد ممكن. إذا وجدت صياغة يمكن تحسينها، فنرحب بالمساهمات على GitHub."
