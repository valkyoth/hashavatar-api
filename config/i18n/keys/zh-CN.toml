signed_storage_links = "签名存储链接"
signed_storage_links_text = "如果此部署配置了对象存储，可以从 /v1/avatar/link 请求预签名存储链接。该端点会存储生成的对象，并返回包含签名 URL、对象键和哈希缓存键的 JSON。标准头像响应不会在响应头中暴露签名链接元数据。"
open_source = "开源"
