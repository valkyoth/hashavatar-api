[pages.terms]
title = "Умовы"
description = "Best-effort service terms для public hashavatar.app avatar API і demo website."
eyebrow = "Умовы Сэрвісу"
lead = "Гэты public service прадастаўляецца ў інфармацыйных мэтах і на best-effort аснове. Выкарыстоўвайце яго толькі калі такі risk profile падыходзіць вашай праграме."
no_warranty = "Без Гарантыі"
no_warranty_text = "Гэты service і ўсе generated outputs прадастаўляюцца as-is і as-available, без гарантый любога віду. Мы не абяцаем availability, correctness, fitness for a particular purpose, uninterrupted operation або compatibility with your systems."
no_liability = "Без Адказнасці"
no_liability_text = "Мы не адказваем за downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures або прамыя ці ўскосныя damages ад выкарыстання service."
fallback_text = "Калі вы залежыце ад гэтых аватараў у production, трэба рэалізаваць уласныя fallback behavior, caching strategy і availability plan."
acceptable_use = "Дапушчальнае Выкарыстанне"
acceptable_use_text = "Не выкарыстоўвайце service для перагрузкі infrastructure, абыходу rate limits або cache controls, тэставання abusive traffic patterns або захоўвання illegal material праз persistence features."
changes = "Змены"
changes_text = "Мы можам змяніць, абмежаваць, прыпыніць або спыніць public service у любы час без папярэджання. Public endpoints, output details або operational limits могуць змяняцца з развіццём service."
legal_note = "Гэтая старонка — operational guidance, не legal advice. Калі патрэбныя formal legal terms для business deployment, апублікуйце reviewed version для вашай jurisdiction і operator entity."

[pages.privacy]
title = "Прыватнасць"
description = "Privacy notice для hashavatar.app пра request data, logs і optional object storage behavior."
eyebrow = "Паведамленне Аб Прыватнасці"
lead = "Service наўмысна просты, але public avatar API ўсё ж атрымлівае некаторыя request data, каб працаваць. Гэтая старонка апісвае практычны baseline."
receives = "Што Атрымлівае Service"
receives_identity = "opaque identifier, які вы кладзяце ў request, напрыклад internal id, username або one-way hash"
receives_parameters = "request parameters, такія як avatar type, style options, size, format і background"
receives_http_metadata = "standard HTTP metadata, якія апрацоўваюцца server, reverse proxy і CDN, напрыклад IP address, user agent, referrer і request timing"
stores = "Што Захоўвае Само Прыкладанне"
stores_text = "Прыкладанне не патрабуе user accounts і па змаўчанні не ставіць application cookies. У basic request flow яно генеруе avatar on demand і вяртае яго непасрэдна."
storage_text = "Калі object storage support уключаны і выкарыстоўваецца signed-link або persistence route, generated avatar file і object key могуць захоўвацца ў наладжаным S3-compatible bucket."
telemetry = "Telemetry З Павагай Да Прыватнасці"
telemetry_text = "Калі operator уключае telemetry, прыкладанне адпраўляе aggregate OpenTelemetry metrics для page views, visible page time, repository і crate clicks, demo actions і avatar generation counts, згрупаваныя па bounded style choices, такіх як kind, background, accessory, color, expression, shape і size bucket."
telemetry_limits = "Telemetry не ўключае raw identifiers, tenant або style namespace values, IP addresses, user agents, referrers, full URLs, cookies або free-form text. Telemetry endpoints прымаюць толькі allow-listed aggregate labels."
logging = "Логі І Інфраструктура"
logging_text = "У залежнасці ад deployment, infrastructure components, такія як nginx, Caddy, Cloudflare, hosting providers або S3-compatible storage, могуць захоўваць access logs і operational metadata. Гэтыя logs — частка працы public service і могуць утрымліваць requested identifier, калі ён ёсць у URL."
avoid = "Чаго Лепш Не Адпраўляць"
avoid_text = "Email-shaped identifiers прымаюцца дзеля compatibility, але URLs могуць з'яўляцца ў infrastructure logs. Адпраўляйце stable internal id або one-way application hash, калі хочаце пазбегнуць personal data ў request URL."
repository = "Repository І Crate"
repository_text = "Implementation можна паглядзець у public API repository, а reusable avatar renderer — у Rust crate."
