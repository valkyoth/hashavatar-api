[pages.help]
title = "Palīdzība"
description = "Integrācijas ceļvedis hashavatar.app avatar API izmantošanai tīmekļa lietotnēs, frontends un backends."
eyebrow = "Integrācijas Ceļvedis"
lead = "Izmantojiet hashavatar.app tieši no pārlūka, frontend vai backend. Katrs avatara URL ir deterministisks, tāpēc tas pats identifikators un opcijas vienmēr dod to pašu rezultātu."
basic_url = "Pamata URL"
basic_url_text = "Izmantojiet query endpoint, kad vajadzīgs vienkāršs publisks attēla URL."
path_style = "Path Style URL"
path_style_text = "Izmantojiet path formu, ja vēlaties tīrākus embed URL."
html_example = "HTML Piemērs"
javascript_example = "JavaScript Piemērs"
supported_parameters = "Atbalstītie Parametri"
style_layer_note = "Aksesuāru un izteiksmju slāņi tiek piemēroti character-style ģimenēm. Object-style ģimenes, piemēram, planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup un shield, tiek normalizētas uz accessory=none un expression=default."
signed_storage_links = "Parakstītas Krātuves Saites"
signed_storage_links_text = "Ja šajā deployment ir konfigurēta object storage, pieprasiet presigned storage link no /v1/avatar/link. Šis endpoint saglabā ģenerēto objektu un atgriež JSON ar signed URL, object key un hashed cache key. Standarta avatara atbildes response headers neatklāj signed-link metadata."
open_source = "Atvērtais Kods"
open_source_text = "Publiskās vietnes source atrodas GitHub repository, un reusable avatar renderer ir publicēts crates.io."

[pages.docs]
title = "Dokumentācija"
description = "Atsauces dokumentācija hashavatar.app public avatar API, storage link endpoint un namespace-aware identity contract."
eyebrow = "API Atsauce"
