anonymous_ids = "Ананімныя ID"
anonymous_text = "Адпраўляйце internal stable id або one-way application hash замест raw personal data."
rate_limits = "Rate Limits"
rate_limits_text = "Public service прымяняе origin-side rate limits, з больш строгімі limits для /v1/avatar/link, direct avatar requests з persist=true і /og.png, бо object storage writes і Open Graph image rendering даражэйшыя за direct rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar generation і storage operations абмежаваны server-side timeouts, каб дарагія запыты не маглі бясконца займаць origin."
