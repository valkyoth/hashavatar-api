[pages.privacy]
title = "Privacy"
description = "Privacy notice foar hashavatar.app oer request data, logs en optional object storage behavior."
eyebrow = "Privacyferklearring"
lead = "De service is mei opsetsin ienfâldich, mar in public avatar API krijt dochs wat request data om te wurkjen. Dizze side beskriuwt dy praktyske baseline."
receives = "Wat De Service Untfangt"
