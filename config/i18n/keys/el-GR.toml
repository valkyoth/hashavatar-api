[pages.help]
title = "Βοήθεια"
description = "Οδηγός ενσωμάτωσης για χρήση του hashavatar.app avatar API σε web apps, frontends και backends."
eyebrow = "Οδηγός Ενσωμάτωσης"
lead = "Χρησιμοποιήστε το hashavatar.app απευθείας από browser, frontend ή backend. Κάθε avatar URL είναι deterministic, άρα το ίδιο identifier και οι ίδιες επιλογές παράγουν πάντα το ίδιο αποτέλεσμα."
basic_url = "Βασικό URL"
basic_url_text = "Χρησιμοποιήστε το query endpoint όταν θέλετε ένα απλό public image URL."
path_style = "Path Style URL"
path_style_text = "Χρησιμοποιήστε την path form αν προτιμάτε πιο καθαρά embed URLs."
html_example = "Παράδειγμα HTML"
javascript_example = "Παράδειγμα JavaScript"
supported_parameters = "Υποστηριζόμενες Παράμετροι"
style_layer_note = "Τα accessory και expression layers εφαρμόζονται σε character-style families. Object-style families όπως planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup και shield κανονικοποιούνται σε accessory=none και expression=default."
signed_storage_links = "Signed Storage Links"
signed_storage_links_text = "Αν αυτό το deployment έχει object storage, ζητήστε presigned storage link από /v1/avatar/link. Αυτό το endpoint αποθηκεύει το generated object και επιστρέφει JSON με signed URL, object key και hashed cache key. Οι standard avatar responses δεν εκθέτουν signed-link metadata σε response headers."
open_source = "Open Source"
open_source_text = "Ο public site source βρίσκεται στο API repository και ο reusable avatar renderer δημοσιεύεται στο crates.io."

[pages.docs]
title = "Τεκμηρίωση"
description = "Reference documentation για το hashavatar.app public avatar API, storage link endpoint και namespace-aware identity contract."
eyebrow = "API Reference"
lead = "Αυτή είναι η product-facing reference για το public API. Το ίδιο identity, tenant, style version, avatar family, style options, size και WebP output προορίζονται να παραμένουν stable μέσα σε major release."
core_endpoints = "Core Endpoints"
operational_endpoints = "Operational Endpoints"
operational_text = "Το GET /healthz είναι public για load balancers και uptime checks. Το GET /metrics είναι loopback-only και επιστρέφει 404 σε non-local peers."
namespace_support = "Namespace Support"
namespace_text = "Χρησιμοποιήστε tenant και style_version για να κρατάτε χωριστούς χώρους οπτικής ταυτότητας μεταξύ προϊόντων ή rollout phases."
anonymous_ids = "Ανώνυμα IDs"
anonymous_text = "Στείλτε internal stable id ή one-way application hash αντί για raw personal data."
rate_limits = "Rate Limits"
rate_limits_text = "Το public service εφαρμόζει origin-side rate limits, με αυστηρότερα limits σε /v1/avatar/link, direct avatar requests με persist=true και /og.png, επειδή object storage writes και Open Graph image rendering είναι ακριβότερα από direct rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar generation και storage operations περιορίζονται από server-side timeouts ώστε ακριβά requests να μην μονοπωλούν το origin επ' αόριστον."
errors = "Σφάλματα"
error_bad_request = "invalid kind, unsupported algorithm ή format, size ή missing identity"
error_timeout = "generation ή storage timeout"
error_rate_limit = "rate limit exceeded"
error_internal = "rendering ή storage failure"
openapi = "OpenAPI"
openapi_text = "Για generated clients ή tooling, χρησιμοποιήστε"

[pages.terms]
title = "Όροι"
description = "Best-effort service terms για το public hashavatar.app avatar API και demo website."
eyebrow = "Όροι Υπηρεσίας"
lead = "Αυτό το public service παρέχεται για ενημερωτικούς σκοπούς και σε best-effort βάση. Χρησιμοποιήστε το μόνο αν αυτό το risk profile ταιριάζει στην εφαρμογή σας."
no_warranty = "Καμία Εγγύηση"
no_warranty_text = "Αυτό το service και όλα τα generated outputs παρέχονται as-is και as-available, χωρίς εγγυήσεις οποιουδήποτε είδους, ρητές ή σιωπηρές. Δεν υποσχόμαστε availability, correctness, fitness for a particular purpose, uninterrupted operation ή compatibility with your systems."
no_liability = "Καμία Ευθύνη"
no_liability_text = "Δεν ευθυνόμαστε για downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures ή οποιεσδήποτε άμεσες ή έμμεσες damages από τη χρήση της υπηρεσίας."
fallback_text = "Αν βασίζεστε σε αυτά τα avatars σε production, πρέπει να υλοποιήσετε δικό σας fallback behavior, caching strategy και availability plan."
acceptable_use = "Αποδεκτή Χρήση"
acceptable_use_text = "Μη χρησιμοποιείτε την υπηρεσία για να υπερφορτώνετε infrastructure, να παρακάμπτετε rate limits ή cache controls, να δοκιμάζετε abusive traffic patterns ή να αποθηκεύετε illegal material μέσω persistence features."
changes = "Αλλαγές"
changes_text = "Μπορούμε να αλλάξουμε, περιορίσουμε, αναστείλουμε ή διακόψουμε το public service οποιαδήποτε στιγμή και χωρίς προειδοποίηση. Public endpoints, output details ή operational limits μπορεί να αλλάξουν καθώς το service εξελίσσεται."
legal_note = "Αυτή η σελίδα είναι operational guidance, όχι legal advice. Αν χρειάζεστε formal legal terms για business deployment, δημοσιεύστε reviewed version για τη jurisdiction και operator entity σας."

[pages.privacy]
title = "Απόρρητο"
description = "Privacy notice για το hashavatar.app σχετικά με request data, logs και optional object storage behavior."
eyebrow = "Privacy Notice"
lead = "Το service είναι σκόπιμα απλό, αλλά ένα public avatar API λαμβάνει κάποια request data για να λειτουργήσει. Αυτή η σελίδα περιγράφει το πρακτικό baseline."
receives = "Τι Λαμβάνει Το Service"
receives_identity = "το opaque identifier που βάζετε στο request, όπως internal id, username ή one-way hash"
receives_parameters = "request parameters όπως avatar type, style options, size, format και background"
receives_http_metadata = "standard HTTP metadata που χειρίζονται server, reverse proxy και CDN, όπως IP address, user agent, referrer και request timing"
stores = "Τι Αποθηκεύει Η Εφαρμογή"
stores_text = "Η εφαρμογή δεν απαιτεί user accounts και δεν ορίζει application cookies από προεπιλογή. Στο basic request flow παράγει το avatar on demand και το επιστρέφει απευθείας."
storage_text = "Αν το object storage support είναι ενεργό και χρησιμοποιείται signed-link ή persistence route, το generated avatar file και το object key του μπορεί να αποθηκευτούν στο configured S3-compatible bucket."
telemetry = "Privacy-Preserving Telemetry"
telemetry_text = "Αν ο operator ενεργοποιήσει telemetry, η εφαρμογή στέλνει aggregate OpenTelemetry metrics για page views, visible page time, repository και crate clicks, demo actions και avatar generation counts ομαδοποιημένα με bounded style choices όπως kind, background, accessory, color, expression, shape και size bucket."
telemetry_limits = "Το telemetry δεν περιλαμβάνει raw identifiers, tenant ή style namespace values, IP addresses, user agents, referrers, full URLs, cookies ή free-form text. Τα telemetry endpoints δέχονται μόνο allow-listed aggregate labels."
logging = "Logs Και Υποδομή"
logging_text = "Ανάλογα με το deployment, infrastructure components όπως nginx, Caddy, Cloudflare, hosting providers ή S3-compatible storage μπορεί να κρατούν access logs και operational metadata. Αυτά τα logs είναι μέρος της λειτουργίας public service και μπορεί να περιέχουν το requested identifier αν εμφανίζεται στο URL."
avoid = "Τι Να Αποφεύγετε Να Στέλνετε"
avoid_text = "Email-shaped identifiers γίνονται δεκτά για compatibility, αλλά URLs μπορεί να εμφανίζονται σε infrastructure logs. Στείλτε stable internal id ή one-way application hash όταν θέλετε να αποφύγετε personal data στο request URL."
repository = "Repository Και Crate"
repository_text = "Μπορείτε να ελέγξετε την implementation στο public API repository και τον reusable avatar renderer στο Rust crate."
