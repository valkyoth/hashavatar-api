[pages.terms]
title = "Àwọn Òfin"
description = "Best-effort service terms fún public hashavatar.app avatar API àti demo website."
eyebrow = "Service Terms"
lead = "Public service yìí wà fún ìmọ̀ràn àti lórí best-effort basis. Lo ó nígbà tí risk profile yìí bá yẹ fún application rẹ."
no_warranty = "No Warranty"
no_warranty_text = "Service yìí àti gbogbo generated outputs wà as-is àti as-available, láìsí warranty kankan. A kò ṣe ìlérí availability, correctness, fitness for a particular purpose, uninterrupted operation, tàbí compatibility with your systems."
no_liability = "No Liability"
no_liability_text = "A kò ní liability fún downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures, tàbí direct/indirect damages láti lílo service."
fallback_text = "Bí o bá gbára lé avatars wọ̀nyí ní production, o gbọdọ̀ implement fallback behavior, caching strategy, àti availability plan tirẹ."
acceptable_use = "Acceptable Use"
acceptable_use_text = "Má lo service láti overload infrastructure, bypass rate limits tàbí cache controls, test abusive traffic patterns, tàbí store illegal material nípasẹ̀ persistence features."
changes = "Àwọn Àyípadà"
changes_text = "A lè change, limit, suspend, tàbí discontinue public service nígbàkigbà láìsí notice. Public endpoints, output details, tàbí operational limits lè yí padà bí service ṣe ń evolve."
legal_note = "Page yìí jẹ operational guidance, kì í ṣe legal advice. Bí o bá nílò formal legal terms fún business deployment, publish reviewed version tó bá jurisdiction àti operator entity rẹ mu."

[pages.privacy]
title = "Ìpamọ́"
description = "Privacy notice fún hashavatar.app nípa request data, logs, àti optional object storage behavior."
eyebrow = "Privacy Notice"
lead = "A kọ service yìí kí ó simple, ṣùgbọ́n public avatar API ṣi ń gba díẹ̀ request data láti ṣiṣẹ́. Page yìí ṣàlàyé practical baseline yẹn."
receives = "Ohun Tí Service Ń Gba"
receives_identity = "opaque identifier tí o fi sínú request, bí internal id, username, tàbí one-way hash"
receives_parameters = "request parameters bí avatar type, style options, size, format, àti background"
receives_http_metadata = "standard HTTP metadata tí server, reverse proxy, àti CDN ń handle, bí IP address, user agent, referrer, àti request timing"
stores = "Ohun Tí App Ń Store"
stores_text = "Application kò béèrè user accounts, kò sì set application cookies by default. Nínú basic request flow, app ń generate avatar on demand, ó sì ń return taara."
storage_text = "Bí object storage support bá enabled, tí signed-link tàbí persistence route bá jẹ́ lílo, generated avatar file àti object key lè store sínú configured S3-compatible bucket."
telemetry = "Privacy-Preserving Telemetry"
telemetry_text = "Bí operator bá enable telemetry, app máa emit aggregate OpenTelemetry metrics fún page views, visible page time, repository àti crate clicks, demo actions, àti avatar generation counts tí a grouped nípasẹ̀ bounded style choices bí kind, background, accessory, color, expression, shape, àti size bucket."
telemetry_limits = "Telemetry kò ní raw identifiers, tenant tàbí style namespace values, IP addresses, user agents, referrers, full URLs, cookies, tàbí free-form text. Telemetry endpoints gba allow-listed aggregate labels nìkan."
logging = "Logs àti Infrastructure"
logging_text = "Ní ibámu pẹ̀lú deployment, infrastructure components bí nginx, Caddy, Cloudflare, hosting providers, tàbí S3-compatible storage lè store access logs àti operational metadata. Logs wọ̀nyí jẹ́ apá ti fífi public service ṣiṣẹ́, wọ́n sì lè ní requested identifier tí ó bá wà nínú URL."
avoid = "Ohun Tó Dáa Kí O Má Ránṣẹ́"
avoid_text = "Email-shaped identifiers ni a gba fún compatibility, ṣùgbọ́n URLs lè hàn nínú infrastructure logs. Rán stable internal id tàbí one-way application hash bí o bá fẹ́ yàgò fún personal data nínú request URL."
repository = "Repository àti Crate"
repository_text = "O lè ṣàyẹ̀wò implementation nínú public API repository àti reusable avatar renderer nínú Rust crate."
