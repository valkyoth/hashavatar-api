[pages.help]
title = "Ajuda"
description = "Integration guide per utilitzar la hashavatar.app avatar API en web apps, frontends i backends."
eyebrow = "Integration Guide"
lead = "Utilitza hashavatar.app directament des del browser, frontend o backend. Cada avatar URL és deterministic, així que el mateix identifier i options sempre generen el mateix output."
basic_url = "Basic URL"
basic_url_text = "Utilitza el query endpoint quan necessitis un public image URL senzill."
path_style = "Path Style URL"
path_style_text = "Utilitza la path form si prefereixes embed URLs més nets."
html_example = "Exemple HTML"
javascript_example = "Exemple JavaScript"
supported_parameters = "Supported Parameters"
style_layer_note = "Les accessory i expression layers s'apliquen a les character-style families. Les Object-style families com planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup i shield es normalize a accessory=none i expression=default."
signed_storage_links = "Signed Storage Links"
signed_storage_links_text = "Si aquest deployment té object storage configurat, demana un presigned storage link a /v1/avatar/link. Aquest endpoint store el generated object i retorna JSON amb signed URL, object key i hashed cache key. Les standard avatar responses no exposen signed-link metadata als response headers."
open_source = "Open Source"
open_source_text = "El source del public site és al API repository i el reusable avatar renderer està publicat a crates.io."

[pages.docs]
title = "Documentació"
description = "Reference documentation per a la hashavatar.app public avatar API, storage link endpoint i namespace-aware identity contract."
eyebrow = "API Reference"
lead = "Aquesta és la product-facing reference per a la public API. El mateix identity, tenant, style version, avatar family, style options, size i WebP output haurien de mantenir-se stable durant una major release."
core_endpoints = "Core Endpoints"
operational_endpoints = "Operational Endpoints"
operational_text = "GET /healthz és public per a load balancers i uptime checks. GET /metrics és loopback-only i retorna 404 per a non-local peers."
namespace_support = "Namespace Support"
namespace_text = "Utilitza tenant i style_version per separar visual identity spaces entre products o rollout phases."
anonymous_ids = "Anonymous IDs"
anonymous_text = "Envia un internal stable id o one-way application hash en lloc de raw personal data."
rate_limits = "Rate Limits"
rate_limits_text = "El public service aplica origin-side rate limits, amb limits més estrictes per a /v1/avatar/link, direct avatar requests amb persist=true i /og.png perquè object storage writes i Open Graph image rendering són més costosos que direct rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar generation i storage operations estan bounded per server-side timeouts perquè expensive requests no puguin retenir l'origin sense límit."
errors = "Errors"
error_bad_request = "invalid kind, unsupported algorithm o format, size o missing identity"
error_timeout = "generation o storage timeout"
error_rate_limit = "rate limit exceeded"
error_internal = "rendering o storage failure"
openapi = "OpenAPI"
openapi_text = "Per a generated clients o tooling, utilitza"

[pages.terms]
title = "Condicions"
description = "Best-effort service terms per a la public hashavatar.app avatar API i demo website."
eyebrow = "Service Terms"
lead = "Aquest public service es proporciona per informació i sobre una best-effort basis. Utilitza'l només si aquest risk profile encaixa amb la teva application."
no_warranty = "No Warranty"
no_warranty_text = "Aquest service i tots els generated outputs es proporcionen as-is i as-available, sense cap warranty. No prometem availability, correctness, fitness for a particular purpose, uninterrupted operation ni compatibility with your systems."
no_liability = "No Liability"
no_liability_text = "No assumim responsabilitat per downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures ni direct/indirect damages derivats de l'ús del service."
fallback_text = "Si depens d'aquests avatars en production, has d'implementar el teu propi fallback behavior, caching strategy i availability plan."
acceptable_use = "Acceptable Use"
acceptable_use_text = "No utilitzis el service per overload infrastructure, bypass rate limits o cache controls, test abusive traffic patterns ni store illegal material mitjançant persistence features."
changes = "Canvis"
changes_text = "Podem change, limit, suspend o discontinue el public service en qualsevol moment sense notice. Public endpoints, output details o operational limits poden canviar a mesura que el service evolve."
legal_note = "Aquesta page és operational guidance, no legal advice. Si necessites formal legal terms per a business deployment, publish una reviewed version adequada a la teva jurisdiction i operator entity."

[pages.privacy]
title = "Privadesa"
description = "Privacy notice per a hashavatar.app sobre request data, logs i optional object storage behavior."
eyebrow = "Privacy Notice"
lead = "Aquest service està fet expressament simple, però la public avatar API encara rep alguns request data per funcionar. Aquesta page explica aquest practical baseline."
receives = "Què Rep El Service"
receives_identity = "opaque identifier que poses a la request, com internal id, username o one-way hash"
receives_parameters = "request parameters com avatar type, style options, size, format i background"
receives_http_metadata = "standard HTTP metadata gestionada pel server, reverse proxy i CDN, com IP address, user agent, referrer i request timing"
stores = "Què Store L'App"
stores_text = "L'application no requereix user accounts i no set application cookies by default. En el basic request flow, l'app generate avatar on demand i el retorna directament."
storage_text = "Si object storage support està enabled i s'utilitza signed-link o persistence route, el generated avatar file i object key es poden store en el configured S3-compatible bucket."
telemetry = "Privacy-Preserving Telemetry"
telemetry_text = "Si l'operator enable telemetry, l'app emit aggregate OpenTelemetry metrics per page views, visible page time, repository i crate clicks, demo actions i avatar generation counts grouped per bounded style choices com kind, background, accessory, color, expression, shape i size bucket."
telemetry_limits = "Telemetry no conté raw identifiers, tenant o style namespace values, IP addresses, user agents, referrers, full URLs, cookies ni free-form text. Telemetry endpoints només accepten allow-listed aggregate labels."
logging = "Logs I Infrastructure"
logging_text = "Segons el deployment, infrastructure components com nginx, Caddy, Cloudflare, hosting providers o S3-compatible storage poden store access logs i operational metadata. Aquests logs formen part de l'execució del public service i poden contenir el requested identifier si apareix a l'URL."
avoid = "Què És Millor No Enviar"
avoid_text = "Email-shaped identifiers s'accepten per compatibility, però URLs poden aparèixer en infrastructure logs. Envia un stable internal id o one-way application hash si vols evitar personal data a la request URL."
repository = "Repository I Crate"
repository_text = "Pots revisar la implementation al public API repository i el reusable avatar renderer al Rust crate."
