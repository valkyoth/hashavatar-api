receives_http_metadata = "サーバー、リバースプロキシ、CDNが扱う標準HTTPメタデータ。IPアドレス、user agent、referrer、リクエストタイミングなど"
stores = "アプリ自体が保存するもの"
stores_text = "アプリケーションはユーザーアカウントを必要とせず、デフォルトではアプリケーションCookieを設定しません。基本的なリクエストフローでは、必要に応じてアバターを生成し、そのまま返します。"
storage_text = "オブジェクトストレージ対応が有効で、署名付きリンクまたは永続化ルートが使われる場合、生成されたアバターファイルとそのオブジェクトキーが設定済みのS3互換バケットに保存されることがあります。"
