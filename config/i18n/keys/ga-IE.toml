[pages.help]
title = "Cabhair"
description = "Treoir chomhtháthaithe chun hashavatar.app avatar API a úsáid i web apps, frontends agus backends."
eyebrow = "Treoir Chomhtháthaithe"
lead = "Úsáid hashavatar.app go díreach ón mbrabhsálaí, ó do frontend nó ó do backend. Tá gach avatar URL cinntitheach, mar sin táirgeann an t-aitheantóir agus na roghanna céanna an toradh céanna i gcónaí."
basic_url = "URL Bunúsach"
basic_url_text = "Úsáid an query endpoint nuair atá image URL poiblí simplí uait."
path_style = "Path Style URL"
path_style_text = "Úsáid an fhoirm path más fearr leat embed URLs níos glaine."
html_example = "Sampla HTML"
javascript_example = "Sampla JavaScript"
supported_parameters = "Paraiméadair Tacaithe"
style_layer_note = "Baineann accessory agus expression layers le character-style families. Déantar object-style families cosúil le planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup agus shield a normalú go accessory=none agus expression=default."
signed_storage_links = "Naisc Stórála Sínithe"
signed_storage_links_text = "Má tá object storage cumraithe ag an deployment seo, iarr presigned storage link ó /v1/avatar/link. Stórálann an endpoint sin an generated object agus filleann sé JSON le signed URL, object key agus hashed cache key. Ní nochtann avatar responses caighdeánacha signed-link metadata i response headers."
open_source = "Foinse Oscailte"
open_source_text = "Tá source an tsuímh phoiblí sa API repository agus foilsítear an reusable avatar renderer ar crates.io."

[pages.docs]
title = "Doiciméadú"
description = "Reference documentation do hashavatar.app public avatar API, storage link endpoint agus namespace-aware identity contract."
eyebrow = "API Reference"
lead = "Seo an product-facing reference don public API. Tá sé i gceist go bhfanfaidh identity, tenant, style version, avatar family, style options, size agus WebP output cobhsaí laistigh de major release."
core_endpoints = "Core Endpoints"
operational_endpoints = "Operational Endpoints"
operational_text = "Tá GET /healthz poiblí do load balancers agus uptime checks. Tá GET /metrics loopback-only agus filleann sé 404 do non-local peers."
namespace_support = "Tacaíocht Namespace"
namespace_text = "Úsáid tenant agus style_version chun visual identity spaces a choinneáil scartha idir táirgí nó rollout phases."
anonymous_ids = "IDanna Anaithnide"
anonymous_text = "Seol internal stable id nó one-way application hash in ionad raw personal data."
rate_limits = "Rate Limits"
rate_limits_text = "Cuireann an public service origin-side rate limits i bhfeidhm, le teorainneacha níos déine ar /v1/avatar/link, direct avatar requests le persist=true, agus /og.png toisc go bhfuil object storage writes agus Open Graph image rendering níos costasaí ná direct rendering."
timeouts = "Timeouts"
timeouts_text = "Tá avatar generation agus storage operations teoranta le server-side timeouts ionas nach féidir le hiarratais chostasacha an origin a mhonaplú gan teorainn."
errors = "Earráidí"
