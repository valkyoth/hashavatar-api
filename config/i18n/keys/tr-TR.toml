[pages.help]
title = "Yardım"
description = "Web uygulamalarında, frontend ve backendlerde hashavatar.app avatar API'sini kullanmak için entegrasyon rehberi."
eyebrow = "Entegrasyon Rehberi"
lead = "hashavatar.app'i doğrudan tarayıcıdan, frontendinizden veya backendinizden kullanın. Her avatar URL'si deterministiktir; aynı tanımlayıcı ve seçenekler her zaman aynı sonucu üretir."
basic_url = "Temel URL"
basic_url_text = "Basit bir herkese açık image URL istediğinizde query endpoint'i kullanın."
path_style = "Path Style URL"
path_style_text = "Daha temiz embed URL'leri istiyorsanız path formunu kullanın."
html_example = "HTML Örneği"
javascript_example = "JavaScript Örneği"
supported_parameters = "Desteklenen Parametreler"
style_layer_note = "Aksesuar ve ifade katmanları karakter tarzı ailelere uygulanır. Planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup ve shield gibi object-style aileler accessory=none ve expression=default olarak normalize edilir."
signed_storage_links = "İmzalı Depolama Bağlantıları"
signed_storage_links_text = "Bu deployment'ta object storage yapılandırılmışsa /v1/avatar/link endpoint'inden presigned storage link isteyin. Bu endpoint oluşturulan nesneyi saklar ve imzalı URL, object key ve hashed cache key içeren JSON döndürür. Standart avatar yanıtları response header içinde signed-link metadata göstermez."
open_source = "Açık Kaynak"
open_source_text = "Public site source API deposunda, yeniden kullanılabilir avatar renderer ise crates.io üzerinde yayımlanır."

[pages.docs]
title = "Belgeler"
description = "hashavatar.app public avatar API, storage link endpoint ve namespace-aware identity contract için referans belgeleri."
eyebrow = "API Referansı"
lead = "Bu, public API için ürün odaklı referanstır. Aynı identity, tenant, style version, avatar family, style options, size ve WebP output değerlerinin bir major release içinde stabil kalması amaçlanır."
core_endpoints = "Ana Endpointler"
operational_endpoints = "Operasyonel Endpointler"
operational_text = "GET /healthz load balancer ve uptime checks için herkese açıktır. GET /metrics sadece loopback erişimlidir ve local olmayan peers için 404 döndürür."
namespace_support = "Namespace Desteği"
namespace_text = "Görsel kimlik alanlarını ürünler veya rollout aşamaları arasında ayırmak için tenant ve style_version kullanın."
anonymous_ids = "Anonim ID'ler"
anonymous_text = "Ham kişisel veri yerine internal stable id veya one-way application hash gönderin."
rate_limits = "Rate Limitler"
rate_limits_text = "Public service origin-side rate limits uygular; /v1/avatar/link, persist=true olan direct avatar requests ve /og.png için daha sıkı limitler vardır çünkü object storage writes ve Open Graph image rendering direct rendering'den daha pahalıdır."
timeouts = "Timeouts"
timeouts_text = "Avatar generation ve storage operations server-side timeouts ile sınırlandırılır, böylece pahalı istekler origin'i süresiz meşgul edemez."
errors = "Hatalar"
error_bad_request = "geçersiz kind, desteklenmeyen algorithm veya format, size ya da eksik identity"
error_timeout = "generation veya storage timeout"
error_rate_limit = "rate limit aşıldı"
error_internal = "rendering veya storage failure"
openapi = "OpenAPI"
openapi_text = "Generated clients veya tooling için kullanın"

[pages.terms]
title = "Şartlar"
description = "hashavatar.app public avatar API ve demo website için best-effort service terms."
eyebrow = "Servis Şartları"
lead = "Bu public service bilgi amaçlı ve best-effort esasına göre sunulur. Bu risk profili uygulamanıza uygunsa kullanın."
no_warranty = "Garanti Yok"
no_warranty_text = "Bu servis ve tüm generated outputs as-is ve as-available sunulur; açık veya zımni hiçbir garanti verilmez. Availability, correctness, fitness for a particular purpose, uninterrupted operation veya sistemlerinizle compatibility sözü vermiyoruz."
no_liability = "Sorumluluk Yok"
no_liability_text = "Servisi kullanımınızdan doğan downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures veya doğrudan ya da dolaylı damages için sorumlu değiliz."
fallback_text = "Bu avatarlara production'da bağlıysanız kendi fallback behavior, caching strategy ve availability planınızı uygulamalısınız."
acceptable_use = "Kabul Edilebilir Kullanım"
acceptable_use_text = "Servisi infrastructure'ı aşırı yüklemek, rate limits veya cache controls atlatmak, abusive traffic patterns test etmek ya da persistence features üzerinden illegal material saklamak için kullanmayın."
changes = "Değişiklikler"
changes_text = "Public service'i herhangi bir zamanda ve bildirim yapmadan değiştirebilir, sınırlayabilir, askıya alabilir veya sonlandırabiliriz. Service geliştikçe public endpoints, output details veya operational limits değişebilir."
legal_note = "Bu sayfa operational guidance'tır, legal advice değildir. Business deployment için formal legal terms gerekiyorsa jurisdiction ve operator entity'nize özel reviewed version yayımlamalısınız."

[pages.privacy]
title = "Gizlilik"
description = "hashavatar.app için request data, logs ve optional object storage behavior hakkında privacy notice."
eyebrow = "Gizlilik Bildirimi"
lead = "Servis bilinçli olarak basittir, ancak public avatar API çalışmak için bazı request data alır. Bu sayfa pratik baseline'ı açıklar."
receives = "Servisin Aldıkları"
receives_identity = "request içine koyduğunuz opaque identifier, örneğin internal id, username veya one-way hash"
receives_parameters = "avatar type, style options, size, format ve background gibi request parameters"
receives_http_metadata = "server, reverse proxy ve CDN tarafından işlenen standard HTTP metadata, örneğin IP address, user agent, referrer ve request timing"
stores = "Uygulamanın Sakladıkları"
stores_text = "Uygulama user accounts gerektirmez ve varsayılan olarak application cookies ayarlamaz. Basic request flow içinde avatarı on demand üretir ve doğrudan döndürür."
storage_text = "Object storage support etkinse ve signed-link veya persistence route kullanılıyorsa generated avatar file ve object key yapılandırılmış S3-compatible bucket içinde saklanabilir."
telemetry = "Gizliliği Koruyan Telemetri"
telemetry_text = "Operator telemetry'yi etkinleştirirse uygulama page views, visible page time, repository ve crate clicks, demo actions ve kind, background, accessory, color, expression, shape ve size bucket gibi bounded style choices ile gruplanmış avatar generation counts için aggregate OpenTelemetry metrics gönderir."
telemetry_limits = "Telemetry raw identifiers, tenant veya style namespace values, IP addresses, user agents, referrers, full URLs, cookies veya free-form text içermez. Telemetry endpoints yalnızca allow-listed aggregate labels kabul eder."
logging = "Loglar ve Altyapı"
logging_text = "Deployment'a bağlı olarak nginx, Caddy, Cloudflare, hosting providers veya S3-compatible storage gibi infrastructure components access logs ve operational metadata tutabilir. Bu logs public service işletmenin parçasıdır ve URL'de görünüyorsa requested identifier içerebilir."
avoid = "Göndermekten Kaçının"
avoid_text = "Email-shaped identifiers compatibility için kabul edilir, ancak URLs infrastructure logs içinde görünebilir. Request URL içine personal data koymaktan kaçınmak istiyorsanız stable internal id veya one-way application hash gönderin."
repository = "Depo ve Crate"
repository_text = "Implementation'ı public API repository içinde, reusable avatar renderer'ı Rust crate içinde inceleyebilirsiniz."
