[pages.help]
title = "Hulp"
description = "Integratiegids voor het gebruik van de hashavatar.app-avatar-API in webapps, frontends en backends."
eyebrow = "Integratiegids"
lead = "Gebruik hashavatar.app direct vanuit de browser, je frontend of je backend. Elke avatar-URL is deterministisch, dus dezelfde identifier en opties leveren altijd hetzelfde resultaat op."
basic_url = "Basis-URL"
basic_url_text = "Gebruik het query-endpoint wanneer je een eenvoudige openbare afbeeldings-URL wilt."
path_style = "Pad-URL"
path_style_text = "Gebruik de padvorm als je schonere embed-URL's wilt."
html_example = "HTML-voorbeeld"
javascript_example = "JavaScript-voorbeeld"
supported_parameters = "Ondersteunde parameters"
style_layer_note = "Accessoire- en expressielagen gelden voor karakterachtige families. Objectfamilies zoals planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup en shield worden genormaliseerd naar accessory=none en expression=default."
signed_storage_links = "Ondertekende opslaglinks"
signed_storage_links_text = "Als deze deployment objectopslag heeft geconfigureerd, vraag dan een vooraf ondertekende opslaglink aan via /v1/avatar/link. Dat endpoint slaat het gegenereerde object op en retourneert JSON met de ondertekende URL, object key en een gehashte cache key. Standaard avatar-antwoorden geven geen metadata voor ondertekende links in responseheaders vrij."
open_source = "Open source"
open_source_text = "De broncode van de openbare site staat in de GitHub-repository en de herbruikbare avatar-renderer wordt gepubliceerd op crates.io."

[pages.docs]
title = "Documentatie"
description = "Referentiedocumentatie voor de openbare hashavatar.app-avatar-API, het opslaglink-endpoint en het namespace-bewuste identiteitscontract."
eyebrow = "API-referentie"
lead = "Dit is de productgerichte referentie voor de openbare API. Dezelfde identiteit, tenant, stijlversie, avatarfamilie, stijlopties, grootte en WebP-output zijn bedoeld om binnen een major-versie stabiel te blijven."
core_endpoints = "Kern-endpoints"
operational_endpoints = "Operationele endpoints"
operational_text = "GET /healthz is openbaar voor load balancers en uptimecontroles. GET /metrics is alleen via loopback beschikbaar en retourneert 404 voor niet-lokale peers."
namespace_support = "Namespace-ondersteuning"
namespace_text = "Gebruik tenant en style_version om visuele identiteitsruimtes gescheiden te houden tussen producten of uitrolfases."
anonymous_ids = "Anonieme ID's"
anonymous_text = "Stuur een stabiele interne id of een eenrichtingshash van de applicatie in plaats van ruwe persoonsgegevens."
rate_limits = "Rate limits"
rate_limits_text = "De openbare dienst past origin-side rate limits toe, met strengere limieten op /v1/avatar/link, directe avatarverzoeken met persist=true en /og.png omdat objectopslagschrijfacties en Open Graph-rendering duurder zijn dan directe rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar-generatie en opslagoperaties zijn begrensd door server-side timeouts zodat dure verzoeken de origin niet onbeperkt kunnen monopoliseren."
errors = "Fouten"
error_bad_request = "ongeldige kind-waarde, niet-ondersteund algoritme of formaat, grootte of ontbrekende identiteit"
error_timeout = "timeout bij generatie of opslag"
error_rate_limit = "rate limit overschreden"
error_internal = "rendering- of opslagfout"
openapi = "OpenAPI"
openapi_text = "Gebruik voor gegenereerde clients of tooling"

[pages.terms]
title = "Voorwaarden"
description = "Best-effort-servicevoorwaarden voor de openbare hashavatar.app-avatar-API en demosite."
eyebrow = "Servicevoorwaarden"
lead = "Deze openbare dienst wordt informatief en volgens best effort geleverd. Gebruik hem alleen als dat risicoprofiel past bij je applicatie."
no_warranty = "Geen garantie"
no_warranty_text = "Deze dienst en alle gegenereerde resultaten worden geleverd zoals ze zijn en naar beschikbaarheid, zonder enige vorm van garantie, expliciet of impliciet. Wij beloven geen beschikbaarheid, juistheid, geschiktheid voor een bepaald doel, ononderbroken werking of compatibiliteit met je systemen."
no_liability = "Geen aansprakelijkheid"
no_liability_text = "Wij zijn niet verantwoordelijk voor downtime, storingen, verminderde prestaties, kapotte links, cachegedrag, gegevensverlies, beschadigde objecten, fouten van externe providers of directe of indirecte schade die voortkomt uit je gebruik van de dienst."
fallback_text = "Als je in productie afhankelijk bent van deze avatars, moet je eigen fallback-gedrag, een cachestrategie en een beschikbaarheidsplan implementeren."
acceptable_use = "Acceptabel gebruik"
acceptable_use_text = "Gebruik de dienst niet om infrastructuur te overbelasten, rate limits of cachecontroles te omzeilen, misbruikende verkeerspatronen te testen of illegaal materiaal via een persistentiefunctie op te slaan."
changes = "Wijzigingen"
changes_text = "Wij kunnen de openbare dienst op elk moment en zonder kennisgeving wijzigen, beperken, opschorten of stopzetten. Openbare endpoints, outputdetails of operationele limieten kunnen veranderen naarmate de dienst evolueert."
legal_note = "Deze pagina is operationele begeleiding, geen juridisch advies. Als je formele juridische voorwaarden nodig hebt voor een zakelijke deployment, publiceer dan een beoordeelde versie die specifiek is voor je jurisdictie en operator-entiteit."

[pages.privacy]
title = "Privacy"
description = "Privacyverklaring voor hashavatar.app over requestdata, logs en optioneel objectopslaggedrag."
eyebrow = "Privacyverklaring"
lead = "De dienst is bewust eenvoudig, maar een openbare avatar-API ontvangt nog steeds bepaalde requestdata om te kunnen functioneren. Deze pagina beschrijft die praktische basis."
receives = "Wat de dienst ontvangt"
receives_identity = "de ondoorzichtige identifier die je in het verzoek plaatst, zoals een interne id, gebruikersnaam of eenrichtingshash"
receives_parameters = "requestparameters zoals avatartype, stijlopties, grootte, formaat en achtergrond"
receives_http_metadata = "standaard HTTP-metadata die door de server, reverse proxy en CDN wordt verwerkt, zoals IP-adres, user agent, referrer en requesttiming"
stores = "Wat de app zelf opslaat"
stores_text = "De applicatie vereist geen gebruikersaccounts en zet standaard geen applicatiecookies. In de basisrequestflow genereert zij de avatar op aanvraag en retourneert die direct."
storage_text = "Als objectopslag is ingeschakeld en een ondertekende-link- of persistentieroute wordt gebruikt, kunnen het gegenereerde avatarbestand en de object key worden opgeslagen in de geconfigureerde S3-compatibele bucket."
telemetry = "Privacyvriendelijke telemetrie"
telemetry_text = "Als telemetrie door de operator is ingeschakeld, verzendt de app geaggregeerde OpenTelemetry-metrics voor pageviews, zichtbare paginatijd, klikken naar repository en crate, demoacties en avatar-generaties gegroepeerd op begrensde stijlkeuzes zoals kind, background, accessory, color, expression, shape en groottebucket."
telemetry_limits = "Telemetrie bevat geen ruwe identifiers, tenant- of style namespace-waarden, IP-adressen, user agents, referrers, volledige URL's, cookies of vrije tekst. De telemetry-endpoints accepteren alleen toegestane geaggregeerde labels."
logging = "Logs en infrastructuur"
logging_text = "Afhankelijk van de deployment kunnen infrastructuurcomponenten zoals nginx, Caddy, Cloudflare, hostingproviders of S3-compatibele opslag access logs en operationele metadata bewaren. Die logs horen bij het draaien van een openbare dienst en kunnen de identifier bevatten die je hebt aangevraagd als die in de URL staat."
avoid = "Wat je beter niet verstuurt"
avoid_text = "E-mailachtige identifiers worden voor compatibiliteit geaccepteerd, maar URL's kunnen in infrastructuurlogs verschijnen. Stuur een stabiele interne id of een eenrichtingshash van de applicatie wanneer je wilt vermijden dat persoonsgegevens in de request-URL staan."
repository = "Repository en crate"
repository_text = "Je kunt de implementatie bekijken in de openbare GitHub-repository en de herbruikbare avatar-renderer in de Rust-crate."
translations = "Vertaalnotitie"
translations_text = "De vertalingen van de website zijn AI-ondersteund en naar beste vermogen gemaakt. Als je tekst ziet die beter kan, zijn bijdragen welkom op GitHub."
