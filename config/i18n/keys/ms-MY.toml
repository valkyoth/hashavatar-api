[pages.help]
title = "Bantuan"
description = "Panduan integrasi untuk menggunakan hashavatar.app avatar API dalam web apps, frontends, dan backends."
eyebrow = "Panduan Integrasi"
lead = "Gunakan hashavatar.app terus daripada browser, frontend, atau backend anda. Setiap avatar URL deterministik, jadi identifier dan pilihan yang sama sentiasa menghasilkan output yang sama."
basic_url = "URL Asas"
basic_url_text = "Gunakan query endpoint apabila anda perlukan image URL awam yang ringkas."
path_style = "Path Style URL"
path_style_text = "Gunakan bentuk path jika anda lebih suka embed URLs yang lebih bersih."
html_example = "Contoh HTML"
javascript_example = "Contoh JavaScript"
supported_parameters = "Parameter Disokong"
style_layer_note = "Accessory dan expression layers digunakan untuk character-style families. Object-style families seperti planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup, dan shield dinormalisasi kepada accessory=none dan expression=default."
signed_storage_links = "Pautan Storan Bertandatangan"
signed_storage_links_text = "Jika deployment ini mempunyai object storage yang dikonfigurasi, minta presigned storage link daripada /v1/avatar/link. Endpoint itu menyimpan generated object dan mengembalikan JSON dengan signed URL, object key, dan hashed cache key. Avatar responses biasa tidak mendedahkan signed-link metadata dalam response headers."
open_source = "Open Source"
open_source_text = "Source laman awam berada dalam API repository dan reusable avatar renderer diterbitkan di crates.io."

[pages.docs]
title = "Dokumentasi"
description = "Reference documentation untuk hashavatar.app public avatar API, storage link endpoint, dan namespace-aware identity contract."
eyebrow = "API Reference"
lead = "Ini ialah product-facing reference untuk public API. Identity, tenant, style version, avatar family, style options, size, dan WebP output yang sama dijangka kekal stabil sepanjang major release."
core_endpoints = "Core Endpoints"
operational_endpoints = "Operational Endpoints"
operational_text = "GET /healthz adalah public untuk load balancers dan uptime checks. GET /metrics adalah loopback-only dan mengembalikan 404 untuk non-local peers."
namespace_support = "Sokongan Namespace"
namespace_text = "Gunakan tenant dan style_version untuk memisahkan visual identity spaces antara produk atau rollout phases."
anonymous_ids = "ID Tanpa Nama"
anonymous_text = "Hantar internal stable id atau one-way application hash dan bukannya raw personal data."
rate_limits = "Rate Limits"
rate_limits_text = "Public service menguatkuasakan origin-side rate limits, dengan limit lebih ketat untuk /v1/avatar/link, direct avatar requests dengan persist=true, dan /og.png kerana object storage writes dan Open Graph image rendering lebih mahal berbanding direct rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar generation dan storage operations dihadkan oleh server-side timeouts supaya request mahal tidak boleh menguasai origin tanpa had."
errors = "Errors"
error_bad_request = "kind tidak sah, unsupported algorithm atau format, size, atau missing identity"
error_timeout = "generation atau storage timeout"
error_rate_limit = "rate limit exceeded"
error_internal = "rendering atau storage failure"
openapi = "OpenAPI"
openapi_text = "Untuk generated clients atau tooling, gunakan"

[pages.terms]
title = "Terma"
description = "Best-effort service terms untuk public hashavatar.app avatar API dan demo website."
eyebrow = "Terma Perkhidmatan"
lead = "Public service ini disediakan untuk maklumat dan atas dasar best-effort. Gunakan hanya jika risk profile ini sesuai untuk aplikasi anda."
no_warranty = "Tiada Waranti"
no_warranty_text = "Service ini dan semua generated outputs disediakan as-is dan as-available, tanpa sebarang warranty. Kami tidak menjanjikan availability, correctness, fitness for a particular purpose, uninterrupted operation, atau compatibility with your systems."
no_liability = "Tiada Liabiliti"
no_liability_text = "Kami tidak bertanggungjawab atas downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures, atau direct/indirect damages daripada penggunaan service."
fallback_text = "Jika anda bergantung pada avatars ini dalam production, anda perlu melaksanakan fallback behavior, caching strategy, dan availability plan sendiri."
acceptable_use = "Penggunaan Diterima"
acceptable_use_text = "Jangan gunakan service untuk membebankan infrastructure, memintas rate limits atau cache controls, menguji abusive traffic patterns, atau menyimpan illegal material melalui persistence features."
changes = "Perubahan"
changes_text = "Kami boleh mengubah, mengehadkan, menggantung, atau menamatkan public service pada bila-bila masa tanpa notis. Public endpoints, output details, atau operational limits boleh berubah semasa service berkembang."
legal_note = "Halaman ini ialah operational guidance, bukan legal advice. Jika anda perlukan formal legal terms untuk business deployment, terbitkan reviewed version yang sesuai dengan jurisdiction dan operator entity anda."

[pages.privacy]
title = "Privasi"
description = "Privacy notice untuk hashavatar.app tentang request data, logs, dan optional object storage behavior."
eyebrow = "Notis Privasi"
lead = "Service ini sengaja dibuat ringkas, tetapi public avatar API masih menerima beberapa request data untuk berfungsi. Halaman ini menerangkan practical baseline tersebut."
receives = "Apa Yang Service Terima"
receives_identity = "opaque identifier yang anda masukkan dalam request, seperti internal id, username, atau one-way hash"
receives_parameters = "request parameters seperti avatar type, style options, size, format, dan background"
receives_http_metadata = "standard HTTP metadata yang dikendalikan oleh server, reverse proxy, dan CDN, seperti IP address, user agent, referrer, dan request timing"
stores = "Apa Yang App Simpan"
stores_text = "Application tidak memerlukan user accounts dan tidak menetapkan application cookies secara default. Dalam basic request flow, app menjana avatar on demand dan mengembalikannya terus."
storage_text = "Jika object storage support diaktifkan dan signed-link atau persistence route digunakan, generated avatar file dan object key boleh disimpan dalam configured S3-compatible bucket."
telemetry = "Telemetry Yang Menjaga Privasi"
telemetry_text = "Jika operator mengaktifkan telemetry, app menghantar aggregate OpenTelemetry metrics untuk page views, visible page time, repository dan crate clicks, demo actions, dan avatar generation counts yang dikelompokkan mengikut bounded style choices seperti kind, background, accessory, color, expression, shape, dan size bucket."
telemetry_limits = "Telemetry tidak mengandungi raw identifiers, tenant atau style namespace values, IP addresses, user agents, referrers, full URLs, cookies, atau free-form text. Telemetry endpoints hanya menerima allow-listed aggregate labels."
logging = "Logs Dan Infrastruktur"
logging_text = "Bergantung pada deployment, infrastructure components seperti nginx, Caddy, Cloudflare, hosting providers, atau S3-compatible storage boleh menyimpan access logs dan operational metadata. Logs ini sebahagian daripada menjalankan public service dan boleh mengandungi requested identifier jika ia kelihatan dalam URL."
avoid = "Apa Yang Elok Tidak Dihantar"
avoid_text = "Email-shaped identifiers diterima untuk compatibility, tetapi URLs boleh muncul dalam infrastructure logs. Hantar stable internal id atau one-way application hash jika anda mahu mengelakkan personal data dalam request URL."
repository = "Repository Dan Crate"
repository_text = "Anda boleh menyemak implementation dalam public API repository dan reusable avatar renderer dalam Rust crate."
translations = "Nota Terjemahan"
translations_text = "Terjemahan laman web dibantu AI dan dibuat dengan usaha terbaik. Jika anda melihat ayat yang patut diperbaiki, sumbangan di GitHub amat dialu-alukan."
translations_link = "Baiki terjemahan"
