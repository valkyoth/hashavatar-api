[pages.help]
title = "Pomoč"
description = "Vodnik za integracijo hashavatar.app avatar API v web apps, frontends in backends."
eyebrow = "Vodnik Za Integracijo"
lead = "Uporabite hashavatar.app neposredno iz brskalnika, svojega frontenda ali backenda. Vsak avatar URL je determinističen, zato isti identifikator in možnosti vedno ustvarijo isti rezultat."
basic_url = "Osnovni URL"
basic_url_text = "Uporabite query endpoint, ko želite preprost javni image URL."
path_style = "Path Style URL"
path_style_text = "Uporabite path obliko, če imate raje čistejše embed URL-je."
html_example = "HTML Primer"
javascript_example = "JavaScript Primer"
supported_parameters = "Podprti Parametri"
style_layer_note = "Accessory in expression layers veljajo za character-style families. Object-style families, kot so planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup in shield, se normalizirajo na accessory=none in expression=default."
signed_storage_links = "Podpisane Povezave Za Shranjevanje"
signed_storage_links_text = "Če ima ta deployment konfiguriran object storage, zahtevajte presigned storage link iz /v1/avatar/link. Ta endpoint shrani generated object in vrne JSON s signed URL, object key in hashed cache key. Standardni avatar responses ne razkrivajo signed-link metadata v response headers."
open_source = "Open Source"
open_source_text = "Vir javnega mesta je v GitHub repository, reusable avatar renderer pa je objavljen na crates.io."

[pages.docs]
title = "Dokumentacija"
description = "Reference documentation za hashavatar.app public avatar API, storage link endpoint in namespace-aware identity contract."
eyebrow = "API Reference"
lead = "To je product-facing reference za public API. Isti identity, tenant, style version, avatar family, style options, size in WebP output naj ostanejo stabilni znotraj major release."
core_endpoints = "Core Endpoints"
operational_endpoints = "Operativni Endpointi"
operational_text = "GET /healthz je public za load balancers in uptime checks. GET /metrics je loopback-only in vrne 404 za non-local peers."
namespace_support = "Namespace Podpora"
namespace_text = "Uporabite tenant in style_version za ločevanje visual identity spaces med produkti ali rollout phases."
anonymous_ids = "Anonimni ID-ji"
anonymous_text = "Namesto raw personal data pošljite internal stable id ali one-way application hash."
rate_limits = "Rate Limits"
rate_limits_text = "Public service uporablja origin-side rate limits, s strožjimi omejitvami za /v1/avatar/link, direct avatar requests s persist=true in /og.png, ker so object storage writes in Open Graph image rendering dražji kot direct rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar generation in storage operations so omejeni s server-side timeouts, da drage zahteve ne morejo neomejeno monopolizirati origin."
