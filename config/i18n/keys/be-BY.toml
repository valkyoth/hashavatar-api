[pages.help]
title = "Дапамога"
description = "Кіраўніцтва па інтэграцыі hashavatar.app avatar API у web apps, frontends і backends."
eyebrow = "Кіраўніцтва Па Інтэграцыі"
lead = "Выкарыстоўвайце hashavatar.app непасрэдна з браузера, frontend або backend. Кожны avatar URL дэтэрмінаваны, таму той самы ідэнтыфікатар і опцыі заўсёды даюць той самы вынік."
basic_url = "Базавы URL"
basic_url_text = "Выкарыстоўвайце query endpoint, калі патрэбны просты публічны image URL."
path_style = "Path Style URL"
path_style_text = "Выкарыстоўвайце path форму, калі хочаце чысцейшыя embed URL."
html_example = "HTML Прыклад"
javascript_example = "JavaScript Прыклад"
supported_parameters = "Падтрыманыя Параметры"
style_layer_note = "Accessory і expression layers прымяняюцца да character-style families. Object-style families, такія як planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup і shield, нармалізуюцца да accessory=none і expression=default."
signed_storage_links = "Падпісаныя Storage Спасылкі"
signed_storage_links_text = "Калі гэты deployment мае object storage, запытайце presigned storage link з /v1/avatar/link. Гэты endpoint захоўвае generated object і вяртае JSON з signed URL, object key і hashed cache key. Стандартныя avatar responses не раскрываюць signed-link metadata ў response headers."
open_source = "Адкрыты Код"
open_source_text = "Public site source знаходзіцца ў API repository, а reusable avatar renderer апублікаваны на crates.io."

