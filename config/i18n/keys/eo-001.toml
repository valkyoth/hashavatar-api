[pages.terms]
title = "Kondiĉoj"
description = "Best-effort servokondiĉoj por la publika avatara API de hashavatar.app kaj la demonstra retejo."
eyebrow = "Servokondiĉoj"
lead = "Ĉi tiu publika servo estas provizata informcele kaj laŭ best-effort. Uzu ĝin nur se tiu riska profilo taŭgas por via aplikaĵo."
no_warranty = "Neniu garantio"
no_warranty_text = "Ĉi tiu servo kaj ĉiuj generitaj eligoj estas provizataj kiel ili estas kaj laŭ disponeblo, sen ajna speco de garantio, ĉu eksplicita ĉu implicita. Ni ne promesas disponeblon, ĝustecon, taŭgecon por aparta celo, seninterrompan funkciadon aŭ kongruon kun viaj sistemoj."
no_liability = "Neniu respondeco"
no_liability_text = "Ni ne respondecas pri downtime, interrompoj, degradita rendimento, rompitaj ligiloj, kaŝmemora konduto, datumperdo, koruptitaj objektoj, triaj provizantaj fiaskoj aŭ rektaj aŭ nerektaj damaĝoj pro via uzo de la servo."
fallback_text = "Se vi dependas de ĉi tiuj avataroj en production, vi devus efektivigi propran fallback-konduton, kaŝmemoran strategion kaj disponeblan planon."
acceptable_use = "Akceptebla uzo"
acceptable_use_text = "Ne uzu la servon por troŝarĝi infrastrukturon, preteriri rapidlimojn aŭ kaŝmemorajn kontrolojn, testi misuzajn trafikajn ŝablonojn aŭ stoki kontraŭleĝan materialon per iu persista funkcio."
changes = "Ŝanĝoj"
changes_text = "Ni povas ŝanĝi, limigi, suspendi aŭ ĉesigi la publikan servon iam ajn kaj sen avizo. Publikaj endpoints, eligaj detaloj aŭ operaciaj limoj povas ŝanĝiĝi dum la servo evoluas."
legal_note = "Ĉi tiu paĝo estas operacia gvidado, ne jura konsilo. Se vi bezonas formalajn jurajn kondiĉojn por komerca deployment, publikigu reviziitan version specifan al via jurisdikcio kaj operacia ento."

[pages.privacy]
title = "Privateco"
description = "Privateca avizo por hashavatar.app pri petaj datumoj, protokoloj kaj nedeviga objekt-stoka konduto."
eyebrow = "Privateca avizo"
lead = "La servo estas intence simpla, sed publika avatara API ankoraŭ ricevas kelkajn petajn datumojn por funkcii. Ĉi tiu paĝo priskribas tiun praktikan bazlinion."
receives = "Kion la servo ricevas"
receives_identity = "la opaka identigilo, kiun vi metas en la peton, kiel interna id, uzantnomo aŭ unudirekta haŝo"
receives_parameters = "petaj parametroj kiel avatara tipo, stilopcioj, grandeco, formato kaj fono"
receives_http_metadata = "norma HTTP-metadata traktata de la servilo, reverse proxy kaj CDN, kiel IP-adreso, user agent, referrer kaj peta tempigo"
stores = "Kion la aplikaĵo mem stokas"
stores_text = "La aplikaĵo ne postulas uzantkontojn kaj defaŭlte ne metas aplikaĵajn cookies. En la baza peta fluo ĝi generas la avataron laŭpete kaj redonas ĝin rekte."
storage_text = "Se objekt-stoka subteno estas ebligita kaj subskribit-ligila aŭ persista route estas uzata, la generita avatara dosiero kaj ĝia objekta ŝlosilo povas esti stokitaj en la agordita S3-kongrua bucket."
telemetry = "Privateco-konserva telemetry"
telemetry_text = "Se telemetry estas ebligita de la operatoro, la aplikaĵo elsendas agregitajn OpenTelemetry-metrikojn por page views, videbla paĝtempo, deponejaj kaj crate-klakoj, demonstraj agoj, kaj avataraj generadaj nombroj grupigitaj laŭ limigitaj stilaj elektoj kiel kind, background, accessory, color, expression, shape kaj size bucket."
telemetry_limits = "Telemetry ne inkluzivas krudajn identigilojn, tenant aŭ style namespace valorojn, IP-adresojn, user agents, referrers, plenajn URL-ojn, cookies aŭ liberan tekston. La telemetry endpoints akceptas nur permesitajn agregitajn labels."
logging = "Protokoloj kaj infrastrukturo"
logging_text = "Depende de deployment, infrastrukturaj komponantoj kiel nginx, Caddy, Cloudflare, gastigaj provizantoj aŭ S3-kongrua stokado povas konservi access logs kaj operacian metadata. Tiuj protokoloj estas parto de funkciigo de publika servo kaj povas enhavi la petitan identigilon se ĝi aperas en la URL."
avoid = "Kion eviti sendi"
avoid_text = "Retpoŝt-formaj identigiloj estas akceptataj por kongruo, sed URL-oj povas aperi en infrastrukturaj protokoloj. Sendu stabilan internan id aŭ unudirektan aplikaĵan haŝon kiam vi volas eviti meti personajn datumojn en la peta URL."
repository = "Deponejo kaj crate"
repository_text = "Vi povas inspekti la efektivigon en la publika GitHub-deponejo kaj la reuzeblan avataran renderilon en la Rust-kesto."
translations = "Noto pri tradukoj"
translations_text = "La retejaj tradukoj estas helpataj de AI kaj faritaj laŭ plej bona peno. Se vi vidas vortumon plibonigindan, kontribuoj estas bonvenaj ĉe GitHub."
