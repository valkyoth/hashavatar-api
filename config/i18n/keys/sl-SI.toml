[pages.terms]
title = "Pogoji"
description = "Best-effort service terms za public hashavatar.app avatar API in demo website."
eyebrow = "Pogoji Storitve"
lead = "Ta public service je na voljo za informativne namene in na best-effort osnovi. Uporabljajte jo le, če ta risk profile ustreza vaši aplikaciji."
no_warranty = "Brez Garancije"
no_warranty_text = "Ta storitev in vsi generated outputs so na voljo as-is in as-available, brez kakršnih koli garancij. Ne obljubljamo availability, correctness, fitness for a particular purpose, uninterrupted operation ali compatibility with your systems."
no_liability = "Brez Odgovornosti"
no_liability_text = "Ne odgovarjamo za downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures ali neposredne ali posredne damages zaradi uporabe storitve."
fallback_text = "Če ste od teh avatarjev odvisni v production, morate implementirati lasten fallback behavior, caching strategy in availability plan."
acceptable_use = "Sprejemljiva Uporaba"
acceptable_use_text = "Storitve ne uporabljajte za preobremenitev infrastructure, obhod rate limits ali cache controls, testiranje abusive traffic patterns ali shranjevanje illegal material prek persistence features."
changes = "Spremembe"
changes_text = "Public service lahko kadarkoli in brez obvestila spremenimo, omejimo, začasno ustavimo ali ukinemo. Public endpoints, output details ali operational limits se lahko spreminjajo z razvojem storitve."
legal_note = "Ta stran je operational guidance, ne legal advice. Če potrebujete formal legal terms za business deployment, objavite reviewed version za svojo jurisdiction in operator entity."

[pages.privacy]
title = "Zasebnost"
description = "Privacy notice za hashavatar.app o request data, logs in optional object storage behavior."
eyebrow = "Obvestilo O Zasebnosti"
lead = "Storitev je namenoma preprosta, vendar public avatar API vseeno prejme nekaj request data, da lahko deluje. Ta stran opisuje praktičen baseline."
receives = "Kaj Storitev Prejme"
receives_identity = "opaque identifier, ki ga vstavite v request, na primer internal id, username ali one-way hash"
receives_parameters = "request parameters, kot so avatar type, style options, size, format in background"
receives_http_metadata = "standard HTTP metadata, ki jih obdelujejo server, reverse proxy in CDN, kot so IP address, user agent, referrer in request timing"
stores = "Kaj Hrani Sama Aplikacija"
stores_text = "Aplikacija ne zahteva user accounts in privzeto ne nastavlja application cookies. V basic request flow generira avatar on demand in ga vrne neposredno."
storage_text = "Če je object storage support omogočen in se uporablja signed-link ali persistence route, se lahko generated avatar file in object key shranita v konfiguriran S3-compatible bucket."
telemetry = "Telemetrija, Ki Varuje Zasebnost"
telemetry_text = "Če operator omogoči telemetry, aplikacija pošilja aggregate OpenTelemetry metrics za page views, visible page time, repository in crate clicks, demo actions in avatar generation counts, združene po bounded style choices, kot so kind, background, accessory, color, expression, shape in size bucket."
telemetry_limits = "Telemetry ne vključuje raw identifiers, tenant ali style namespace values, IP addresses, user agents, referrers, full URLs, cookies ali free-form text. Telemetry endpoints sprejemajo samo allow-listed aggregate labels."
logging = "Logi In Infrastruktura"
logging_text = "Odvisno od deployment lahko infrastructure components, kot so nginx, Caddy, Cloudflare, hosting providers ali S3-compatible storage, hranijo access logs in operational metadata. Ti logs so del delovanja public service in lahko vsebujejo requested identifier, če je v URL."
avoid = "Česa Raje Ne Pošiljajte"
avoid_text = "Email-shaped identifiers so sprejeti zaradi compatibility, vendar se URLs lahko pojavijo v infrastructure logs. Pošljite stable internal id ali one-way application hash, če se želite izogniti personal data v request URL."
repository = "Repository In Crate"
repository_text = "Implementation lahko pregledate v public GitHub repository, reusable avatar renderer pa v Rust crate."
translations = "Opomba o prevodih"
translations_text = "Prevodi spletnega mesta so podprti z AI in pripravljeni po najboljših močeh. Če opazite besedilo, ki bi ga bilo treba izboljšati, so prispevki na GitHubu dobrodošli."
translations_link = "Izboljšaj prevode"
