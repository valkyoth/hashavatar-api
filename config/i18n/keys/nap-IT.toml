[pages.help]
title = "Ajuto"
description = "Guida d'integrazione pe' usà hashavatar.app avatar API dint'ê web apps, frontends e backends."
eyebrow = "Guida D'Integrazione"
lead = "Usa hashavatar.app direttamente d' 'o browser, d' 'o frontend o d' 'o backend. Ogni avatar URL è deterministico, accussì stesso identificatore e stesse opzioni danno sempe 'o stesso risultato."
