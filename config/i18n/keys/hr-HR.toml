[pages.help]
title = "Pomoć"
description = "Vodič za integraciju hashavatar.app avatar API-ja u web apps, frontends i backends."
eyebrow = "Vodič Za Integraciju"
lead = "Koristite hashavatar.app izravno iz preglednika, frontenda ili backenda. Svaki avatar URL je deterministički, pa isti identifikator i opcije uvijek daju isti rezultat."
basic_url = "Osnovni URL"
basic_url_text = "Koristite query endpoint kada želite jednostavan javni image URL."
path_style = "Path Style URL"
path_style_text = "Koristite path formu ako preferirate čišće embed URL-ove."
html_example = "HTML Primjer"
javascript_example = "JavaScript Primjer"
supported_parameters = "Podržani Parametri"
style_layer_note = "Accessory i expression layers primjenjuju se na character-style families. Object-style families kao planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup i shield normaliziraju se na accessory=none i expression=default."
signed_storage_links = "Potpisane Storage Poveznice"
signed_storage_links_text = "Ako ovaj deployment ima object storage, zatražite presigned storage link s /v1/avatar/link. Taj endpoint sprema generated object i vraća JSON sa signed URL, object key i hashed cache key. Standardni avatar responses ne izlažu signed-link metadata u response headers."
open_source = "Open Source"
open_source_text = "Izvor javne stranice nalazi se u API repository, a reusable avatar renderer objavljen je na crates.io."

[pages.docs]
title = "Dokumentacija"
description = "Referentna dokumentacija za hashavatar.app public avatar API, storage link endpoint i namespace-aware identity contract."
eyebrow = "API Reference"
lead = "Ovo je product-facing reference za public API. Isti identity, tenant, style version, avatar family, style options, size i WebP output namijenjeni su stabilnosti unutar major release."
core_endpoints = "Core Endpoints"
operational_endpoints = "Operativni Endpointi"
operational_text = "GET /healthz je public za load balancers i uptime checks. GET /metrics je loopback-only i vraća 404 za non-local peers."
namespace_support = "Namespace Podrška"
namespace_text = "Koristite tenant i style_version za odvajanje visual identity spaces između proizvoda ili rollout faza."
anonymous_ids = "Anonimni ID-jevi"
anonymous_text = "Pošaljite internal stable id ili one-way application hash umjesto raw personal data."
rate_limits = "Rate Limits"
rate_limits_text = "Public service primjenjuje origin-side rate limits, sa strožim limitima za /v1/avatar/link, direct avatar requests s persist=true i /og.png jer su object storage writes i Open Graph image rendering skuplji od direct rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar generation i storage operations ograničeni su server-side timeouts kako skupi zahtjevi ne bi mogli neograničeno monopolizirati origin."
errors = "Greške"
error_bad_request = "nevažeći kind, unsupported algorithm ili format, size ili missing identity"
error_timeout = "generation ili storage timeout"
error_rate_limit = "rate limit exceeded"
error_internal = "rendering ili storage failure"
openapi = "OpenAPI"
openapi_text = "Za generated clients ili tooling koristite"

[pages.terms]
title = "Uvjeti"
description = "Best-effort service terms za public hashavatar.app avatar API i demo website."
eyebrow = "Uvjeti Usluge"
lead = "Ova public service pruža se informativno i na best-effort osnovi. Koristite je samo ako taj risk profile odgovara vašoj aplikaciji."
no_warranty = "Bez Jamstva"
no_warranty_text = "Ova usluga i svi generated outputs pružaju se as-is i as-available, bez ikakvih jamstava. Ne obećavamo availability, correctness, fitness for a particular purpose, uninterrupted operation ili compatibility with your systems."
no_liability = "Bez Odgovornosti"
no_liability_text = "Ne odgovaramo za downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures ili izravne ili neizravne damages nastale korištenjem usluge."
fallback_text = "Ako se oslanjate na ove avatare u production, trebali biste implementirati vlastiti fallback behavior, caching strategy i availability plan."
acceptable_use = "Prihvatljiva Uporaba"
acceptable_use_text = "Ne koristite uslugu za preopterećenje infrastructure, zaobilaženje rate limits ili cache controls, testiranje abusive traffic patterns ili spremanje illegal material kroz persistence features."
changes = "Promjene"
changes_text = "Možemo promijeniti, ograničiti, pauzirati ili prekinuti public service u bilo kojem trenutku bez obavijesti. Public endpoints, output details ili operational limits mogu se mijenjati kako se usluga razvija."
legal_note = "Ova stranica je operational guidance, ne legal advice. Ako trebate formal legal terms za business deployment, objavite reviewed version za svoju jurisdiction i operator entity."

[pages.privacy]
title = "Privatnost"
description = "Privacy notice za hashavatar.app o request data, logs i optional object storage behavior."
eyebrow = "Obavijest O Privatnosti"
lead = "Usluga je namjerno jednostavna, ali public avatar API ipak prima neke request data kako bi funkcionirao. Ova stranica opisuje praktični baseline."
receives = "Što Usluga Prima"
receives_identity = "opaque identifier koji stavljate u request, npr. internal id, username ili one-way hash"
receives_parameters = "request parameters kao avatar type, style options, size, format i background"
receives_http_metadata = "standard HTTP metadata koje obrađuju server, reverse proxy i CDN, kao IP address, user agent, referrer i request timing"
stores = "Što Sama Aplikacija Sprema"
stores_text = "Aplikacija ne zahtijeva user accounts i prema zadanim postavkama ne postavlja application cookies. U basic request flow generira avatar on demand i vraća ga izravno."
storage_text = "Ako je object storage support omogućen i koristi se signed-link ili persistence route, generated avatar file i object key mogu se spremiti u konfigurirani S3-compatible bucket."
telemetry = "Telemetrija Koja Čuva Privatnost"
telemetry_text = "Ako operator omogući telemetry, aplikacija šalje aggregate OpenTelemetry metrics za page views, visible page time, repository i crate clicks, demo actions i avatar generation counts grupirane prema bounded style choices kao kind, background, accessory, color, expression, shape i size bucket."
telemetry_limits = "Telemetry ne uključuje raw identifiers, tenant ili style namespace values, IP addresses, user agents, referrers, full URLs, cookies ili free-form text. Telemetry endpoints prihvaćaju samo allow-listed aggregate labels."
logging = "Logovi I Infrastruktura"
logging_text = "Ovisno o deployment, infrastructure components kao nginx, Caddy, Cloudflare, hosting providers ili S3-compatible storage mogu čuvati access logs i operational metadata. Ti logs dio su rada public service i mogu sadržavati requested identifier ako je u URL-u."
avoid = "Što Izbjegavati Slati"
avoid_text = "Email-shaped identifiers prihvaćaju se zbog compatibility, ali URLs se mogu pojaviti u infrastructure logs. Pošaljite stable internal id ili one-way application hash ako želite izbjeći personal data u request URL."
repository = "Repository I Crate"
repository_text = "Implementation možete pregledati u public API repository i reusable avatar renderer u Rust crate."
