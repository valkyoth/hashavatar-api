html_example = "HTML-пример"
javascript_example = "JavaScript-пример"
supported_parameters = "Поддерживаемые параметры"
style_layer_note = "Слои аксессуаров и выражений применяются к персонажным семействам. Объектные семейства вроде planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup и shield нормализуются к accessory=none и expression=default."
signed_storage_links = "Подписанные ссылки хранения"
signed_storage_links_text = "Если в этом deployment настроено объектное хранилище, запросите presigned storage link через /v1/avatar/link. Endpoint сохраняет созданный объект и возвращает JSON с подписанным URL, object key и хэшированным cache key. Стандартные ответы аватаров не раскрывают metadata подписанных ссылок в response headers."
open_source = "Open source"
open_source_text = "Исходный код публичного сайта находится в API repository, а переиспользуемый avatar renderer опубликован на crates.io."

[pages.docs]
title = "Документация"
description = "Справочная документация для public avatar API hashavatar.app, endpoint ссылок хранения и namespace-aware identity contract."
eyebrow = "API reference"
lead = "Это product-facing reference для публичного API. Одинаковые identity, tenant, style version, avatar family, style options, size и WebP output должны оставаться стабильными в пределах major version."
core_endpoints = "Core endpoints"
