[pages.privacy]
title = "حریم خصوصی"
description = "Privacy notice برای hashavatar.app درباره request data، logs و optional object storage behavior."
eyebrow = "اطلاعیه حریم خصوصی"
lead = "این service عمدا ساده طراحی شده است، اما public avatar API برای کار کردن هنوز مقداری request data دریافت می‌کند. این صفحه آن practical baseline را توضیح می‌دهد."
receives = "سرویس چه چیزی دریافت می‌کند"
receives_identity = "opaque identifier که در request قرار می‌دهید، مانند internal id، username یا one-way hash"
receives_parameters = "request parameters مانند avatar type، style options، size، format و background"
receives_http_metadata = "standard HTTP metadata که server، reverse proxy و CDN پردازش می‌کنند، مانند IP address، user agent، referrer و request timing"
stores = "App چه چیزی ذخیره می‌کند"
stores_text = "Application به user accounts نیاز ندارد و به صورت default application cookies تنظیم نمی‌کند. در basic request flow، app آواتار را on demand تولید می‌کند و مستقیم برمی‌گرداند."
storage_text = "اگر object storage support فعال باشد و signed-link یا persistence route استفاده شود، generated avatar file و object key ممکن است در configured S3-compatible bucket ذخیره شوند."
telemetry = "Telemetry حافظ حریم خصوصی"
telemetry_text = "اگر operator telemetry را فعال کند، app برای page views، visible page time، repository و crate clicks، demo actions و avatar generation counts، aggregate OpenTelemetry metrics منتشر می‌کند که بر اساس bounded style choices مانند kind، background، accessory، color، expression، shape و size bucket گروه‌بندی شده‌اند."
telemetry_limits = "Telemetry شامل raw identifiers، tenant یا style namespace values، IP addresses، user agents، referrers، full URLs، cookies یا free-form text نیست. Telemetry endpoints فقط allow-listed aggregate labels را می‌پذیرند."
logging = "Logs و Infrastructure"
logging_text = "بسته به deployment، infrastructure components مانند nginx، Caddy، Cloudflare، hosting providers یا S3-compatible storage ممکن است access logs و operational metadata ذخیره کنند. این logs بخشی از اجرای public service هستند و اگر requested identifier در URL باشد ممکن است شامل آن شوند."
avoid = "چه چیزی بهتر است ارسال نکنید"
avoid_text = "Email-shaped identifiers برای compatibility پذیرفته می‌شوند، اما URLs ممکن است در infrastructure logs ظاهر شوند. اگر می‌خواهید از personal data در request URL پرهیز کنید، stable internal id یا one-way application hash ارسال کنید."
repository = "Repository و Crate"
repository_text = "می‌توانید implementation را در public API repository و reusable avatar renderer را در Rust crate بررسی کنید."
