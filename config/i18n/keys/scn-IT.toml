[pages.help]
title = "Aiutu"
description = "Guida d'integrazioni pi usari hashavatar.app avatar API 'nta web apps, frontends e backends."
eyebrow = "Guida D'Integrazioni"
lead = "Usa hashavatar.app direttamenti dû browser, dû frontend o dû backend. Ogni avatar URL è determinìstica, accussì lu stissu identificaturi e li stissi opzioni dùnanu sempri lu stissu risultatu."
basic_url = "URL Bàsica"
basic_url_text = "Usa lu query endpoint quannu voi na image URL pùbblica sìmprici."
path_style = "Path Style URL"
path_style_text = "Usa la forma path si preferisci embed URLs cchiù puliti."
html_example = "Esempiu HTML"
javascript_example = "Esempiu JavaScript"
supported_parameters = "Parametri Supportati"
style_layer_note = "Accessory e expression layers s'apprìcanu a character-style families. Object-style families comu planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup e shield si nurmalìzzanu a accessory=none e expression=default."
signed_storage_links = "Link Storage Firmati"
signed_storage_links_text = "Si chistu deployment havi object storage cunfiguratu, addumanna nu presigned storage link di /v1/avatar/link. Ddu endpoint sarva lu generated object e torna JSON cu signed URL, object key e hashed cache key. Li avatar responses standard nun espònunu signed-link metadata 'nta response headers."
open_source = "Open Source"
open_source_text = "Lu source dû situ pùbblicu è 'nta l'GitHub repository e lu reusable avatar renderer è pubblicatu supra crates.io."

[pages.docs]
title = "Ducumentazzioni"
description = "Reference documentation pi hashavatar.app public avatar API, storage link endpoint e namespace-aware identity contract."
eyebrow = "API Reference"
lead = "Chista è la product-facing reference pi la public API. Stissa identity, tenant, style version, avatar family, style options, size e WebP output sunnu pinsati pi ristari stabbili intra na major release."
core_endpoints = "Core Endpoints"
operational_endpoints = "Endpoint Operativi"
operational_text = "GET /healthz è public pi load balancers e uptime checks. GET /metrics è loopback-only e torna 404 pi non-local peers."
namespace_support = "Supportu Namespace"
namespace_text = "Usa tenant e style_version pi tèniri visual identity spaces siparati tra prudutti o rollout phases."
anonymous_ids = "ID Anònimi"
anonymous_text = "Manna internal stable id o one-way application hash mmeci di raw personal data."
rate_limits = "Rate Limits"
rate_limits_text = "La public service applica origin-side rate limits, cu limiti cchiù stritti pi /v1/avatar/link, direct avatar requests cu persist=true e /og.png, pirchì object storage writes e Open Graph image rendering sunnu cchiù custusi di direct rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar generation e storage operations sunnu limitati di server-side timeouts, accussì richiesti custusi nun ponnu monopolizzari l'origin senza fini."
errors = "Errura"
error_bad_request = "kind non vàlidu, unsupported algorithm o format, size o missing identity"
error_timeout = "generation o storage timeout"
error_rate_limit = "rate limit exceeded"
error_internal = "rendering o storage failure"
openapi = "OpenAPI"
openapi_text = "Pi generated clients o tooling, usa"

[pages.terms]
title = "Tèrmini"
description = "Best-effort service terms pi la public hashavatar.app avatar API e demo website."
eyebrow = "Tèrmini Dû Serviziu"
lead = "Chista public service veni data pi nfurmazioni e supra basi best-effort. Usala sulu si ddu risk profile va beni pi la to applicazioni."
no_warranty = "Nudda Garanzia"
no_warranty_text = "Chistu serviziu e tutti li generated outputs sunnu dati as-is e as-available, senza garanzii di nuddu tipu. Nun prumittimu availability, correctness, fitness for a particular purpose, uninterrupted operation o compatibility with your systems."
no_liability = "Nudda Responsabbilità"
no_liability_text = "Nun semu responsàbbili pi downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures o damages diretti o indiretti ca nàscinu di l'usu dû serviziu."
fallback_text = "Si dipenni di sti avatar 'n production, avissi a implementari lu to fallback behavior, caching strategy e availability plan."
acceptable_use = "Usu Accittàbbili"
acceptable_use_text = "Nun usari lu serviziu pi supraccarricari infrastructure, passari rate limits o cache controls, testari abusive traffic patterns o sarvari illegal material attraversu persistence features."
changes = "Canciamenti"
changes_text = "Putemu canciari, limitari, suspènniri o finiri la public service quannu vulimu e senza avvisu. Public endpoints, output details o operational limits ponnu canciari cu l'evoluzzioni dû serviziu."
legal_note = "Chista pàggina è operational guidance, non legal advice. Si ti servinu formal legal terms pi business deployment, pubblica na reviewed version spicìfica pi la to jurisdiction e operator entity."

[pages.privacy]
title = "Privacy"
description = "Privacy notice pi hashavatar.app supra request data, logs e optional object storage behavior."
eyebrow = "Avvisu Privacy"
lead = "Lu serviziu è apposta sìmprici, ma na public avatar API ricivi sempri quarchi request data pi funziunari. Chista pàggina discrivi lu baseline pràticu."
receives = "Chi Ricivi Lu Serviziu"
receives_identity = "l'opaque identifier ca metti 'nta la request, comu internal id, username o one-way hash"
receives_parameters = "request parameters comu avatar type, style options, size, format e background"
receives_http_metadata = "standard HTTP metadata trattati di server, reverse proxy e CDN, comu IP address, user agent, referrer e request timing"
stores = "Chi Sarva L'App"
stores_text = "L'applicazioni nun dumanna user accounts e di default nun metti application cookies. 'N basic request flow genera l'avatar on demand e lu torna direttamenti."
storage_text = "Si object storage support è attivatu e si usa signed-link o persistence route, lu generated avatar file e lu object key ponnu èssiri sarvati 'nta lu S3-compatible bucket cunfiguratu."
telemetry = "Telemetry Ca Rispetta La Privacy"
telemetry_text = "Si l'operator attiva telemetry, l'app emetti aggregate OpenTelemetry metrics pi page views, visible page time, repository e crate clicks, demo actions e avatar generation counts raggruppati pi bounded style choices comu kind, background, accessory, color, expression, shape e size bucket."
telemetry_limits = "Telemetry nun ncludi raw identifiers, tenant o style namespace values, IP addresses, user agents, referrers, full URLs, cookies o free-form text. Telemetry endpoints accettanu sulu allow-listed aggregate labels."
logging = "Log E Infrastruttura"
logging_text = "Secunnu lu deployment, infrastructure components comu nginx, Caddy, Cloudflare, hosting providers o S3-compatible storage ponnu tiniri access logs e operational metadata. Sti logs sunnu parti dû funziunamentu di na public service e ponnu cunteniri lu requested identifier si è 'nta URL."
avoid = "Chi È Megghiu Nun Mannari"
avoid_text = "Email-shaped identifiers sunnu accittati pi compatibility, ma URLs ponnu cumpariri 'nta infrastructure logs. Manna stable internal id o one-way application hash si voi evitari personal data 'nta request URL."
repository = "Repository E Crate"
repository_text = "Poi taliari l'implementation 'nta lu public GitHub repository e lu reusable avatar renderer 'nta la Rust crate."
translations = "Nota supra i traduzzioni"
translations_text = "I traduzzioni dû situ sunnu aiutati di AI e fatti cu lu megghiu sforzu. Si vidi paroli ca ponnu èssiri migghiurati, i cuntributi supra GitHub sunnu binvinuti."
translations_link = "Migghiura i traduzzioni"
