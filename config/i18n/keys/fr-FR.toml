title = "Générez un avatar public en quelques secondes"
description = "Transformez tout identifiant opaque, nom d'utilisateur stable ou hash à sens unique en URL d'avatar déterministe. Choisissez le style, l'arrière-plan et la taille, puis copiez l'URL WebP, téléchargez le résultat ou créez un lien de stockage signé."
privacy_tip = "Conseil confidentialité : les identifiants de forme e-mail sont acceptés par commodité, mais un identifiant interne stable ou un hash à sens unique est préférable pour réduire les données personnelles dans les logs d'URL."

