[pages.help]
title = "Tulong"
description = "Integration guide para gamitin ang hashavatar.app avatar API sa web apps, frontends, at backends."
eyebrow = "Integration Guide"
lead = "Gamitin ang hashavatar.app direkta mula sa browser, frontend, o backend mo. Deterministic ang bawat avatar URL, kaya ang parehong identifier at options ay laging magbibigay ng parehong output."
basic_url = "Basic URL"
basic_url_text = "Gamitin ang query endpoint kapag kailangan mo ng simpleng public image URL."
path_style = "Path Style URL"
path_style_text = "Gamitin ang path form kung mas gusto mo ng mas malinis na embed URLs."
html_example = "HTML Example"
javascript_example = "JavaScript Example"
supported_parameters = "Supported Parameters"
style_layer_note = "Ang accessory at expression layers ay ginagamit sa character-style families. Object-style families tulad ng planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup, at shield ay normalized sa accessory=none at expression=default."
signed_storage_links = "Signed Storage Links"
signed_storage_links_text = "Kung may configured object storage ang deployment na ito, humingi ng presigned storage link mula sa /v1/avatar/link. Ini-store ng endpoint ang generated object at nagbabalik ng JSON na may signed URL, object key, at hashed cache key. Hindi inilalabas ng standard avatar responses ang signed-link metadata sa response headers."
open_source = "Open Source"
open_source_text = "Ang source ng public site ay nasa API repository at ang reusable avatar renderer ay naka-publish sa crates.io."

[pages.docs]
title = "Dokumentasyon"
description = "Reference documentation para sa hashavatar.app public avatar API, storage link endpoint, at namespace-aware identity contract."
eyebrow = "API Reference"
lead = "Ito ang product-facing reference para sa public API. Inaasahang stable sa loob ng major release ang parehong identity, tenant, style version, avatar family, style options, size, at WebP output."
core_endpoints = "Core Endpoints"
operational_endpoints = "Operational Endpoints"
operational_text = "Public ang GET /healthz para sa load balancers at uptime checks. Loopback-only ang GET /metrics at nagbabalik ng 404 sa non-local peers."
namespace_support = "Namespace Support"
namespace_text = "Gamitin ang tenant at style_version para paghiwalayin ang visual identity spaces sa pagitan ng products o rollout phases."
anonymous_ids = "Anonymous IDs"
anonymous_text = "Magpadala ng internal stable id o one-way application hash sa halip na raw personal data."
rate_limits = "Rate Limits"
rate_limits_text = "Nagpapatupad ang public service ng origin-side rate limits, na may mas mahigpit na limit para sa /v1/avatar/link, direct avatar requests na may persist=true, at /og.png dahil mas mahal ang object storage writes at Open Graph image rendering kaysa direct rendering."
timeouts = "Timeouts"
timeouts_text = "Ang avatar generation at storage operations ay bounded ng server-side timeouts para hindi makontrol ng mahal na request ang origin nang walang hanggan."
errors = "Errors"
error_bad_request = "invalid kind, unsupported algorithm o format, size, o missing identity"
error_timeout = "generation o storage timeout"
error_rate_limit = "rate limit exceeded"
error_internal = "rendering o storage failure"
openapi = "OpenAPI"
openapi_text = "Para sa generated clients o tooling, gamitin"

[pages.terms]
title = "Mga Tuntunin"
description = "Best-effort service terms para sa public hashavatar.app avatar API at demo website."
eyebrow = "Mga Tuntunin ng Serbisyo"
lead = "Ibinibigay ang public service na ito para sa information at sa best-effort basis. Gamitin lang ito kung bagay ang risk profile na ito sa application mo."
no_warranty = "Walang Warranty"
no_warranty_text = "Ang service na ito at lahat ng generated outputs ay ibinibigay as-is at as-available, nang walang anumang warranty. Hindi kami nangangako ng availability, correctness, fitness for a particular purpose, uninterrupted operation, o compatibility with your systems."
no_liability = "Walang Liability"
no_liability_text = "Hindi kami liable para sa downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures, o direct/indirect damages mula sa paggamit ng service."
fallback_text = "Kung umaasa ka sa avatars na ito sa production, dapat kang magpatupad ng sarili mong fallback behavior, caching strategy, at availability plan."
acceptable_use = "Acceptable Use"
acceptable_use_text = "Huwag gamitin ang service para i-overload ang infrastructure, i-bypass ang rate limits o cache controls, mag-test ng abusive traffic patterns, o mag-store ng illegal material sa persistence features."
changes = "Mga Pagbabago"
changes_text = "Maaari naming baguhin, limitahan, i-suspend, o itigil ang public service anumang oras nang walang notice. Maaaring magbago ang public endpoints, output details, o operational limits habang nag-e-evolve ang service."
legal_note = "Operational guidance ang page na ito, hindi legal advice. Kung kailangan mo ng formal legal terms para sa business deployment, mag-publish ng reviewed version na akma sa jurisdiction at operator entity mo."

[pages.privacy]
title = "Privacy"
description = "Privacy notice para sa hashavatar.app tungkol sa request data, logs, at optional object storage behavior."
eyebrow = "Privacy Notice"
lead = "Sadyang simple ang service na ito, pero tumatanggap pa rin ang public avatar API ng ilang request data para gumana. Ipinapaliwanag ng page na ito ang practical baseline."
receives = "Ano Ang Natatanggap Ng Service"
receives_identity = "opaque identifier na inilalagay mo sa request, gaya ng internal id, username, o one-way hash"
receives_parameters = "request parameters gaya ng avatar type, style options, size, format, at background"
receives_http_metadata = "standard HTTP metadata na hinahandle ng server, reverse proxy, at CDN, gaya ng IP address, user agent, referrer, at request timing"
stores = "Ano Ang Ini-store Ng App"
stores_text = "Hindi nangangailangan ang application ng user accounts at hindi ito nagse-set ng application cookies by default. Sa basic request flow, nagge-generate ito ng avatar on demand at direktang ibinabalik ito."
storage_text = "Kung enabled ang object storage support at ginamit ang signed-link o persistence route, maaaring ma-store ang generated avatar file at object key sa configured S3-compatible bucket."
telemetry = "Privacy-Preserving Telemetry"
telemetry_text = "Kung i-enable ng operator ang telemetry, nag-e-emit ang app ng aggregate OpenTelemetry metrics para sa page views, visible page time, repository at crate clicks, demo actions, at avatar generation counts na grouped ayon sa bounded style choices tulad ng kind, background, accessory, color, expression, shape, at size bucket."
telemetry_limits = "Walang raw identifiers, tenant o style namespace values, IP addresses, user agents, referrers, full URLs, cookies, o free-form text sa telemetry. Tumatanggap lang ang telemetry endpoints ng allow-listed aggregate labels."
logging = "Logs At Infrastructure"
logging_text = "Depende sa deployment, maaaring mag-store ng access logs at operational metadata ang infrastructure components tulad ng nginx, Caddy, Cloudflare, hosting providers, o S3-compatible storage. Bahagi ang logs na ito ng pagpapatakbo ng public service at maaari nitong isama ang requested identifier kung makikita ito sa URL."
avoid = "Ano Ang Mabuting Iwasang Ipadala"
avoid_text = "Tinatanggap ang email-shaped identifiers para sa compatibility, pero maaaring lumabas ang URLs sa infrastructure logs. Magpadala ng stable internal id o one-way application hash kung gusto mong iwasan ang personal data sa request URL."
repository = "Repository At Crate"
repository_text = "Maaari mong tingnan ang implementation sa public API repository at ang reusable avatar renderer sa Rust crate."
translations = "Paunawa sa Salin"
translations_text = "Ang mga salin ng website ay tinulungan ng AI at ginawa sa abot ng makakaya. Kung may makita kang pahayag na dapat pagandahin, malugod na tinatanggap ang ambag sa GitHub."
translations_link = "Pagbutihin ang mga salin"
