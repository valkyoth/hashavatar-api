name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          cache-on-failure: true

      - name: Install security tools
        uses: taiki-e/install-action@v2.79.14
        with:
          tool: cargo-deny,cargo-audit,cargo-sbom

      - name: Run checks
        run: scripts/checks.sh

      - name: Local runtime smoke
        run: scripts/smoke_local.sh

      - name: Generate SBOM
        run: scripts/generate-sbom.sh

      - name: Verify reproducible release build
        run: scripts/reproducible_build_check.sh
