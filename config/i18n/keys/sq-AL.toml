style_layer_note = "Accessory dhe expression layers aplikohen për character-style families. Object-style families si planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup dhe shield normalize në accessory=none dhe expression=default."
signed_storage_links = "Signed Storage Links"
signed_storage_links_text = "Nëse ky deployment ka object storage configured, kërko një presigned storage link nga /v1/avatar/link. Ai endpoint store generated object dhe kthen JSON me signed URL, object key dhe hashed cache key. Standard avatar responses nuk shfaqin signed-link metadata në response headers."
open_source = "Open Source"
open_source_text = "Source i public site është në GitHub repository dhe reusable avatar renderer është publish në crates.io."

