[pages.help]
title = "Pomoc"
description = "Przewodnik integracji dla używania API awatarów hashavatar.app w aplikacjach webowych, frontendach i backendach."
eyebrow = "Przewodnik Integracji"
lead = "Używaj hashavatar.app bezpośrednio z przeglądarki, frontendu albo backendu. Każdy URL awatara jest deterministyczny, więc ten sam identyfikator i opcje zawsze dają ten sam wynik."
basic_url = "Podstawowy URL"
basic_url_text = "Użyj query endpoint, gdy chcesz prosty publiczny URL obrazu."
path_style = "Path Style URL"
path_style_text = "Użyj formy path, jeśli wolisz czystsze embed URL."
html_example = "Przykład HTML"
javascript_example = "Przykład JavaScript"
supported_parameters = "Obsługiwane Parametry"
style_layer_note = "Warstwy akcesoriów i wyrazów dotyczą rodzin character-style. Rodziny object-style, takie jak planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup i shield, są normalizowane do accessory=none i expression=default."
signed_storage_links = "Podpisane Linki Do Magazynu"
signed_storage_links_text = "Jeśli w tym deployment skonfigurowano object storage, poproś o presigned storage link z /v1/avatar/link. Ten endpoint zapisuje wygenerowany obiekt i zwraca JSON z signed URL, object key oraz hashed cache key. Standardowe odpowiedzi awatarów nie ujawniają signed-link metadata w response headers."
open_source = "Open Source"
open_source_text = "Kod publicznej strony znajduje się w GitHub repository, a reusable avatar renderer jest publikowany na crates.io."

[pages.docs]
title = "Dokumentacja"
description = "Dokumentacja referencyjna dla hashavatar.app public avatar API, storage link endpoint i namespace-aware identity contract."
eyebrow = "Referencja API"
lead = "To produktowa referencja public API. Ten sam identity, tenant, style version, avatar family, style options, size i WebP output mają pozostać stabilne w ramach major release."
core_endpoints = "Główne Endpointy"
operational_endpoints = "Endpointy Operacyjne"
operational_text = "GET /healthz jest publiczne dla load balancers i uptime checks. GET /metrics jest tylko loopback i zwraca 404 dla non-local peers."
namespace_support = "Obsługa Namespace"
namespace_text = "Użyj tenant i style_version, aby oddzielić przestrzenie wizualnej tożsamości między produktami albo etapami rollout."
anonymous_ids = "Anonimowe ID"
anonymous_text = "Wysyłaj wewnętrzny stabilny id albo jednokierunkowy application hash zamiast surowych danych osobowych."
rate_limits = "Rate Limity"
rate_limits_text = "Public service stosuje origin-side rate limits; ostrzejsze limity dotyczą /v1/avatar/link, direct avatar requests z persist=true oraz /og.png, ponieważ object storage writes i Open Graph image rendering są droższe niż direct rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar generation i storage operations są ograniczone server-side timeouts, aby kosztowne żądania nie mogły bez końca zajmować origin."
errors = "Błędy"
error_bad_request = "nieprawidłowy kind, nieobsługiwany algorithm albo format, size lub brak identity"
error_timeout = "generation albo storage timeout"
error_rate_limit = "przekroczono rate limit"
error_internal = "rendering albo storage failure"
openapi = "OpenAPI"
openapi_text = "Dla generated clients albo tooling użyj"

[pages.terms]
title = "Warunki"
description = "Best-effort service terms dla publicznego API awatarów hashavatar.app i demo website."
eyebrow = "Warunki Usługi"
lead = "Ta public service jest udostępniana informacyjnie i na zasadzie best-effort. Używaj jej tylko wtedy, gdy taki profil ryzyka pasuje do twojej aplikacji."
no_warranty = "Brak Gwarancji"
no_warranty_text = "Ta usługa i wszystkie generated outputs są dostarczane as-is i as-available, bez jakichkolwiek gwarancji, wyraźnych ani dorozumianych. Nie obiecujemy availability, correctness, fitness for a particular purpose, uninterrupted operation ani compatibility with your systems."
no_liability = "Brak Odpowiedzialności"
no_liability_text = "Nie odpowiadamy za downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures ani żadne bezpośrednie lub pośrednie damages wynikające z używania usługi."
fallback_text = "Jeśli polegasz na tych awatarach w production, zaimplementuj własne fallback behavior, caching strategy i availability plan."
acceptable_use = "Dozwolone Użycie"
acceptable_use_text = "Nie używaj usługi do przeciążania infrastructure, omijania rate limits albo cache controls, testowania abusive traffic patterns ani przechowywania illegal material przez persistence features."
changes = "Zmiany"
changes_text = "Możemy zmienić, ograniczyć, zawiesić albo zakończyć public service w dowolnym czasie i bez powiadomienia. Public endpoints, output details albo operational limits mogą się zmieniać wraz z rozwojem usługi."
legal_note = "Ta strona jest operational guidance, a nie legal advice. Jeśli potrzebujesz formal legal terms dla business deployment, opublikuj reviewed version dopasowaną do twojej jurisdiction i operator entity."

[pages.privacy]
title = "Prywatność"
description = "Privacy notice dla hashavatar.app obejmujące request data, logs i optional object storage behavior."
eyebrow = "Informacja O Prywatności"
lead = "Usługa jest celowo prosta, ale public avatar API nadal otrzymuje część request data, aby działać. Ta strona opisuje praktyczny baseline."
receives = "Co Otrzymuje Usługa"
receives_identity = "opaque identifier umieszczany w request, na przykład internal id, username albo one-way hash"
receives_parameters = "request parameters, takie jak avatar type, style options, size, format i background"
receives_http_metadata = "standard HTTP metadata obsługiwane przez server, reverse proxy i CDN, takie jak IP address, user agent, referrer i request timing"
stores = "Co Przechowuje Sama Aplikacja"
stores_text = "Aplikacja nie wymaga user accounts i domyślnie nie ustawia application cookies. W basic request flow generuje avatar on demand i zwraca go bezpośrednio."
storage_text = "Jeśli object storage support jest włączony i używany jest signed-link albo persistence route, generated avatar file i object key mogą zostać zapisane w skonfigurowanym S3-compatible bucket."
telemetry = "Telemetria Chroniąca Prywatność"
telemetry_text = "Jeśli operator włączy telemetry, aplikacja wysyła aggregate OpenTelemetry metrics dla page views, visible page time, repository i crate clicks, demo actions oraz avatar generation counts pogrupowanych według bounded style choices, takich jak kind, background, accessory, color, expression, shape i size bucket."
telemetry_limits = "Telemetry nie obejmuje raw identifiers, tenant ani style namespace values, IP addresses, user agents, referrers, full URLs, cookies ani free-form text. Telemetry endpoints przyjmują tylko allow-listed aggregate labels."
logging = "Logi i Infrastruktura"
logging_text = "W zależności od deployment, infrastructure components takie jak nginx, Caddy, Cloudflare, hosting providers albo S3-compatible storage mogą przechowywać access logs i operational metadata. Te logs są częścią działania public service i mogą zawierać requested identifier, jeśli występuje w URL."
avoid = "Czego Lepiej Nie Wysyłać"
avoid_text = "Email-shaped identifiers są akceptowane dla compatibility, ale URLs mogą pojawiać się w infrastructure logs. Wysyłaj stable internal id albo one-way application hash, jeśli chcesz uniknąć personal data w request URL."
repository = "Repozytorium i Crate"
repository_text = "Implementation możesz sprawdzić w public GitHub repository, a reusable avatar renderer w Rust crate."
translations = "Uwaga o tłumaczeniach"
translations_text = "Tłumaczenia strony są wspierane przez AI i wykonane w trybie najlepszych starań. Jeśli widzisz sformułowanie do poprawy, wkład na GitHubie jest mile widziany."
translations_link = "Ulepsz tłumaczenia"
