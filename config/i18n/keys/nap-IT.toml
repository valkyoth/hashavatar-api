[pages.docs]
title = "Documentazione"
description = "Reference documentation pe' hashavatar.app public avatar API, storage link endpoint e namespace-aware identity contract."
eyebrow = "API Reference"
lead = "Chesta è 'a product-facing reference p' 'o public API. Stessa identity, tenant, style version, avatar family, style options, size e WebP output so' pensate pe' restà stabile dint'a nu major release."
core_endpoints = "Core Endpoints"
operational_endpoints = "Endpoint Operative"
operational_text = "GET /healthz è public pe' load balancers e uptime checks. GET /metrics è loopback-only e torna 404 pe' non-local peers."
