version: "3.9"

services:
  hashavatar:
    build:
      context: ..
      dockerfile: Dockerfile
    image: hashavatar-api:latest-wolfi
    container_name: hashavatar-app
    environment:
      PORT: "8080"
      PUBLIC_WEBSITE_HOST: "0.0.0.0"
      HASHAVATAR_TRUSTED_PROXIES: "10.89.42.0/24"
      HASHAVATAR_OTLP: "${HASHAVATAR_OTLP:-disabled}"
      HASHAVATAR_OTLP_ENDPOINT: "${HASHAVATAR_OTLP_ENDPOINT:-}"
    read_only: true
    cpus: 4.0
    mem_limit: 1g
    mem_reservation: 512m
    pids_limit: 256
    ulimits:
      nofile:
        soft: 4096
        hard: 4096
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=64m,mode=1777
    restart: unless-stopped
    networks:
      - hashavatar

  fluxheim:
    image: ghcr.io/valkyoth/fluxheim:v1.6.30-wolfi
    container_name: hashavatar-fluxheim
    restart: unless-stopped
    cpus: 2.0
    mem_limit: 512m
    mem_reservation: 256m
    pids_limit: 256
    ulimits:
      nofile:
        soft: 8192
        hard: 8192
    stop_signal: SIGTERM
    stop_grace_period: 15s
    security_opt:
      - no-new-privileges:true
    depends_on:
      - hashavatar
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - ./fluxheim.toml:/etc/fluxheim/fluxheim.toml:ro,Z
      - ./tls:/etc/fluxheim/tls:ro,Z
      - fluxheim_state:/var/lib/fluxheim:Z,U
      - fluxheim_cache:/var/cache/fluxheim:Z,U
      - fluxheim_logs:/var/log/fluxheim:Z,U
    networks:
      - hashavatar

volumes:
  fluxheim_state:
  fluxheim_cache:
  fluxheim_logs:

networks:
  hashavatar:
    driver: bridge
    ipam:
      config:
        - subnet: 10.89.42.0/24
