[pages.privacy]
title = "Privatumas"
description = "hashavatar.app privacy notice apie request data, logs ir optional object storage behavior."
eyebrow = "Privatumo Pranešimas"
lead = "Paslauga sąmoningai paprasta, bet public avatar API veikimui vis tiek gauna tam tikrų request data. Šis puslapis aprašo praktinį baseline."
receives = "Ką Gauna Paslauga"
receives_identity = "opaque identifier, kurį įdedate į request, pvz., internal id, username arba one-way hash"
receives_parameters = "request parameters, tokie kaip avatar type, style options, size, format ir background"
receives_http_metadata = "standard HTTP metadata, kuriuos apdoroja serveris, reverse proxy ir CDN, pvz., IP address, user agent, referrer ir request timing"
stores = "Ką Saugo Pati Programa"
stores_text = "Programa nereikalauja user accounts ir pagal nutylėjimą nenustato application cookies. Basic request flow ji sugeneruoja avatarą on demand ir grąžina tiesiogiai."
storage_text = "Jei object storage support įjungtas ir naudojamas signed-link arba persistence route, generated avatar file ir object key gali būti saugomi sukonfigūruotame S3-compatible bucket."
telemetry = "Privatumą Tausojanti Telemetrija"
telemetry_text = "Jei operator įjungia telemetry, programa siunčia aggregate OpenTelemetry metrics apie page views, visible page time, repository ir crate clicks, demo actions ir avatar generation counts, sugrupuotus pagal bounded style choices, tokius kaip kind, background, accessory, color, expression, shape ir size bucket."
telemetry_limits = "Telemetry neapima raw identifiers, tenant arba style namespace values, IP addresses, user agents, referrers, full URLs, cookies ar free-form text. Telemetry endpoints priima tik allow-listed aggregate labels."
logging = "Žurnalai ir Infrastruktūra"
logging_text = "Priklausomai nuo deployment, infrastructure components, tokie kaip nginx, Caddy, Cloudflare, hosting providers arba S3-compatible storage, gali saugoti access logs ir operational metadata. Šie logs yra public service veikimo dalis ir gali turėti requested identifier, jei jis yra URL."
avoid = "Ko Geriau Nesiųsti"
avoid_text = "Email-shaped identifiers priimami dėl compatibility, bet URLs gali patekti į infrastructure logs. Siųskite stable internal id arba one-way application hash, jei norite išvengti personal data request URL."
repository = "Saugykla ir Crate"
repository_text = "Implementation galite peržiūrėti public API repository, o reusable avatar renderer - Rust crate."
translations = "Pastaba apie vertimus"
translations_text = "Svetainės vertimai yra parengti padedant DI ir geriausiomis pastangomis. Jei matote tekstą, kurį reikėtų patobulinti, indėlis GitHub platformoje laukiamas."
