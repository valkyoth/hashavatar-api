version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: hashavatar-app:latest
    container_name: hashavatar-app
    environment:
      PORT: "8080"
      PUBLIC_WEBSITE_HOST: "0.0.0.0"
    restart: unless-stopped
    networks:
      - hashavatar

  caddy:
    image: docker.io/library/caddy:2
    container_name: hashavatar-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - hashavatar

volumes:
  caddy_data:
  caddy_config:

networks:
  hashavatar:
    driver: bridge
