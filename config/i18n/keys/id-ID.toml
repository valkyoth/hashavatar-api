[pages.help]
title = "Bantuan"
description = "Panduan integrasi untuk memakai hashavatar.app avatar API di web apps, frontends, dan backends."
eyebrow = "Panduan Integrasi"
lead = "Gunakan hashavatar.app langsung dari browser, frontend, atau backend Anda. Setiap avatar URL deterministik, sehingga identifier dan opsi yang sama selalu menghasilkan hasil yang sama."
basic_url = "URL Dasar"
basic_url_text = "Gunakan query endpoint saat Anda membutuhkan image URL publik sederhana."
path_style = "Path Style URL"
path_style_text = "Gunakan bentuk path jika Anda lebih suka embed URLs yang lebih bersih."
html_example = "Contoh HTML"
javascript_example = "Contoh JavaScript"
supported_parameters = "Parameter Yang Didukung"
style_layer_note = "Accessory dan expression layers berlaku untuk character-style families. Object-style families seperti planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup, dan shield dinormalisasi ke accessory=none dan expression=default."
signed_storage_links = "Tautan Penyimpanan Bertanda Tangan"
signed_storage_links_text = "Jika deployment ini memiliki object storage yang dikonfigurasi, minta presigned storage link dari /v1/avatar/link. Endpoint itu menyimpan generated object dan mengembalikan JSON dengan signed URL, object key, dan hashed cache key. Avatar responses standar tidak mengekspos signed-link metadata di response headers."
open_source = "Open Source"
open_source_text = "Source situs publik ada di GitHub repository dan reusable avatar renderer dipublikasikan di crates.io."

[pages.docs]
title = "Dokumentasi"
description = "Reference documentation untuk hashavatar.app public avatar API, storage link endpoint, dan namespace-aware identity contract."
eyebrow = "API Reference"
lead = "Ini adalah product-facing reference untuk public API. Identity, tenant, style version, avatar family, style options, size, dan WebP output yang sama dimaksudkan tetap stabil dalam major release."
core_endpoints = "Core Endpoints"
operational_endpoints = "Operational Endpoints"
operational_text = "GET /healthz bersifat public untuk load balancers dan uptime checks. GET /metrics bersifat loopback-only dan mengembalikan 404 untuk non-local peers."
namespace_support = "Dukungan Namespace"
namespace_text = "Gunakan tenant dan style_version untuk memisahkan visual identity spaces antar produk atau rollout phases."
anonymous_ids = "ID Anonim"
anonymous_text = "Kirim internal stable id atau one-way application hash alih-alih raw personal data."
rate_limits = "Rate Limits"
rate_limits_text = "Public service menerapkan origin-side rate limits, dengan limit lebih ketat pada /v1/avatar/link, direct avatar requests dengan persist=true, dan /og.png karena object storage writes dan Open Graph image rendering lebih mahal daripada direct rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar generation dan storage operations dibatasi oleh server-side timeouts agar request mahal tidak memonopoli origin tanpa batas."
errors = "Error"
error_bad_request = "kind tidak valid, unsupported algorithm atau format, size, atau missing identity"
error_timeout = "generation atau storage timeout"
error_rate_limit = "rate limit exceeded"
error_internal = "rendering atau storage failure"
openapi = "OpenAPI"
openapi_text = "Untuk generated clients atau tooling, gunakan"

[pages.terms]
title = "Ketentuan"
description = "Best-effort service terms untuk public hashavatar.app avatar API dan demo website."
eyebrow = "Ketentuan Layanan"
lead = "Public service ini disediakan untuk informasi dan berdasarkan best-effort. Gunakan hanya jika risk profile tersebut cocok untuk aplikasi Anda."
no_warranty = "Tanpa Garansi"
no_warranty_text = "Layanan ini dan semua generated outputs disediakan as-is dan as-available, tanpa garansi apa pun. Kami tidak menjanjikan availability, correctness, fitness for a particular purpose, uninterrupted operation, atau compatibility with your systems."
no_liability = "Tanpa Tanggung Jawab"
no_liability_text = "Kami tidak bertanggung jawab atas downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures, atau damages langsung maupun tidak langsung dari penggunaan layanan."
fallback_text = "Jika Anda bergantung pada avatar ini di production, Anda harus menerapkan fallback behavior, caching strategy, dan availability plan sendiri."
acceptable_use = "Penggunaan Yang Diterima"
acceptable_use_text = "Jangan gunakan layanan untuk membebani infrastructure, melewati rate limits atau cache controls, menguji abusive traffic patterns, atau menyimpan illegal material melalui persistence features."
changes = "Perubahan"
changes_text = "Kami dapat mengubah, membatasi, menjeda, atau menghentikan public service kapan saja tanpa pemberitahuan. Public endpoints, output details, atau operational limits dapat berubah seiring layanan berkembang."
legal_note = "Halaman ini adalah operational guidance, bukan legal advice. Jika Anda membutuhkan formal legal terms untuk business deployment, publikasikan reviewed version yang sesuai dengan jurisdiction dan operator entity Anda."

[pages.privacy]
title = "Privasi"
description = "Privacy notice untuk hashavatar.app tentang request data, logs, dan optional object storage behavior."
eyebrow = "Pemberitahuan Privasi"
lead = "Layanan ini sengaja dibuat sederhana, tetapi public avatar API tetap menerima beberapa request data agar dapat berfungsi. Halaman ini menjelaskan baseline praktis tersebut."
receives = "Apa Yang Diterima Layanan"
receives_identity = "opaque identifier yang Anda masukkan ke request, seperti internal id, username, atau one-way hash"
receives_parameters = "request parameters seperti avatar type, style options, size, format, dan background"
receives_http_metadata = "standard HTTP metadata yang ditangani oleh server, reverse proxy, dan CDN, seperti IP address, user agent, referrer, dan request timing"
stores = "Apa Yang Disimpan Aplikasi"
stores_text = "Aplikasi tidak memerlukan user accounts dan secara default tidak memasang application cookies. Dalam basic request flow, aplikasi membuat avatar on demand dan mengembalikannya langsung."
storage_text = "Jika object storage support diaktifkan dan signed-link atau persistence route digunakan, generated avatar file dan object key dapat disimpan di S3-compatible bucket yang dikonfigurasi."
telemetry = "Telemetry Yang Menjaga Privasi"
telemetry_text = "Jika operator mengaktifkan telemetry, aplikasi mengirim aggregate OpenTelemetry metrics untuk page views, visible page time, repository dan crate clicks, demo actions, serta avatar generation counts yang dikelompokkan menurut bounded style choices seperti kind, background, accessory, color, expression, shape, dan size bucket."
telemetry_limits = "Telemetry tidak menyertakan raw identifiers, tenant atau style namespace values, IP addresses, user agents, referrers, full URLs, cookies, atau free-form text. Telemetry endpoints hanya menerima allow-listed aggregate labels."
logging = "Logs Dan Infrastruktur"
logging_text = "Bergantung pada deployment, infrastructure components seperti nginx, Caddy, Cloudflare, hosting providers, atau S3-compatible storage dapat menyimpan access logs dan operational metadata. Logs ini adalah bagian dari menjalankan public service dan dapat berisi requested identifier jika muncul di URL."
avoid = "Yang Sebaiknya Tidak Dikirim"
avoid_text = "Email-shaped identifiers diterima untuk compatibility, tetapi URLs dapat muncul di infrastructure logs. Kirim stable internal id atau one-way application hash jika ingin menghindari personal data di request URL."
repository = "Repository Dan Crate"
repository_text = "Anda dapat memeriksa implementation di public GitHub repository dan reusable avatar renderer di Rust crate."
translations = "Catatan Terjemahan"
translations_text = "Terjemahan situs web dibantu AI dan dibuat dengan upaya terbaik. Jika Anda melihat kalimat yang perlu diperbaiki, kontribusi di GitHub sangat diterima."
translations_link = "Perbaiki terjemahan"
