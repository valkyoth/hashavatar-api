[pages.help]
title = "Помощ"
description = "Интеграционно ръководство за използване на hashavatar.app avatar API в web apps, frontends и backends."
eyebrow = "Интеграционно Ръководство"
lead = "Използвайте hashavatar.app директно от браузъра, frontend или backend. Всеки avatar URL е детерминистичен, така че същият идентификатор и опции винаги дават същия резултат."
basic_url = "Основен URL"
basic_url_text = "Използвайте query endpoint, когато искате прост публичен image URL."
path_style = "Path Style URL"
path_style_text = "Използвайте path формата, ако предпочитате по-чисти embed URL адреси."
html_example = "HTML Пример"
javascript_example = "JavaScript Пример"
supported_parameters = "Поддържани Параметри"
style_layer_note = "Accessory и expression layers важат за character-style families. Object-style families като planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup и shield се нормализират до accessory=none и expression=default."
signed_storage_links = "Подписани Storage Връзки"
signed_storage_links_text = "Ако този deployment има object storage, поискайте presigned storage link от /v1/avatar/link. Endpoint-ът съхранява generated object и връща JSON със signed URL, object key и hashed cache key. Стандартните avatar responses не показват signed-link metadata в response headers."
open_source = "Отворен Код"
open_source_text = "Изходният код на публичния сайт е в API repository, а reusable avatar renderer се публикува в crates.io."

[pages.docs]
title = "Документация"
description = "Reference documentation за hashavatar.app public avatar API, storage link endpoint и namespace-aware identity contract."
eyebrow = "API Reference"
lead = "Това е product-facing reference за public API. Същите identity, tenant, style version, avatar family, style options, size и WebP output са предназначени да останат стабилни в рамките на major release."
core_endpoints = "Core Endpoints"
operational_endpoints = "Операционни Endpoints"
operational_text = "GET /healthz е публичен за load balancers и uptime checks. GET /metrics е loopback-only и връща 404 за non-local peers."
namespace_support = "Namespace Поддръжка"
namespace_text = "Използвайте tenant и style_version, за да държите визуалните identity spaces отделни между продукти или rollout фази."
anonymous_ids = "Анонимни ID"
anonymous_text = "Изпращайте internal stable id или one-way application hash вместо raw personal data."
rate_limits = "Rate Limits"
rate_limits_text = "Public service прилага origin-side rate limits, с по-строги limits за /v1/avatar/link, direct avatar requests с persist=true и /og.png, защото object storage writes и Open Graph image rendering са по-скъпи от direct rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar generation и storage operations са ограничени със server-side timeouts, така че скъпите заявки да не монополизират origin безкрайно."
errors = "Грешки"
error_bad_request = "невалиден kind, unsupported algorithm или format, size или missing identity"
error_timeout = "generation или storage timeout"
error_rate_limit = "rate limit exceeded"
error_internal = "rendering или storage failure"
openapi = "OpenAPI"
openapi_text = "За generated clients или tooling използвайте"

[pages.terms]
title = "Условия"
description = "Best-effort service terms за public hashavatar.app avatar API и demo website."
eyebrow = "Условия На Услугата"
lead = "Тази public service се предоставя с информационна цел и на best-effort основа. Използвайте я само ако този risk profile е подходящ за вашето приложение."
no_warranty = "Без Гаранция"
no_warranty_text = "Тази услуга и всички generated outputs се предоставят as-is и as-available, без каквито и да било гаранции. Не обещаваме availability, correctness, fitness for a particular purpose, uninterrupted operation или compatibility with your systems."
no_liability = "Без Отговорност"
no_liability_text = "Не носим отговорност за downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures или преки или непреки damages от използването на услугата."
fallback_text = "Ако разчитате на тези аватари в production, трябва да реализирате собствен fallback behavior, caching strategy и availability plan."
acceptable_use = "Допустима Употреба"
acceptable_use_text = "Не използвайте услугата за претоварване на infrastructure, заобикаляне на rate limits или cache controls, тестване на abusive traffic patterns или съхранение на illegal material чрез persistence features."
changes = "Промени"
changes_text = "Можем да променим, ограничим, спрем временно или прекратим public service по всяко време без предупреждение. Public endpoints, output details или operational limits може да се променят с развитието на услугата."
legal_note = "Тази страница е operational guidance, не legal advice. Ако ви трябват formal legal terms за business deployment, публикувайте reviewed version за вашата jurisdiction и operator entity."

[pages.privacy]
title = "Поверителност"
description = "Privacy notice за hashavatar.app относно request data, logs и optional object storage behavior."
eyebrow = "Уведомление За Поверителност"
lead = "Услугата е умишлено проста, но public avatar API все пак получава request data, за да функционира. Тази страница описва практическия baseline."
receives = "Какво Получава Услугата"
receives_identity = "opaque identifier, който поставяте в request, например internal id, username или one-way hash"
receives_parameters = "request parameters като avatar type, style options, size, format и background"
receives_http_metadata = "standard HTTP metadata, обработвани от server, reverse proxy и CDN, например IP address, user agent, referrer и request timing"
stores = "Какво Съхранява Самото Приложение"
stores_text = "Приложението не изисква user accounts и по подразбиране не задава application cookies. В basic request flow генерира avatar on demand и го връща директно."
storage_text = "Ако object storage support е активиран и се използва signed-link или persistence route, generated avatar file и object key могат да бъдат съхранени в конфигуриран S3-compatible bucket."
telemetry = "Поверителна Телеметрия"
telemetry_text = "Ако operator активира telemetry, приложението изпраща aggregate OpenTelemetry metrics за page views, visible page time, repository и crate clicks, demo actions и avatar generation counts, групирани по bounded style choices като kind, background, accessory, color, expression, shape и size bucket."
telemetry_limits = "Telemetry не включва raw identifiers, tenant или style namespace values, IP addresses, user agents, referrers, full URLs, cookies или free-form text. Telemetry endpoints приемат само allow-listed aggregate labels."
logging = "Логове И Инфраструктура"
logging_text = "В зависимост от deployment, infrastructure components като nginx, Caddy, Cloudflare, hosting providers или S3-compatible storage могат да пазят access logs и operational metadata. Тези logs са част от работата на public service и могат да съдържат requested identifier, ако е в URL."
avoid = "Какво Да Избягвате Да Изпращате"
avoid_text = "Email-shaped identifiers се приемат за compatibility, но URLs могат да се появят в infrastructure logs. Изпращайте stable internal id или one-way application hash, когато искате да избегнете personal data в request URL."
repository = "Repository И Crate"
repository_text = "Можете да прегледате implementation в public API repository и reusable avatar renderer в Rust crate."
