legal_note = "Ця сторінка — operational guidance, а не legal advice. Якщо вам потрібні formal legal terms для business deployment, опублікуйте reviewed version для вашої jurisdiction і operator entity."

[pages.privacy]
title = "Приватність"
description = "Privacy notice hashavatar.app щодо request data, logs і optional object storage behavior."
eyebrow = "Privacy notice"
lead = "Сервіс навмисно простий, але public avatar API все одно отримує певні request data, щоб працювати. Ця сторінка описує практичний baseline."
receives = "Що отримує сервіс"
receives_identity = "opaque identifier, який ви ставите в request, наприклад internal id, username або one-way hash"
receives_parameters = "request parameters, як-от avatar type, style options, size, format і background"
receives_http_metadata = "standard HTTP metadata, які обробляють server, reverse proxy і CDN, як-от IP address, user agent, referrer і request timing"
stores = "Що зберігає сам застосунок"
stores_text = "Application не вимагає user accounts і за замовчуванням не ставить application cookies. У basic request flow він генерує avatar on demand і повертає його напряму."
storage_text = "Якщо object storage support увімкнено й використовується signed-link або persistence route, generated avatar file і його object key можуть зберігатися в налаштованому S3-compatible bucket."
telemetry = "Privacy-preserving telemetry"
telemetry_text = "Якщо operator вмикає telemetry, застосунок надсилає aggregate OpenTelemetry metrics для page views, visible page time, repository і crate clicks, demo actions, а також avatar generation counts, згрупованих за bounded style choices, як-от kind, background, accessory, color, expression, shape і size bucket."
telemetry_limits = "Telemetry не містить raw identifiers, tenant або style namespace values, IP addresses, user agents, referrers, full URLs, cookies або free-form text. Telemetry endpoints приймають лише allow-listed aggregate labels."
logging = "Logs та інфраструктура"
logging_text = "Залежно від deployment, infrastructure components на кшталт nginx, Caddy, Cloudflare, hosting providers або S3-compatible storage можуть зберігати access logs і operational metadata. Ці logs є частиною роботи public service і можуть містити requested identifier, якщо він є в URL."
avoid = "Що краще не надсилати"
avoid_text = "Email-shaped identifiers accepted для compatibility, але URLs можуть з'являтися в infrastructure logs. Надсилайте stable internal id або one-way application hash, якщо хочете уникнути personal data в request URL."
repository = "Repository і crate"
repository_text = "Ви можете переглянути implementation у public API repository і reusable avatar renderer у Rust crate."
translations = "Примітка щодо перекладів"
translations_text = "Переклади сайту виконані за допомогою ШІ та на основі найкращих зусиль. Якщо ви бачите формулювання, яке варто покращити, внески на GitHub вітаються."
