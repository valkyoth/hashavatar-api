[pages.help]
title = "Hilfe"
description = "Integrationsanleitung für die Nutzung der hashavatar.app Avatar-API in Web-Apps, Frontends und Backends."
eyebrow = "Integrationsanleitung"
lead = "Nutze hashavatar.app direkt aus dem Browser, deinem Frontend oder deinem Backend. Jede Avatar-URL ist deterministisch, sodass dieselbe Kennung und dieselben Optionen immer dasselbe Ergebnis erzeugen."
basic_url = "Basis-URL"
basic_url_text = "Nutze den Query-Endpunkt, wenn du eine einfache öffentliche Bild-URL möchtest."
path_style = "Pfad-URL"
path_style_text = "Nutze die Pfadform, wenn du sauberere Einbettungs-URLs bevorzugst."
html_example = "HTML-Beispiel"
javascript_example = "JavaScript-Beispiel"
supported_parameters = "Unterstützte Parameter"
style_layer_note = "Accessoire- und Ausdrucks-Layer gelten für charakterartige Familien. Objektartige Familien wie planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup und shield werden auf accessory=none und expression=default normalisiert."
signed_storage_links = "Signierte Speicher-Links"
signed_storage_links_text = "Wenn dieser Deployment Objekt-Speicher konfiguriert hat, fordere einen vorsignierten Speicher-Link über /v1/avatar/link an. Dieser Endpunkt speichert das erzeugte Objekt und gibt JSON mit signierter URL, Objekt-Key und gehashtem Cache-Key zurück. Normale Avatar-Antworten geben keine signierten Link-Metadaten in Response-Headern aus."
open_source = "Open Source"
open_source_text = "Der öffentliche Quellcode der Website liegt im API-Repository und der wiederverwendbare Avatar-Renderer ist auf crates.io veröffentlicht."

[pages.docs]
title = "Dokumentation"
description = "Referenzdokumentation für die öffentliche hashavatar.app Avatar-API, den Speicher-Link-Endpunkt und den namespace-fähigen Identitätsvertrag."
eyebrow = "API-Referenz"
lead = "Dies ist die produktorientierte Referenz für die öffentliche API. Dieselbe Identität, derselbe Tenant, dieselbe Stilversion, Avatar-Familie, Stiloptionen, Größe und WebP-Ausgabe sollen innerhalb einer Major-Version stabil bleiben."
core_endpoints = "Kern-Endpunkte"
operational_endpoints = "Betriebs-Endpunkte"
operational_text = "GET /healthz ist öffentlich für Load Balancer und Uptime-Prüfungen. GET /metrics ist nur über Loopback erreichbar und gibt 404 für nicht-lokale Peers zurück."
namespace_support = "Namespace-Unterstützung"
namespace_text = "Nutze tenant und style_version, um visuelle Identitätsräume zwischen Produkten oder Rollout-Phasen zu trennen."
anonymous_ids = "Anonyme IDs"
anonymous_text = "Sende eine stabile interne ID oder einen Einweg-Anwendungs-Hash statt roher personenbezogener Daten."
rate_limits = "Rate Limits"
rate_limits_text = "Der öffentliche Dienst wendet origin-seitige Rate Limits an, mit strengeren Limits für /v1/avatar/link, direkte Avatar-Anfragen mit persist=true und /og.png, weil Objekt-Speicher-Schreibvorgänge und Open-Graph-Rendering teurer sind als direktes Rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar-Erzeugung und Speicheroperationen sind durch serverseitige Timeouts begrenzt, sodass teure Anfragen den Origin nicht unbegrenzt blockieren können."
errors = "Fehler"
error_bad_request = "ungültiger kind-Wert, nicht unterstützter Algorithmus oder Format, ungültige Größe oder fehlende Identität"
error_timeout = "Timeout bei Erzeugung oder Speicherung"
error_rate_limit = "Rate Limit überschritten"
error_internal = "Rendering- oder Speicherfehler"
openapi = "OpenAPI"
openapi_text = "Für generierte Clients oder Werkzeuge verwende"

[pages.terms]
title = "Bedingungen"
description = "Best-Effort-Nutzungsbedingungen für die öffentliche hashavatar.app Avatar-API und Demo-Website."
eyebrow = "Servicebedingungen"
lead = "Dieser öffentliche Dienst wird informativ und nach Best Effort bereitgestellt. Nutze ihn nur, wenn dieses Risikoprofil zu deiner Anwendung passt."
no_warranty = "Keine Garantie"
no_warranty_text = "Dieser Dienst und alle erzeugten Ausgaben werden wie besehen und nach Verfügbarkeit bereitgestellt, ohne Garantien jeglicher Art, weder ausdrücklich noch implizit. Wir versprechen keine Verfügbarkeit, Korrektheit, Eignung für einen bestimmten Zweck, unterbrechungsfreien Betrieb oder Kompatibilität mit deinen Systemen."
no_liability = "Keine Haftung"
no_liability_text = "Wir sind nicht verantwortlich für Ausfälle, Störungen, verringerte Leistung, kaputte Links, Cache-Verhalten, Datenverlust, beschädigte Objekte, Ausfälle von Drittanbietern oder direkte oder indirekte Schäden aus deiner Nutzung des Dienstes."
fallback_text = "Wenn du diese Avatare in Produktion brauchst, solltest du eigenes Fallback-Verhalten, eine Cache-Strategie und einen Verfügbarkeitsplan umsetzen."
acceptable_use = "Zulässige Nutzung"
acceptable_use_text = "Nutze den Dienst nicht, um Infrastruktur zu überlasten, Rate Limits oder Cache-Kontrollen zu umgehen, missbräuchliche Traffic-Muster zu testen oder illegale Inhalte über Persistenzfunktionen zu speichern."
changes = "Änderungen"
changes_text = "Wir können den öffentlichen Dienst jederzeit und ohne Ankündigung ändern, begrenzen, aussetzen oder einstellen. Öffentliche Endpunkte, Ausgabedetails oder Betriebslimits können sich mit der Weiterentwicklung des Dienstes ändern."
legal_note = "Diese Seite ist betriebliche Orientierung, keine Rechtsberatung. Wenn du formale rechtliche Bedingungen für einen geschäftlichen Deployment brauchst, solltest du eine geprüfte Version für deine Jurisdiktion und Betreiberentität veröffentlichen."

[pages.privacy]
title = "Datenschutz"
description = "Datenschutzhinweis für hashavatar.app zu Request-Daten, Logs und optionalem Objekt-Speicher-Verhalten."
eyebrow = "Datenschutzhinweis"
lead = "Der Dienst ist bewusst einfach, aber eine öffentliche Avatar-API erhält trotzdem einige Request-Daten, um zu funktionieren. Diese Seite beschreibt diese praktische Grundlage."
receives = "Was der Dienst erhält"
receives_identity = "die opaque Kennung, die du in die Anfrage setzt, zum Beispiel eine interne ID, ein Benutzername oder ein Einweg-Hash"
receives_parameters = "Request-Parameter wie Avatar-Typ, Stiloptionen, Größe, Format und Hintergrund"
receives_http_metadata = "standardmäßige HTTP-Metadaten, die vom Server, Reverse Proxy und CDN verarbeitet werden, zum Beispiel IP-Adresse, User Agent, Referrer und Request-Timing"
stores = "Was die App selbst speichert"
stores_text = "Die Anwendung benötigt keine Benutzerkonten und setzt standardmäßig keine Anwendungs-Cookies. Im normalen Request-Fluss erzeugt sie den Avatar bei Bedarf und gibt ihn direkt zurück."
storage_text = "Wenn Objekt-Speicher-Unterstützung aktiviert ist und eine signierte Link- oder Persistenzroute genutzt wird, können die erzeugte Avatar-Datei und ihr Objekt-Key im konfigurierten S3-kompatiblen Bucket gespeichert werden."
telemetry = "Datenschutzfreundliche Telemetrie"
telemetry_text = "Wenn Telemetrie vom Betreiber aktiviert ist, sendet die App aggregierte OpenTelemetry-Metriken für Seitenaufrufe, sichtbare Seitenzeit, Repository- und Crate-Klicks, Demo-Aktionen und Avatar-Erzeugungen gruppiert nach begrenzten Stiloptionen wie kind, background, accessory, color, expression, shape und Größen-Bucket."
telemetry_limits = "Telemetrie enthält keine rohen Kennungen, Tenant- oder Style-Namespace-Werte, IP-Adressen, User Agents, Referrer, vollständige URLs, Cookies oder Freitext. Die Telemetrie-Endpunkte akzeptieren nur erlaubte aggregierte Labels."
logging = "Logs und Infrastruktur"
logging_text = "Je nach Deployment können Infrastrukturkomponenten wie nginx, Caddy, Cloudflare, Hosting-Anbieter oder S3-kompatibler Speicher Access-Logs und Betriebsmetadaten speichern. Diese Logs gehören zum Betrieb eines öffentlichen Dienstes und können die angefragte Kennung enthalten, wenn sie in der URL steht."
avoid = "Was du besser nicht sendest"
avoid_text = "E-Mail-artige Kennungen werden aus Kompatibilitätsgründen akzeptiert, aber URLs können in Infrastruktur-Logs erscheinen. Sende eine stabile interne ID oder einen Einweg-Anwendungs-Hash, wenn du personenbezogene Daten in der Request-URL vermeiden möchtest."
repository = "Repository und Crate"
repository_text = "Du kannst die Implementierung im öffentlichen API-Repository und den wiederverwendbaren Avatar-Renderer im Rust-Crate prüfen."
translations = "Hinweis zu Übersetzungen"
translations_text = "Die Website-Übersetzungen sind KI-unterstützt und nach bestem Bemühen erstellt. Wenn eine Formulierung verbessert werden sollte, sind Beiträge auf GitHub willkommen."
translations_link = "Übersetzungen verbessern"
