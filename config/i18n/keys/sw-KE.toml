[pages.help]
title = "Msaada"
description = "Mwongozo wa integration wa kutumia hashavatar.app avatar API kwenye web apps, frontends, na backends."
eyebrow = "Mwongozo Wa Integration"
lead = "Tumia hashavatar.app moja kwa moja kutoka browser, frontend, au backend yako. Kila avatar URL ni deterministic, hivyo identifier na options sawa hutoa matokeo yale yale kila mara."
basic_url = "URL Ya Msingi"
basic_url_text = "Tumia query endpoint unapohitaji image URL ya umma iliyo rahisi."
path_style = "Path Style URL"
path_style_text = "Tumia path form ikiwa unapendelea embed URLs zilizo safi zaidi."
html_example = "Mfano Wa HTML"
javascript_example = "Mfano Wa JavaScript"
supported_parameters = "Parameters Zinazoungwa Mkono"
style_layer_note = "Accessory na expression layers hutumika kwa character-style families. Object-style families kama planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup, na shield hunormalized kuwa accessory=none na expression=default."
signed_storage_links = "Signed Storage Links"
signed_storage_links_text = "Ikiwa deployment hii ina object storage iliyosanidiwa, omba presigned storage link kutoka /v1/avatar/link. Endpoint hiyo huhifadhi generated object na kurudisha JSON yenye signed URL, object key, na hashed cache key. Avatar responses za kawaida hazionyeshi signed-link metadata kwenye response headers."
open_source = "Open Source"
open_source_text = "Source ya public site iko kwenye API repository na reusable avatar renderer imechapishwa crates.io."

[pages.docs]
title = "Nyaraka"
description = "Reference documentation ya hashavatar.app public avatar API, storage link endpoint, na namespace-aware identity contract."
eyebrow = "API Reference"
lead = "Hii ni product-facing reference ya public API. Identity, tenant, style version, avatar family, style options, size, na WebP output vinatarajiwa kubaki stable ndani ya major release."
core_endpoints = "Core Endpoints"
operational_endpoints = "Operational Endpoints"
operational_text = "GET /healthz ni public kwa load balancers na uptime checks. GET /metrics ni loopback-only na hurudisha 404 kwa non-local peers."
namespace_support = "Msaada Wa Namespace"
namespace_text = "Tumia tenant na style_version kutenganisha visual identity spaces kati ya products au rollout phases."
anonymous_ids = "ID Zisizo Na Majina"
anonymous_text = "Tuma internal stable id au one-way application hash badala ya raw personal data."
rate_limits = "Rate Limits"
rate_limits_text = "Public service hutekeleza origin-side rate limits, na limit kali zaidi kwa /v1/avatar/link, direct avatar requests zenye persist=true, na /og.png kwa sababu object storage writes na Open Graph image rendering ni ghali zaidi kuliko direct rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar generation na storage operations zinawekewa server-side timeouts ili request ghali zisichukue origin bila kikomo."
errors = "Errors"
error_bad_request = "kind si sahihi, unsupported algorithm au format, size, au missing identity"
error_timeout = "generation au storage timeout"
error_rate_limit = "rate limit exceeded"
error_internal = "rendering au storage failure"
openapi = "OpenAPI"
openapi_text = "Kwa generated clients au tooling, tumia"

[pages.terms]
title = "Masharti"
description = "Best-effort service terms kwa public hashavatar.app avatar API na demo website."
eyebrow = "Masharti Ya Huduma"
lead = "Public service hii hutolewa kwa taarifa na kwa msingi wa best-effort. Itumie tu ikiwa risk profile hii inafaa kwa application yako."
no_warranty = "Hakuna Warranty"
no_warranty_text = "Service hii na generated outputs zote hutolewa as-is na as-available, bila warranty yoyote. Hatuhakikishi availability, correctness, fitness for a particular purpose, uninterrupted operation, au compatibility with your systems."
no_liability = "Hakuna Liability"
no_liability_text = "Hatuwajibiki kwa downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures, au direct/indirect damages kutokana na matumizi ya service."
fallback_text = "Ikiwa unategemea avatars hizi kwenye production, unapaswa kutekeleza fallback behavior, caching strategy, na availability plan yako mwenyewe."
acceptable_use = "Matumizi Yanayokubalika"
acceptable_use_text = "Usitumie service kupakia infrastructure kupita kiasi, kupita rate limits au cache controls, kujaribu abusive traffic patterns, au kuhifadhi illegal material kupitia persistence features."
changes = "Mabadiliko"
changes_text = "Tunaweza kubadilisha, kuzuia, kusimamisha, au kusitisha public service wakati wowote bila taarifa. Public endpoints, output details, au operational limits zinaweza kubadilika service inapokua."
legal_note = "Ukurasa huu ni operational guidance, si legal advice. Ikiwa unahitaji formal legal terms kwa business deployment, chapisha reviewed version inayofaa jurisdiction na operator entity yako."

[pages.privacy]
title = "Faragha"
description = "Privacy notice ya hashavatar.app kuhusu request data, logs, na optional object storage behavior."
eyebrow = "Taarifa Ya Faragha"
lead = "Service hii imeundwa kwa makusudi kuwa rahisi, lakini public avatar API bado hupokea baadhi ya request data ili kufanya kazi. Ukurasa huu unaeleza practical baseline hiyo."
receives = "Service Inapokea Nini"
receives_identity = "opaque identifier unayoweka kwenye request, kama internal id, username, au one-way hash"
receives_parameters = "request parameters kama avatar type, style options, size, format, na background"
receives_http_metadata = "standard HTTP metadata inayoshughulikiwa na server, reverse proxy, na CDN, kama IP address, user agent, referrer, na request timing"
stores = "App Huhifadhi Nini"
stores_text = "Application haihitaji user accounts na haiweki application cookies kwa default. Katika basic request flow, app hutengeneza avatar on demand na kuirudisha moja kwa moja."
storage_text = "Ikiwa object storage support imewashwa na signed-link au persistence route inatumika, generated avatar file na object key zinaweza kuhifadhiwa kwenye configured S3-compatible bucket."
telemetry = "Telemetry Inayolinda Faragha"
telemetry_text = "Ikiwa operator anawasha telemetry, app hutuma aggregate OpenTelemetry metrics kwa page views, visible page time, repository na crate clicks, demo actions, na avatar generation counts zilizopangwa kwa bounded style choices kama kind, background, accessory, color, expression, shape, na size bucket."
telemetry_limits = "Telemetry haina raw identifiers, tenant au style namespace values, IP addresses, user agents, referrers, full URLs, cookies, au free-form text. Telemetry endpoints hupokea tu allow-listed aggregate labels."
logging = "Logs Na Infrastructure"
logging_text = "Kulingana na deployment, infrastructure components kama nginx, Caddy, Cloudflare, hosting providers, au S3-compatible storage zinaweza kuhifadhi access logs na operational metadata. Logs hizi ni sehemu ya kuendesha public service na zinaweza kuwa na requested identifier ikiwa inaonekana kwenye URL."
avoid = "Nini Ni Bora Kutopeleka"
avoid_text = "Email-shaped identifiers zinakubaliwa kwa compatibility, lakini URLs zinaweza kuonekana kwenye infrastructure logs. Tuma stable internal id au one-way application hash ikiwa unataka kuepuka personal data kwenye request URL."
repository = "Repository Na Crate"
repository_text = "Unaweza kukagua implementation kwenye public API repository na reusable avatar renderer kwenye Rust crate."
translations = "Maelezo ya tafsiri"
translations_text = "Tafsiri za tovuti zimesaidiwa na AI na zimefanywa kwa juhudi bora. Ukiona maneno yanayopaswa kuboreshwa, michango kwenye GitHub inakaribishwa."
translations_link = "Boresha tafsiri"
