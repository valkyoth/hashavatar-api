[package]
name = "hashavatar-api"
version = "0.2.0"
edition = "2024"
description = "Public avatar API and landing page for hashavatar"
license = "EUPL-1.2"
repository = "https://repoheim.eu/valkyoth/hashavatar-api"
homepage = "https://repoheim.eu/valkyoth/hashavatar-api"
documentation = "https://repoheim.eu/valkyoth/hashavatar-api"

[dependencies]
aws-config = { version = "1.5", default-features = false, features = ["rt-tokio"] }
aws-sdk-s3 = { version = "1.54", default-features = false, features = ["rt-tokio", "sigv4a"] }
hashavatar = "0.2.0"
axum = { version = "0.8", default-features = false, features = ["http1", "tokio", "query", "json"] }
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde_json = { version = "1.0", default-features = false, features = ["std"] }
sha2 = { version = "0.10", default-features = false, features = ["std"] }
tokio = { version = "1.47", default-features = false, features = ["macros", "rt-multi-thread", "net"] }
