[pages.help]
title = "Axuda"
description = "Integration guide para usar a hashavatar.app avatar API en web apps, frontends e backends."
eyebrow = "Integration Guide"
lead = "Usa hashavatar.app directamente desde o browser, frontend ou backend. Cada avatar URL é deterministic, así que o mesmo identifier e options sempre producen o mesmo output."
basic_url = "Basic URL"
basic_url_text = "Usa o query endpoint cando precises un public image URL sinxelo."
path_style = "Path Style URL"
path_style_text = "Usa a path form se prefires embed URLs máis limpos."
html_example = "Exemplo HTML"
javascript_example = "Exemplo JavaScript"
supported_parameters = "Supported Parameters"
style_layer_note = "Accessory e expression layers aplícanse ás character-style families. Object-style families como planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup e shield normalízanse a accessory=none e expression=default."
signed_storage_links = "Signed Storage Links"
signed_storage_links_text = "Se este deployment ten object storage configured, solicita un presigned storage link desde /v1/avatar/link. Ese endpoint store o generated object e devolve JSON con signed URL, object key e hashed cache key. As standard avatar responses non expoñen signed-link metadata nos response headers."
open_source = "Open Source"
open_source_text = "O source do public site está no GitHub repository e o reusable avatar renderer está publicado en crates.io."

[pages.docs]
title = "Documentación"
description = "Reference documentation para a hashavatar.app public avatar API, storage link endpoint e namespace-aware identity contract."
eyebrow = "API Reference"
lead = "Esta é a product-facing reference da public API. O mesmo identity, tenant, style version, avatar family, style options, size e WebP output deberían permanecer stable durante unha major release."
core_endpoints = "Core Endpoints"
operational_endpoints = "Operational Endpoints"
operational_text = "GET /healthz é public para load balancers e uptime checks. GET /metrics é loopback-only e devolve 404 para non-local peers."
namespace_support = "Namespace Support"
namespace_text = "Usa tenant e style_version para separar visual identity spaces entre products ou rollout phases."
anonymous_ids = "Anonymous IDs"
anonymous_text = "Envía un internal stable id ou one-way application hash no canto de raw personal data."
rate_limits = "Rate Limits"
rate_limits_text = "O public service aplica origin-side rate limits, con limits máis estritos para /v1/avatar/link, direct avatar requests con persist=true e /og.png porque object storage writes e Open Graph image rendering son máis custosos ca direct rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar generation e storage operations están bounded por server-side timeouts para que expensive requests non poidan reter o origin sen límite."
errors = "Errors"
error_bad_request = "invalid kind, unsupported algorithm ou format, size ou missing identity"
error_timeout = "generation ou storage timeout"
error_rate_limit = "rate limit exceeded"
error_internal = "rendering ou storage failure"
openapi = "OpenAPI"
openapi_text = "Para generated clients ou tooling, usa"

[pages.terms]
title = "Termos"
description = "Best-effort service terms para a public hashavatar.app avatar API e demo website."
eyebrow = "Service Terms"
lead = "Este public service ofrécese para información e sobre unha best-effort basis. Úsao só se este risk profile encaixa coa túa application."
no_warranty = "No Warranty"
no_warranty_text = "Este service e todos os generated outputs ofrécense as-is e as-available, sen ningunha warranty. Non prometemos availability, correctness, fitness for a particular purpose, uninterrupted operation nin compatibility with your systems."
no_liability = "No Liability"
no_liability_text = "Non asumimos liability por downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures nin direct/indirect damages derivados do uso do service."
fallback_text = "Se dependes destes avatars en production, debes implementar o teu propio fallback behavior, caching strategy e availability plan."
acceptable_use = "Acceptable Use"
acceptable_use_text = "Non uses o service para overload infrastructure, bypass rate limits ou cache controls, test abusive traffic patterns nin store illegal material mediante persistence features."
changes = "Cambios"
changes_text = "Podemos change, limit, suspend ou discontinue o public service en calquera momento sen notice. Public endpoints, output details ou operational limits poden cambiar a medida que o service evolve."
legal_note = "Esta page é operational guidance, non legal advice. Se precisas formal legal terms para business deployment, publish unha reviewed version axeitada á túa jurisdiction e operator entity."

[pages.privacy]
title = "Privacidade"
description = "Privacy notice para hashavatar.app sobre request data, logs e optional object storage behavior."
eyebrow = "Privacy Notice"
lead = "Este service está feito intencionadamente simple, pero a public avatar API aínda recibe algún request data para funcionar. Esta page explica ese practical baseline."
receives = "Que Recibe O Service"
receives_identity = "opaque identifier que introduces na request, como internal id, username ou one-way hash"
receives_parameters = "request parameters como avatar type, style options, size, format e background"
receives_http_metadata = "standard HTTP metadata xestionada polo server, reverse proxy e CDN, como IP address, user agent, referrer e request timing"
stores = "Que Store A App"
stores_text = "A application non require user accounts e non set application cookies by default. No basic request flow, a app generate avatar on demand e devólveo directamente."
storage_text = "Se object storage support está enabled e se usa signed-link ou persistence route, o generated avatar file e object key poden store no configured S3-compatible bucket."
telemetry = "Privacy-Preserving Telemetry"
telemetry_text = "Se o operator enable telemetry, a app emit aggregate OpenTelemetry metrics para page views, visible page time, repository e crate clicks, demo actions e avatar generation counts grouped por bounded style choices como kind, background, accessory, color, expression, shape e size bucket."
telemetry_limits = "Telemetry non contén raw identifiers, tenant ou style namespace values, IP addresses, user agents, referrers, full URLs, cookies nin free-form text. Telemetry endpoints só aceptan allow-listed aggregate labels."
logging = "Logs E Infrastructure"
logging_text = "Segundo o deployment, infrastructure components como nginx, Caddy, Cloudflare, hosting providers ou S3-compatible storage poden store access logs e operational metadata. Estes logs forman parte da execución do public service e poden conter o requested identifier se aparece na URL."
avoid = "Que É Mellor Non Enviar"
avoid_text = "Email-shaped identifiers acéptanse por compatibility, pero URLs poden aparecer en infrastructure logs. Envía un stable internal id ou one-way application hash se queres evitar personal data na request URL."
repository = "Repository E Crate"
repository_text = "Podes revisar a implementation no public GitHub repository e o reusable avatar renderer no Rust crate."
translations = "Nota sobre as traducións"
translations_text = "As traducións do sitio web están asistidas por IA e feitas co mellor esforzo. Se ves texto que debería mellorarse, as contribucións en GitHub son benvidas."
translations_link = "Mellorar traducións"
