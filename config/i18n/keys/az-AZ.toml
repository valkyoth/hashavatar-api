[pages.privacy]
title = "Məxfilik"
description = "Request data, logs və optional object storage behavior haqqında hashavatar.app privacy notice."
eyebrow = "Privacy Notice"
lead = "Bu service qəsdən simple saxlanılıb, amma public avatar API işləmək üçün yenə də müəyyən request data alır. Bu page həmin practical baseline-ı izah edir."
receives = "Service Nə Alır"
receives_identity = "request-ə qoyduğun opaque identifier, məsələn internal id, username və ya one-way hash"
receives_parameters = "avatar type, style options, size, format və background kimi request parameters"
receives_http_metadata = "server, reverse proxy və CDN tərəfindən işlənən standard HTTP metadata, məsələn IP address, user agent, referrer və request timing"
stores = "App Nə Store Edir"
stores_text = "Application user accounts tələb etmir və default olaraq application cookies set etmir. Basic request flow-da app avatar generate edir və birbaşa return edir."
storage_text = "Object storage support enabled-dirsə və signed-link və ya persistence route istifadə edilirsə, generated avatar file və object key configured S3-compatible bucket-də store edilə bilər."
telemetry = "Privacy-Preserving Telemetry"
telemetry_text = "Operator telemetry enable edərsə, app page views, visible page time, repository və crate clicks, demo actions və avatar generation counts üçün aggregate OpenTelemetry metrics emit edir; bunlar kind, background, accessory, color, expression, shape və size bucket kimi bounded style choices üzrə grouped olur."
telemetry_limits = "Telemetry raw identifiers, tenant və ya style namespace values, IP addresses, user agents, referrers, full URLs, cookies və ya free-form text daxil etmir. Telemetry endpoints yalnız allow-listed aggregate labels qəbul edir."
logging = "Logs Və Infrastructure"
logging_text = "Deployment-dən asılı olaraq nginx, Caddy, Cloudflare, hosting providers və ya S3-compatible storage kimi infrastructure components access logs və operational metadata store edə bilər. Bu logs public service-in işləməsinin bir hissəsidir və requested identifier URL-də görünürsə onu daxil edə bilər."
avoid = "Nə Göndərməmək Daha Yaxşıdır"
avoid_text = "Email-shaped identifiers compatibility üçün qəbul olunur, amma URLs infrastructure logs-da görünə bilər. Request URL-də personal data-dan qaçmaq istəyirsənsə stable internal id və ya one-way application hash göndər."
