telemetry_limits = "テレメトリには、生の識別子、tenantやstyle namespace値、IPアドレス、user agent、referrer、完全なURL、Cookie、自由入力テキストは含まれません。テレメトリエンドポイントは許可された集計ラベルのみ受け付けます。"
logging = "ログとインフラ"
