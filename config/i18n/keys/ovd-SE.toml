[pages.terms]
title = "Wilkuor"
description = "Best-effort-wilkuor fyr det almenna hashavatar.app-avatar-API:t og demosajtę."
eyebrow = "Tjänstewilkuor"
lead = "Denna almenna tjänst ges fyr informasjuon og enligt best effort. Bruk an bara um den riskprofiln passar din applikasjuon."
no_warranty = "Inga garantier"
no_warranty_text = "Denna tjänst og alla genererað resultat ges i befintligt skick og efter tillgänglighet, utan garantier av någå slag, uttryckliga eld underförstådda. Wi lovar int tillgänglighet, korrekthet, lämplighet fyr särskilt ändamål, oavbruten drift eld kompatibilitet med dina system."
no_liability = "Inget ansvar"
no_liability_text = "Wi ansvarar int fyr driftstopp, avbrott, försämrad prestanda, trasiga länkar, cachebeteende, dataförlust, korrupta objekt, fel hos tredjepartsleverantörer eld direkta eld indirekta skador som uppstår genom din brukning av tjänsten."
fallback_text = "Um du ir beroende av dessa avatarer i produktion bör du implementera eget fallback-beteende, ien cache-strategi og ien tillgänglighetsplan."
acceptable_use = "Godtagbar brukning"
acceptable_use_text = "Bruk int tjänsten fyr at överbelasta infrastrukturen, kringgå hastighetsgränser eld cachekontroller, testa missbrukande trafikmönster eld lagra olagligt material via någå persistensfunktion."
changes = "Ändringar"
changes_text = "Wi kan ändra, begränsa, pausa eld avsluta den almenna tjänsten när som helst og utan förvarning. Almenna endpoints, utdatasdetaljer eld driftsgränser kan ändras när tjänsten utvecklas."
legal_note = "Denna sida ir operativ vägledning, int juridisk rådgivning. Um du behöver formella juridiska wilkuor fyr ien affärsdeployment bör du publicera ien granskad version som passar din jurisdiktion og operatörsenhet."

[pages.privacy]
title = "Integritet"
description = "Integritetsmeddelande fyr hashavatar.app som täcker förfrågningsdata, loggar og valfritt objektlagringsbeteende."
eyebrow = "Integritetsmeddelande"
lead = "Tjänsten ir avsiktligt enkel, men iet alment avatar-API tar ändå emot viss förfrågningsdata fyr at fungera. Denna sida beskriver den praktiska baslinjen."
receives = "Wað tjänsten tar emot"
receives_identity = "den opaka identifierär du legger i förfrågan, till exempel iet internt id, brukårnamn eld envägs-hash"
receives_parameters = "förfrågningsparameträr som avatartyp, stilalternativ, storlek, format og bakgrund"
receives_http_metadata = "standardiserad HTTP-metadata som hanteras av servern, reverse proxyn og CDN:et, till exempel IP-adress, user agent, referrer og förfrågningstid"
stores = "Wað appn själv lagrer"
stores_text = "Applikasjuonę kräver inga brukarkonton og sätter som standard inga applikationscookies. I det grundläggande förfrågningsflödet genererar den avataren vid behov og returnerer an direkt."
storage_text = "Um objektlagringsstöd ir aktiverat og ien signerað länk- eld persistensroute brukas kan den genererað avatarfiln og dess objektnyckel lagras i den konfigurerade S3-kompatibla bucketen."
telemetry = "Integritetsvänlig telemetri"
telemetry_text = "Um telemetri ir aktiverat av operatören skickar appn aggregerade OpenTelemetry-mätvärden fyr sidvisningar, synlig sidtid, klick till repository og crate, demoåtgärder og avatar-genereringar grupperade efter begränsade stilval som kind, background, accessory, color, expression, shape og storleksbucket."
telemetry_limits = "Telemetri inkluderer int råa identifierär, tenant- eld style namespace-värden, IP-adresser, user agents, referrers, fullständiga URL:er, cookies eld fritext. Telemetri-endpoints accepterer bara tillåtna aggregerade labels."
logging = "Loggar og infrastruktur"
logging_text = "Beroende på deployment kan infrastrukturkomponenter som nginx, Caddy, Cloudflare, hosting-leverantörer eld S3-kompatibel lagring spara åtkomstloggar og driftmetadata. Dessa loggar ir ien del av at driva ien almenn tjänst og kan innehålla identifierärn du begärde um an finns i URL:en."
avoid = "Wað du bör undvika at skicka"
avoid_text = "E-postliknande identifierär accepteras fyr kompatibilitet, men URL:er kan förekomma i infrastrukturloggar. Skicka iet stadugt internt id eld ien envägs-applikationshash när du will undvika at lägga persondata i förfrågnings-URL:en."
repository = "Repository og crate"
repository_text = "Du kan granska implementationę i det almenna API-repositoryt og den återanvändbara avatar-renderaren i Rust-craten."
