supported_parameters = "Parameträr som stödjes"
style_layer_note = "Tillbehörs- og uttrykkslager gäller fyr karaktärsliknande familjer. Objektfamiljer som planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup og shield normaliseras till accessory=none og expression=default."
signed_storage_links = "Signeraðar lagringslänkar"
signed_storage_links_text = "Um denna deployment ar objektlagring konfigurerad, begär ien försignerað lagringslänk frå /v1/avatar/link. Den endpointen lagrer det genererað objektę og returnerer JSON med signerað URL, objektnyckel og ien hashad cachenyckel. Vanliga avatarsvar visar int metadata fyr signeraðar länkar i svarshuvuden."
open_source = "Öppen källkod"
open_source_text = "Den almenna webbplatsens källkod finns i API-repositoryt og den återanvändbara avatar-renderaren publiceras på crates.io."

[pages.docs]
