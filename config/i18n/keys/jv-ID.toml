[pages.help]
title = "Pitulung"
description = "Pandhuan integrasi kanggo nggunakake hashavatar.app avatar API ing web apps, frontends, lan backends."
eyebrow = "Pandhuan Integrasi"
lead = "Gunakake hashavatar.app langsung saka browser, frontend, utawa backend sampeyan. Saben avatar URL deterministik, mula identifier lan opsi sing padha mesthi ngasilake asil sing padha."
basic_url = "URL Dhasar"
basic_url_text = "Gunakake query endpoint nalika sampeyan butuh image URL publik sing prasaja."
path_style = "Path Style URL"
path_style_text = "Gunakake wangun path yen luwih seneng embed URLs sing luwih resik."
html_example = "Tuladha HTML"
javascript_example = "Tuladha JavaScript"
supported_parameters = "Parameter Sing Didukung"
style_layer_note = "Accessory lan expression layers ditrapake kanggo character-style families. Object-style families kayata planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup, lan shield dinormalisasi dadi accessory=none lan expression=default."
signed_storage_links = "Tautan Panyimpenan Ditandatangani"
signed_storage_links_text = "Yen deployment iki duwe object storage sing dikonfigurasi, jaluk presigned storage link saka /v1/avatar/link. Endpoint kasebut nyimpen generated object lan mbalekake JSON nganggo signed URL, object key, lan hashed cache key. Avatar responses standar ora nampilake signed-link metadata ing response headers."
open_source = "Open Source"
open_source_text = "Source situs publik ana ing API repository lan reusable avatar renderer diterbitake ing crates.io."

[pages.docs]
title = "Dokumentasi"
description = "Reference documentation kanggo hashavatar.app public avatar API, storage link endpoint, lan namespace-aware identity contract."
eyebrow = "API Reference"
lead = "Iki product-facing reference kanggo public API. Identity, tenant, style version, avatar family, style options, size, lan WebP output sing padha dikarepake tetep stabil sajrone major release."
core_endpoints = "Core Endpoints"
operational_endpoints = "Operational Endpoints"
operational_text = "GET /healthz public kanggo load balancers lan uptime checks. GET /metrics loopback-only lan mbalekake 404 kanggo non-local peers."
namespace_support = "Dhukungan Namespace"
namespace_text = "Gunakake tenant lan style_version kanggo misahake visual identity spaces antar produk utawa rollout phases."
anonymous_ids = "ID Anonim"
anonymous_text = "Kirim internal stable id utawa one-way application hash tinimbang raw personal data."
rate_limits = "Rate Limits"
rate_limits_text = "Public service ngetrapake origin-side rate limits, kanthi limit luwih ketat kanggo /v1/avatar/link, direct avatar requests nganggo persist=true, lan /og.png amarga object storage writes lan Open Graph image rendering luwih larang tinimbang direct rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar generation lan storage operations diwatesi server-side timeouts supaya request larang ora bisa nguwasani origin tanpa wates."
errors = "Errors"
error_bad_request = "kind ora valid, unsupported algorithm utawa format, size, utawa missing identity"
error_timeout = "generation utawa storage timeout"
error_rate_limit = "rate limit exceeded"
error_internal = "rendering utawa storage failure"
openapi = "OpenAPI"
openapi_text = "Kanggo generated clients utawa tooling, gunakake"

[pages.terms]
title = "Syarat"
description = "Best-effort service terms kanggo public hashavatar.app avatar API lan demo website."
eyebrow = "Syarat Layanan"
lead = "Public service iki diwenehake kanggo informasi lan adhedhasar best-effort. Gunakake mung yen risk profile iki cocog kanggo aplikasi sampeyan."
no_warranty = "Ora Ana Garansi"
no_warranty_text = "Layanan iki lan kabeh generated outputs diwenehake as-is lan as-available, tanpa garansi apa wae. Kita ora janji availability, correctness, fitness for a particular purpose, uninterrupted operation, utawa compatibility with your systems."
no_liability = "Ora Ana Tanggung Jawab"
no_liability_text = "Kita ora tanggung jawab kanggo downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures, utawa damages langsung utawa ora langsung saka panggunaan layanan."
fallback_text = "Yen sampeyan gumantung marang avatar iki ing production, sampeyan kudu ngetrapake fallback behavior, caching strategy, lan availability plan dhewe."
acceptable_use = "Panggunaan Sing Ditampa"
acceptable_use_text = "Aja nggunakake layanan kanggo mbebani infrastructure, ngliwati rate limits utawa cache controls, nguji abusive traffic patterns, utawa nyimpen illegal material liwat persistence features."
changes = "Owah-owahan"
changes_text = "Kita bisa ngganti, matesi, nundha, utawa mungkasi public service kapan wae tanpa kabar. Public endpoints, output details, utawa operational limits bisa owah nalika layanan berkembang."
legal_note = "Kaca iki operational guidance, dudu legal advice. Yen sampeyan butuh formal legal terms kanggo business deployment, terbitake reviewed version sing cocog karo jurisdiction lan operator entity sampeyan."

[pages.privacy]
title = "Privasi"
description = "Privacy notice kanggo hashavatar.app babagan request data, logs, lan optional object storage behavior."
eyebrow = "Pawarta Privasi"
lead = "Layanan iki sengaja digawe prasaja, nanging public avatar API isih nampa sawetara request data supaya bisa mlaku. Kaca iki nerangake baseline praktis kasebut."
receives = "Apa Sing Ditampa Layanan"
receives_identity = "opaque identifier sing sampeyan lebokake ing request, kayata internal id, username, utawa one-way hash"
receives_parameters = "request parameters kayata avatar type, style options, size, format, lan background"
receives_http_metadata = "standard HTTP metadata sing ditangani server, reverse proxy, lan CDN, kayata IP address, user agent, referrer, lan request timing"
stores = "Apa Sing Disimpen App"
stores_text = "Aplikasi ora mbutuhake user accounts lan ora masang application cookies kanthi default. Ing basic request flow, app nggawe avatar on demand lan mbalekake langsung."
storage_text = "Yen object storage support diaktifake lan signed-link utawa persistence route digunakake, generated avatar file lan object key bisa disimpen ing S3-compatible bucket sing dikonfigurasi."
telemetry = "Telemetry Sing Njaga Privasi"
telemetry_text = "Yen operator ngaktifake telemetry, app ngirim aggregate OpenTelemetry metrics kanggo page views, visible page time, repository lan crate clicks, demo actions, lan avatar generation counts sing dikelompokake miturut bounded style choices kayata kind, background, accessory, color, expression, shape, lan size bucket."
telemetry_limits = "Telemetry ora ngemot raw identifiers, tenant utawa style namespace values, IP addresses, user agents, referrers, full URLs, cookies, utawa free-form text. Telemetry endpoints mung nampa allow-listed aggregate labels."
logging = "Logs Lan Infrastruktur"
logging_text = "Gumantung deployment, infrastructure components kayata nginx, Caddy, Cloudflare, hosting providers, utawa S3-compatible storage bisa nyimpen access logs lan operational metadata. Logs iki bagean saka nglakokake public service lan bisa ngemot requested identifier yen katon ing URL."
avoid = "Apa Sing Becik Ora Dikirim"
avoid_text = "Email-shaped identifiers ditampa kanggo compatibility, nanging URLs bisa katon ing infrastructure logs. Kirim stable internal id utawa one-way application hash yen pengin ngindhari personal data ing request URL."
repository = "Repository Lan Crate"
repository_text = "Sampeyan bisa mriksa implementation ing public API repository lan reusable avatar renderer ing Rust crate."
translations = "Cathetan Terjemahan"
translations_text = "Terjemahan situs web iki dibantu AI lan digawe kanthi upaya paling apik. Yen sampeyan nemokake ukara sing perlu dibenerake, kontribusi ing GitHub ditampa kanthi seneng."
translations_link = "Dandani terjemahan"
