[pages.terms]
title = "Vilkår"
description = "Best-effort servicevilkår for hashavatar.app public avatar API og demosite."
eyebrow = "Servicevilkår"
lead = "Denne offentlige service leveres til informationsformål og best-effort. Brug den kun, hvis denne risikoprofil passer til din applikation."
no_warranty = "Ingen garanti"
no_warranty_text = "Denne service og alle genererede outputs leveres som de er og efter tilgængelighed, uden nogen form for garanti, hverken udtrykkelig eller underforstået. Vi lover ikke tilgængelighed, korrekthed, egnethed til et bestemt formål, uafbrudt drift eller kompatibilitet med dine systemer."
no_liability = "Intet ansvar"
no_liability_text = "Vi er ikke ansvarlige for downtime, driftsafbrydelser, forringet ydeevne, ødelagte links, cache-adfærd, datatab, korrupte objekter, fejl hos tredjepartsleverandører eller direkte eller indirekte skader som følge af din brug af servicen."
fallback_text = "Hvis du er afhængig af disse avatarer i production, bør du implementere din egen fallback-adfærd, cachingstrategi og tilgængelighedsplan."
acceptable_use = "Acceptabel brug"
acceptable_use_text = "Brug ikke servicen til at overbelaste infrastrukturen, omgå rate limits eller cache controls, teste abusive traffic patterns eller lagre ulovligt materiale gennem nogen persistence-funktion."
changes = "Ændringer"
changes_text = "Vi kan ændre, begrænse, suspendere eller afvikle den offentlige service når som helst og uden varsel. Offentlige endpoints, outputdetaljer eller operationelle limits kan ændre sig, efterhånden som servicen udvikler sig."
legal_note = "Denne side er operationel vejledning, ikke juridisk rådgivning. Hvis du har brug for formelle juridiske vilkår til en forretningsdeployment, bør du publicere en gennemgået version specifik for din jurisdiktion og operatørenhed."

[pages.privacy]
title = "Privatliv"
description = "Privatlivsmeddelelse for hashavatar.app om requestdata, logs og valgfri objektlageradfærd."
eyebrow = "Privatlivsmeddelelse"
lead = "Servicen er bevidst enkel, men en offentlig avatar-API modtager stadig nogle requestdata for at fungere. Denne side beskriver den praktiske baseline."
receives = "Hvad servicen modtager"
receives_identity = "den uigennemsigtige identifikator, du lægger i requesten, såsom intern id, brugernavn eller envejs-hash"
receives_parameters = "requestparametre såsom avatartype, stilindstillinger, størrelse, format og baggrund"
receives_http_metadata = "standard HTTP-metadata håndteret af serveren, reverse proxy og CDN, såsom IP-adresse, user agent, referrer og request timing"
stores = "Hvad appen selv gemmer"
stores_text = "Applikationen kræver ikke brugerkonti og sætter som standard ikke application cookies. I det basale requestflow genererer den avataren on demand og returnerer den direkte."
storage_text = "Hvis objektlagerunderstøttelse er aktiveret, og en signed-link eller persistence route bruges, kan den genererede avatarfil og dens object key gemmes i den konfigurerede S3-kompatible bucket."
telemetry = "Privatlivsbevarende telemetry"
telemetry_text = "Hvis telemetry er aktiveret af operatøren, udsender appen aggregerede OpenTelemetry-metrics for page views, synlig sidetid, repository- og crate-clicks, demo-actions og avatar-genereringer grupperet efter afgrænsede stilvalg som kind, background, accessory, color, expression, shape og size bucket."
telemetry_limits = "Telemetry inkluderer ikke rå identifikatorer, tenant- eller style namespace-værdier, IP-adresser, user agents, referrers, fulde URLs, cookies eller fritekst. Telemetry endpoints accepterer kun allow-listede aggregerede labels."
logging = "Logs og infrastruktur"
logging_text = "Afhængigt af deployment kan infrastrukturkomponenter som nginx, Caddy, Cloudflare, hostingudbydere eller S3-kompatibelt lager gemme access logs og operationel metadata. Disse logs er en del af driften af en offentlig service og kan indeholde den identifikator, du requestede, hvis den optræder i URL'en."
avoid = "Hvad du bør undgå at sende"
avoid_text = "Email-lignende identifikatorer accepteres af kompatibilitetshensyn, men URLs kan optræde i infrastrukturlogs. Send en stabil intern id eller envejs application hash, når du vil undgå at placere persondata i request-URL'en."
repository = "Repository og crate"
repository_text = "Du kan inspicere implementationen i det offentlige API-repository og den genbrugelige avatar-renderer i Rust-craten."
translations = "Bemærkning om oversættelser"
translations_text = "Webstedets oversættelser er AI-assisterede og lavet efter bedste evne. Hvis du ser formuleringer, der bør forbedres, er bidrag velkomne på GitHub."
