style_layer_note = "Accessory e expression layers s'applicano ê character-style families. Object-style families comme planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup e shield se normalizzano a accessory=none e expression=default."
signed_storage_links = "Link Storage Firmate"
signed_storage_links_text = "Si chistu deployment tene object storage configurato, addimanna nu presigned storage link da /v1/avatar/link. Chillo endpoint sarva 'o generated object e torna JSON cu signed URL, object key e hashed cache key. 'E avatar responses standard nun espongono signed-link metadata dint'ê response headers."
open_source = "Open Source"
