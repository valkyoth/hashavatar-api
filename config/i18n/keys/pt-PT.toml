[hero]
eyebrow = "hashavatar.app"
title = "Gera um avatar público em segundos"
description = "Transforma qualquer id de utilizador opaco, nome estável ou hash unidirecional num URL de avatar determinístico. Escolhe o estilo, fundo e tamanho, depois copia o URL WebP, descarrega o resultado ou cria uma ligação assinada de armazenamento de objetos."
privacy_tip = "Dica de privacidade: identificadores com formato de e-mail são aceites por conveniência, mas um id interno estável ou um hash unidirecional é melhor quando queres menos dados pessoais nos logs de URL."

