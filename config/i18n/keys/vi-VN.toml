[pages.terms]
title = "Điều khoản"
description = "Điều khoản dịch vụ best-effort cho API avatar công khai hashavatar.app và trang demo."
eyebrow = "Điều khoản dịch vụ"
lead = "Dịch vụ công khai này được cung cấp cho mục đích thông tin và theo best effort. Chỉ dùng nếu hồ sơ rủi ro đó phù hợp với ứng dụng của bạn."
no_warranty = "Không bảo đảm"
no_warranty_text = "Dịch vụ này và mọi đầu ra được tạo được cung cấp nguyên trạng và tùy theo khả dụng, không có bất kỳ bảo đảm nào, dù rõ ràng hay ngụ ý. Chúng tôi không cam kết khả dụng, đúng đắn, phù hợp mục đích cụ thể, vận hành không gián đoạn hoặc tương thích với hệ thống của bạn."
no_liability = "Không chịu trách nhiệm"
no_liability_text = "Chúng tôi không chịu trách nhiệm về downtime, sự cố, hiệu năng giảm, liên kết hỏng, hành vi cache, mất dữ liệu, đối tượng hỏng, lỗi nhà cung cấp bên thứ ba hoặc thiệt hại trực tiếp hay gián tiếp phát sinh từ việc dùng dịch vụ."
fallback_text = "Nếu bạn phụ thuộc vào các avatar này trong production, hãy tự triển khai fallback, chiến lược cache và kế hoạch khả dụng."
acceptable_use = "Sử dụng chấp nhận được"
acceptable_use_text = "Không dùng dịch vụ để làm quá tải hạ tầng, né giới hạn tốc độ hoặc kiểm soát cache, thử mẫu lưu lượng lạm dụng, hoặc lưu vật liệu bất hợp pháp qua bất kỳ tính năng persist nào."
changes = "Thay đổi"
changes_text = "Chúng tôi có thể thay đổi, giới hạn, tạm ngưng hoặc chấm dứt dịch vụ công khai bất cứ lúc nào mà không báo trước. Endpoint công khai, chi tiết đầu ra hoặc giới hạn vận hành có thể thay đổi khi dịch vụ phát triển."
legal_note = "Trang này là hướng dẫn vận hành, không phải tư vấn pháp lý. Nếu cần điều khoản pháp lý chính thức cho deployment kinh doanh, hãy phát hành bản đã được rà soát riêng cho thẩm quyền và đơn vị vận hành của bạn."

[pages.privacy]
title = "Quyền riêng tư"
description = "Thông báo quyền riêng tư của hashavatar.app về dữ liệu request, log và hành vi lưu trữ đối tượng tùy chọn."
eyebrow = "Thông báo quyền riêng tư"
lead = "Dịch vụ cố ý đơn giản, nhưng API avatar công khai vẫn nhận một số dữ liệu request để hoạt động. Trang này mô tả đường cơ sở thực tế đó."
receives = "Dịch vụ nhận gì"
receives_identity = "định danh mờ bạn đặt trong request, chẳng hạn id nội bộ, tên người dùng hoặc hash một chiều"
receives_parameters = "tham số request như loại avatar, tùy chọn kiểu, kích thước, định dạng và nền"
receives_http_metadata = "metadata HTTP tiêu chuẩn do máy chủ, reverse proxy và CDN xử lý, như địa chỉ IP, user agent, referrer và thời điểm request"
stores = "Ứng dụng tự lưu gì"
stores_text = "Ứng dụng không yêu cầu tài khoản người dùng và mặc định không đặt cookie ứng dụng. Trong luồng request cơ bản, nó tạo avatar theo yêu cầu và trả trực tiếp."
storage_text = "Nếu hỗ trợ object storage được bật và route liên kết đã ký hoặc persist được dùng, file avatar đã tạo và object key của nó có thể được lưu trong bucket tương thích S3 đã cấu hình."
telemetry = "Telemetry tôn trọng quyền riêng tư"
telemetry_text = "Nếu operator bật telemetry, ứng dụng phát metric OpenTelemetry tổng hợp cho lượt xem trang, thời gian trang hiển thị, click tới repository và crate, hành động demo, và số lần tạo avatar được nhóm theo các lựa chọn kiểu có giới hạn như kind, background, accessory, color, expression, shape và bucket kích thước."
telemetry_limits = "Telemetry không bao gồm định danh thô, giá trị tenant hoặc style namespace, địa chỉ IP, user agent, referrer, URL đầy đủ, cookie hoặc văn bản tự do. Endpoint telemetry chỉ chấp nhận label tổng hợp trong danh sách cho phép."
logging = "Log và hạ tầng"
logging_text = "Tùy deployment, thành phần hạ tầng như nginx, Caddy, Cloudflare, nhà cung cấp hosting hoặc lưu trữ tương thích S3 có thể giữ access log và metadata vận hành. Những log này là một phần của việc vận hành dịch vụ công khai và có thể chứa định danh bạn yêu cầu nếu nó xuất hiện trong URL."
avoid = "Nên tránh gửi gì"
avoid_text = "Định danh dạng email được chấp nhận vì tương thích, nhưng URL có thể xuất hiện trong log hạ tầng. Gửi id nội bộ ổn định hoặc hash một chiều của ứng dụng khi bạn muốn tránh đặt dữ liệu cá nhân trong URL request."
repository = "Kho mã và crate"
repository_text = "Bạn có thể xem implementation trong kho GitHub công khai và trình render avatar tái sử dụng trong Rust crate."
translations = "Ghi chú về bản dịch"
translations_text = "Các bản dịch của trang web được AI hỗ trợ và thực hiện theo cách tốt nhất có thể. Nếu bạn thấy câu chữ cần cải thiện, chúng tôi hoan nghênh đóng góp trên GitHub."
translations_link = "Cải thiện bản dịch"
