[pages.terms]
title = "Sharudda"
description = "Best-effort service terms don public hashavatar.app avatar API da demo website."
eyebrow = "Service Terms"
lead = "Ana bayar da wannan public service don bayanai kuma bisa best-effort basis. Yi amfani da shi kawai idan wannan risk profile ya dace da application ɗinka."
no_warranty = "No Warranty"
no_warranty_text = "Wannan service da duk generated outputs ana bayar da su as-is da as-available, ba tare da warranty ba. Ba mu alkawarin availability, correctness, fitness for a particular purpose, uninterrupted operation, ko compatibility with your systems."
no_liability = "No Liability"
no_liability_text = "Ba mu da alhakin downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures, ko direct/indirect damages daga amfani da service."
fallback_text = "Idan kana dogaro da waɗannan avatars a production, ya kamata ka implement fallback behavior, caching strategy, da availability plan naka."
acceptable_use = "Acceptable Use"
acceptable_use_text = "Kada ka yi amfani da service don overload infrastructure, bypass rate limits ko cache controls, test abusive traffic patterns, ko store illegal material ta persistence features."
changes = "Canje-canje"
changes_text = "Za mu iya change, limit, suspend, ko discontinue public service a kowane lokaci ba tare da notice ba. Public endpoints, output details, ko operational limits na iya canzawa yayin da service ke evolve."
legal_note = "Wannan page operational guidance ne, ba legal advice ba. Idan kana buƙatar formal legal terms don business deployment, publish reviewed version da ya dace da jurisdiction da operator entity ɗinka."

[pages.privacy]
title = "Sirri"
description = "Privacy notice na hashavatar.app game da request data, logs, da optional object storage behavior."
eyebrow = "Privacy Notice"
lead = "An gina wannan service da gangan ya zama simple, amma public avatar API har yanzu yana karɓar wasu request data don aiki. Wannan page yana bayyana wannan practical baseline."
receives = "Abin Da Service Ke Karɓa"
receives_identity = "opaque identifier da ka saka a request, kamar internal id, username, ko one-way hash"
receives_parameters = "request parameters kamar avatar type, style options, size, format, da background"
receives_http_metadata = "standard HTTP metadata da server, reverse proxy, da CDN ke handle, kamar IP address, user agent, referrer, da request timing"
stores = "Abin Da App Ke Store"
stores_text = "Application ba ya buƙatar user accounts kuma ba ya set application cookies by default. A basic request flow, app yana generate avatar on demand kuma yana return kai tsaye."
storage_text = "Idan object storage support enabled ne kuma signed-link ko persistence route aka yi amfani da shi, generated avatar file da object key na iya store a configured S3-compatible bucket."
telemetry = "Privacy-Preserving Telemetry"
telemetry_text = "Idan operator ya enable telemetry, app yana emit aggregate OpenTelemetry metrics don page views, visible page time, repository da crate clicks, demo actions, da avatar generation counts da aka grouped ta bounded style choices kamar kind, background, accessory, color, expression, shape, da size bucket."
telemetry_limits = "Telemetry ba ya ƙunsar raw identifiers, tenant ko style namespace values, IP addresses, user agents, referrers, full URLs, cookies, ko free-form text. Telemetry endpoints suna karɓar allow-listed aggregate labels kawai."
logging = "Logs Da Infrastructure"
logging_text = "Dangane da deployment, infrastructure components kamar nginx, Caddy, Cloudflare, hosting providers, ko S3-compatible storage na iya store access logs da operational metadata. Waɗannan logs wani ɓangare ne na gudanar da public service kuma na iya ƙunsar requested identifier idan yana cikin URL."
avoid = "Abin Da Ya Fi Kyau Kada A Aika"
avoid_text = "Email-shaped identifiers ana karɓa don compatibility, amma URLs na iya bayyana a infrastructure logs. Aika stable internal id ko one-way application hash idan kana son guje wa personal data a request URL."
repository = "Repository Da Crate"
repository_text = "Za ka iya duba implementation a public API repository da reusable avatar renderer a Rust crate."
translations = "Bayanan fassara"
