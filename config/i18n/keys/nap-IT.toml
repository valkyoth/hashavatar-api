anonymous_ids = "ID Anonime"
anonymous_text = "Manna internal stable id o one-way application hash invece 'e raw personal data."
rate_limits = "Rate Limits"
rate_limits_text = "'O public service applica origin-side rate limits, cu limiti cchiù strette pe' /v1/avatar/link, direct avatar requests cu persist=true e /og.png, pecché object storage writes e Open Graph image rendering costano cchiù assaje 'e direct rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar generation e storage operations so' limitate da server-side timeouts, accussì richieste costose nun ponno monopolizzà 'o origin senza fine."
errors = "Errori"
