[pages.help]
title = "Ohje"
description = "Integrointiopas hashavatar.app-avatar-API:n käyttöön web-sovelluksissa, frontendeissä ja backendeissä."
eyebrow = "Integrointiopas"
lead = "Käytä hashavatar.appia suoraan selaimesta, frontendistäsi tai backendistäsi. Jokainen avatar-URL on deterministinen, joten sama tunniste ja samat asetukset tuottavat aina saman tuloksen."
basic_url = "Perus-URL"
basic_url_text = "Käytä query-endpointia, kun haluat yksinkertaisen julkisen kuva-URL:n."
path_style = "Polku-URL"
path_style_text = "Käytä polkumuotoa, jos haluat siistimmät upotus-URL:t."
html_example = "HTML-esimerkki"
javascript_example = "JavaScript-esimerkki"
supported_parameters = "Tuetut parametrit"
style_layer_note = "Lisävaruste- ja ilmetasot koskevat hahmomaisia perheitä. Objektimaiset perheet kuten planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup ja shield normalisoidaan arvoihin accessory=none ja expression=default."
signed_storage_links = "Allekirjoitetut tallennuslinkit"
signed_storage_links_text = "Jos tässä deploymentissa on objektitallennus määritettynä, pyydä ennakkoon allekirjoitettu tallennuslinkki endpointista /v1/avatar/link. Tämä endpoint tallentaa generoidun objektin ja palauttaa JSONin, jossa on allekirjoitettu URL, objektin avain ja hashattu välimuistiavain. Tavalliset avatar-vastaukset eivät paljasta allekirjoitetun linkin metadataa response headereissa."
open_source = "Avoin lähdekoodi"
open_source_text = "Julkisen sivuston lähdekoodi on API-repositoryssä ja uudelleenkäytettävä avatar-renderöijä julkaistaan crates.io:ssa."

[pages.docs]
title = "Dokumentaatio"
description = "Referenssidokumentaatio julkiselle hashavatar.app-avatar-API:lle, tallennuslinkki-endpointille ja namespace-tietoiselle identiteettisopimukselle."
eyebrow = "API-referenssi"
lead = "Tämä on julkisen API:n tuotelähtöinen referenssi. Sama identiteetti, tenant, tyyliversio, avatarperhe, tyyliasetukset, koko ja WebP-tulos on tarkoitettu pysymään vakaina major-version sisällä."
core_endpoints = "Keskeiset endpointit"
operational_endpoints = "Operatiiviset endpointit"
operational_text = "GET /healthz on julkinen kuormantasaajille ja uptime-tarkistuksille. GET /metrics on vain loopback-yhteyksille ja palauttaa 404 ei-paikallisille peereille."
namespace_support = "Namespace-tuki"
namespace_text = "Käytä tenant- ja style_version-arvoja pitääksesi visuaaliset identiteettiavaruudet erillään tuotteiden tai rollout-vaiheiden välillä."
anonymous_ids = "Anonyymit ID:t"
anonymous_text = "Lähetä vakaa sisäinen id tai yksisuuntainen sovellushash raakamuotoisten henkilötietojen sijaan."
rate_limits = "Rate limitit"
rate_limits_text = "Julkinen palvelu käyttää origin-puolen rate limittejä, ja tiukempia rajoja endpointille /v1/avatar/link, suorille avatar-pyynnöille persist=true-parametrilla ja /og.png-endpointille, koska objektitallennuksen kirjoitukset ja Open Graph -renderöinti ovat kalliimpia kuin suora renderöinti."
timeouts = "Aikakatkaisut"
timeouts_text = "Avatar-generointi ja tallennusoperaatiot rajataan palvelinpuolen aikakatkaisuilla, jotta kalliit pyynnöt eivät voi varata originia määräämättömäksi ajaksi."
errors = "Virheet"
error_bad_request = "virheellinen kind-arvo, tukematon algoritmi tai formaatti, koko tai puuttuva identiteetti"
error_timeout = "generoinnin tai tallennuksen aikakatkaisu"
error_rate_limit = "rate limit ylitetty"
error_internal = "renderöinti- tai tallennusvirhe"
openapi = "OpenAPI"
openapi_text = "Generoituja asiakkaita tai työkaluja varten käytä"

[pages.terms]
title = "Ehdot"
description = "Best-effort-palveluehdot julkiselle hashavatar.app-avatar-API:lle ja demosivustolle."
eyebrow = "Palveluehdot"
lead = "Tämä julkinen palvelu tarjotaan tiedoksi ja best effort -periaatteella. Käytä sitä vain, jos tämä riskiprofiili sopii sovellukseesi."
no_warranty = "Ei takuuta"
no_warranty_text = "Tämä palvelu ja kaikki generoidut tulokset tarjotaan sellaisina kuin ne ovat ja saatavuuden mukaan, ilman minkäänlaisia nimenomaisia tai oletettuja takuita. Emme lupaa saatavuutta, oikeellisuutta, soveltuvuutta tiettyyn tarkoitukseen, keskeytymätöntä toimintaa tai yhteensopivuutta järjestelmiesi kanssa."
no_liability = "Ei vastuuta"
no_liability_text = "Emme vastaa käyttökatkoista, häiriöistä, heikentyneestä suorituskyvystä, rikkinäisistä linkeistä, välimuistikäyttäytymisestä, tietojen menetyksestä, vioittuneista objekteista, kolmannen osapuolen palveluntarjoajien virheistä tai suorista tai epäsuorista vahingoista, jotka johtuvat palvelun käytöstä."
fallback_text = "Jos olet riippuvainen näistä avatareista tuotannossa, sinun tulee toteuttaa oma fallback-käyttäytyminen, välimuististrategia ja saatavuussuunnitelma."
acceptable_use = "Hyväksyttävä käyttö"
acceptable_use_text = "Älä käytä palvelua infrastruktuurin ylikuormittamiseen, rate limitien tai välimuistikontrollien kiertämiseen, väärinkäyttöön perustuvien liikennemallien testaamiseen tai laittoman materiaalin tallentamiseen minkään pysyvyystoiminnon kautta."
changes = "Muutokset"
changes_text = "Voimme muuttaa, rajoittaa, keskeyttää tai lopettaa julkisen palvelun milloin tahansa ilman ennakkoilmoitusta. Julkiset endpointit, tuloksen yksityiskohdat tai operatiiviset rajat voivat muuttua palvelun kehittyessä."
legal_note = "Tämä sivu on operatiivista ohjeistusta, ei juridista neuvontaa. Jos tarvitset muodolliset juridiset ehdot liiketoimintadeploymentiin, julkaise tarkistettu versio, joka sopii lainkäyttöalueellesi ja operaattoriyksiköllesi."

[pages.privacy]
title = "Tietosuoja"
description = "hashavatar.appin tietosuojailmoitus, joka kattaa request-datan, lokit ja valinnaisen objektitallennuksen käyttäytymisen."
eyebrow = "Tietosuojailmoitus"
lead = "Palvelu on tarkoituksella yksinkertainen, mutta julkinen avatar-API vastaanottaa silti joitakin request-tietoja toimiakseen. Tämä sivu kuvaa käytännön lähtötason."
receives = "Mitä palvelu vastaanottaa"
receives_identity = "läpinäkymätön tunniste, jonka asetat pyyntöön, esimerkiksi sisäinen id, käyttäjänimi tai yksisuuntainen hash"
receives_parameters = "request-parametrit kuten avatar-tyyppi, tyyliasetukset, koko, formaatti ja tausta"
receives_http_metadata = "tavallinen HTTP-metadata, jota palvelin, reverse proxy ja CDN käsittelevät, kuten IP-osoite, user agent, referrer ja pyynnön ajoitus"
stores = "Mitä sovellus itse tallentaa"
stores_text = "Sovellus ei vaadi käyttäjätilejä eikä aseta oletuksena sovellusevästeitä. Peruspyyntövirrassa se generoi avatarin pyynnöstä ja palauttaa sen suoraan."
storage_text = "Jos objektitallennustuki on käytössä ja allekirjoitetun linkin tai pysyvyyden routea käytetään, generoitu avatar-tiedosto ja sen objektiavain voidaan tallentaa määritettyyn S3-yhteensopivaan bucketiin."
telemetry = "Tietosuojaystävällinen telemetria"
telemetry_text = "Jos operaattori on ottanut telemetrian käyttöön, sovellus lähettää aggregoituja OpenTelemetry-mittareita sivunäkymistä, näkyvästä sivuajasta, repository- ja crate-klikkauksista, demotoiminnoista ja avatar-generoinneista ryhmiteltynä rajattujen tyyliasetusten mukaan, kuten kind, background, accessory, color, expression, shape ja kokobucket."
telemetry_limits = "Telemetria ei sisällä raakoja tunnisteita, tenant- tai style namespace -arvoja, IP-osoitteita, user agenteja, referrereitä, täydellisiä URL:eja, evästeitä tai vapaata tekstiä. Telemetria-endpointit hyväksyvät vain sallitut aggregoidut labelit."
logging = "Lokit ja infrastruktuuri"
logging_text = "Deploymentista riippuen infrastruktuurikomponentit kuten nginx, Caddy, Cloudflare, hosting-palveluntarjoajat tai S3-yhteensopiva tallennus voivat säilyttää access logeja ja operatiivista metadataa. Nämä lokit ovat osa julkisen palvelun käyttöä ja voivat sisältää pyytämäsi tunnisteen, jos se näkyy URL:ssa."
avoid = "Mitä kannattaa välttää lähettämästä"
avoid_text = "Sähköpostin kaltaiset tunnisteet hyväksytään yhteensopivuuden vuoksi, mutta URL:t voivat näkyä infrastruktuurilokeissa. Lähetä vakaa sisäinen id tai yksisuuntainen sovellushash, kun haluat välttää henkilötietojen sijoittamista request-URL:iin."
repository = "Repository ja crate"
repository_text = "Voit tarkistaa toteutuksen julkisesta API-repositorystä ja uudelleenkäytettävän avatar-renderöijän Rust-cratesta."
