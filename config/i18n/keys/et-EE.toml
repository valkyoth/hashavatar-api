[pages.help]
title = "Abi"
description = "Integratsioonijuhend hashavatar.app avatari API kasutamiseks web apps, frontends ja backends keskkondades."
eyebrow = "Integratsioonijuhend"
lead = "Kasuta hashavatar.app teenust otse brauserist, frontendist või backendist. Iga avatari URL on deterministlik, seega sama identifikaator ja valikud annavad alati sama tulemuse."
basic_url = "Põhi-URL"
basic_url_text = "Kasuta query endpointi, kui soovid lihtsat public image URL-i."
path_style = "Path Style URL"
path_style_text = "Kasuta path vormi, kui eelistad puhtamaid embed URL-e."
html_example = "HTML Näide"
javascript_example = "JavaScript Näide"
supported_parameters = "Toetatud Parameetrid"
style_layer_note = "Accessory ja expression kihid rakenduvad character-style perekondadele. Object-style perekonnad nagu planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup ja shield normaliseeritakse väärtustele accessory=none ja expression=default."
signed_storage_links = "Allkirjastatud Salvestuslingid"
signed_storage_links_text = "Kui selles deploymentis on object storage seadistatud, küsi presigned storage linki endpointist /v1/avatar/link. See endpoint salvestab generated objecti ja tagastab JSON-i signed URL, object key ja hashed cache key väljadega. Tavalised avatar responses ei avalda signed-link metadata väärtusi response headers sees."
open_source = "Open Source"
open_source_text = "Avaliku saidi source asub GitHub repositorys ja reusable avatar renderer avaldatakse crates.io-s."

[pages.docs]
title = "Dokumentatsioon"
description = "Viitedokumentatsioon hashavatar.app public avatar API, storage link endpoint ja namespace-aware identity contract jaoks."
eyebrow = "API Viide"
lead = "See on public API tootepoolne viide. Sama identity, tenant, style version, avatar family, style options, size ja WebP output on mõeldud püsima stabiilsena major release piires."
core_endpoints = "Core Endpoints"
operational_endpoints = "Operatsioonilised Endpointid"
operational_text = "GET /healthz on public load balancers ja uptime checks jaoks. GET /metrics on loopback-only ning tagastab non-local peers puhul 404."
namespace_support = "Namespace Tugi"
namespace_text = "Kasuta tenant ja style_version väärtusi, et hoida visuaalse identiteedi ruumid eraldi toodete või rollout etappide vahel."
anonymous_ids = "Anonüümsed ID-d"
anonymous_text = "Saada raw personal data asemel internal stable id või one-way application hash."
rate_limits = "Rate Limits"
rate_limits_text = "Public service rakendab origin-side rate limits reegleid, rangemate limitidega /v1/avatar/link, persist=true direct avatar requests ja /og.png jaoks, sest object storage writes ja Open Graph image rendering on kulukamad kui direct rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar generation ja storage operations on piiratud server-side timeouts abil, et kallid päringud ei saaks originit lõputult hõivata."
errors = "Vead"
error_bad_request = "vigane kind, unsupported algorithm või format, size või missing identity"
error_timeout = "generation või storage timeout"
error_rate_limit = "rate limit exceeded"
error_internal = "rendering või storage failure"
openapi = "OpenAPI"
openapi_text = "Generated clients või tooling jaoks kasuta"

[pages.terms]
title = "Tingimused"
description = "Best-effort service terms hashavatar.app public avatar API ja demo website jaoks."
eyebrow = "Teenuse Tingimused"
lead = "See public service on pakutud informatiivsel ja best-effort alusel. Kasuta seda ainult siis, kui selline risk profile sobib sinu rakendusele."
no_warranty = "Garantiid Ei Ole"
no_warranty_text = "See service ja kõik generated outputs pakutakse as-is ja as-available, ilma ühegi otsese või kaudse garantiita. Me ei luba availability, correctness, fitness for a particular purpose, uninterrupted operation ega compatibility with your systems."
no_liability = "Vastutus Puudub"
no_liability_text = "Me ei vastuta downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures ega otseste või kaudsete damages eest, mis tulenevad teenuse kasutamisest."
fallback_text = "Kui sõltud nendest avataridest production keskkonnas, peaksid rakendama oma fallback behavior, caching strategy ja availability plan."
acceptable_use = "Lubatud Kasutus"
acceptable_use_text = "Ära kasuta teenust infrastructure ülekoormamiseks, rate limits või cache controls vältimiseks, abusive traffic patterns testimiseks ega illegal material salvestamiseks persistence features kaudu."
changes = "Muudatused"
changes_text = "Võime public service igal ajal ja ette teatamata muuta, piirata, peatada või lõpetada. Public endpoints, output details või operational limits võivad teenuse arenedes muutuda."
legal_note = "See leht on operational guidance, mitte legal advice. Kui vajad business deployment jaoks formal legal terms, avalda reviewed version, mis vastab sinu jurisdiction ja operator entity nõuetele."

[pages.privacy]
title = "Privaatsus"
description = "hashavatar.app privacy notice request data, logs ja optional object storage behavior kohta."
eyebrow = "Privaatsusteade"
lead = "Teenus on teadlikult lihtne, kuid public avatar API saab toimimiseks siiski osa request data andmetest. See leht kirjeldab praktilist baseline'i."
receives = "Mida Teenus Saab"
receives_identity = "opaque identifier, mille paned requesti, näiteks internal id, username või one-way hash"
receives_parameters = "request parameters, näiteks avatar type, style options, size, format ja background"
receives_http_metadata = "standard HTTP metadata, mida töötlevad server, reverse proxy ja CDN, näiteks IP address, user agent, referrer ja request timing"
stores = "Mida Rakendus Ise Salvestab"
stores_text = "Rakendus ei nõua user accounts kasutamist ega sea vaikimisi application cookies. Basic request flow käigus genereerib see avatari on demand ja tagastab selle otse."
storage_text = "Kui object storage support on lubatud ja kasutatakse signed-link või persistence route teed, võivad generated avatar file ja object key salvestuda seadistatud S3-compatible bucketisse."
telemetry = "Privaatsust Hoidev Telemeetria"
telemetry_text = "Kui operator lubab telemetry, saadab rakendus aggregate OpenTelemetry metrics andmeid page views, visible page time, repository ja crate clicks, demo actions ning avatar generation counts kohta, rühmitatuna bounded style choices järgi, nagu kind, background, accessory, color, expression, shape ja size bucket."
telemetry_limits = "Telemetry ei sisalda raw identifiers, tenant või style namespace values, IP addresses, user agents, referrers, full URLs, cookies ega free-form text väärtusi. Telemetry endpoints võtavad vastu ainult allow-listed aggregate labels väärtusi."
logging = "Logid Ja Infrastruktuur"
logging_text = "Sõltuvalt deploymentist võivad infrastructure components nagu nginx, Caddy, Cloudflare, hosting providers või S3-compatible storage hoida access logs ja operational metadata andmeid. Need logs on public service käitamise osa ja võivad sisaldada requested identifier väärtust, kui see on URL-is."
avoid = "Mida Vältida"
avoid_text = "Email-shaped identifiers on compatibility tõttu lubatud, kuid URLs võivad ilmuda infrastructure logs sisse. Saada stable internal id või one-way application hash, kui soovid vältida personal data lisamist request URL-i."
repository = "Repository Ja Crate"
repository_text = "Implementation on nähtav public GitHub repositorys ja reusable avatar renderer Rust crate'is."
translations = "Märkus tõlgete kohta"
translations_text = "Veebisaidi tõlked on tehisintellekti abiga ja parima pingutuse põhimõttel tehtud. Kui märkad parandamist vajavat sõnastust, on panused GitHubis teretulnud."
translations_link = "Paranda tõlkeid"
