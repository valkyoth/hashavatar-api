[pages.terms]
title = "Shuruudaha"
description = "Best-effort service terms ee public hashavatar.app avatar API iyo demo website."
eyebrow = "Service Terms"
lead = "Public service-kan waxaa loo bixiyaa macluumaad ahaan iyo best-effort basis. Isticmaal kaliya haddii risk profile-kan uu ku habboon yahay application-kaaga."
no_warranty = "No Warranty"
no_warranty_text = "Service-kan iyo generated outputs oo dhan waxaa loo bixiyaa as-is iyo as-available, warranty la'aan. Ma ballanqaadeyno availability, correctness, fitness for a particular purpose, uninterrupted operation, ama compatibility with your systems."
no_liability = "No Liability"
no_liability_text = "Mas'uul kama nihin downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures, ama direct/indirect damages ka dhasha isticmaalka service."
fallback_text = "Haddii aad ku tiirsan tahay avatars-kan production, waa inaad implement gareysaa fallback behavior, caching strategy, iyo availability plan adiga kuu gaar ah."
acceptable_use = "Acceptable Use"
acceptable_use_text = "Ha u isticmaalin service-ka inaad overload infrastructure, bypass rate limits ama cache controls, test abusive traffic patterns, ama store illegal material adigoo adeegsanaya persistence features."
changes = "Isbeddello"
changes_text = "Waxaan public service-ka change, limit, suspend, ama discontinue ku sameyn karnaa waqti kasta notice la'aan. Public endpoints, output details, ama operational limits way isbeddeli karaan marka service evolve sameeyo."
legal_note = "Page-kan waa operational guidance, ma aha legal advice. Haddii aad u baahan tahay formal legal terms business deployment, publish reviewed version ku habboon jurisdiction iyo operator entity-gaaga."

[pages.privacy]
title = "Asturnaanta"
description = "Privacy notice ee hashavatar.app ku saabsan request data, logs, iyo optional object storage behavior."
eyebrow = "Privacy Notice"
lead = "Service-kan si ula kac ah ayuu u simple yahay, laakiin public avatar API wali wuxuu helaa qaar request data ah si uu u shaqeeyo. Page-kan wuxuu sharxayaa practical baseline-kaas."
receives = "Waxa Service-ku Helo"
receives_identity = "opaque identifier aad ku geliso request, sida internal id, username, ama one-way hash"
receives_parameters = "request parameters sida avatar type, style options, size, format, iyo background"
receives_http_metadata = "standard HTTP metadata ay handle gareeyaan server, reverse proxy, iyo CDN, sida IP address, user agent, referrer, iyo request timing"
stores = "Waxa App-ku Store Gareeyo"
stores_text = "Application-ku ma baahna user accounts mana set gareeyo application cookies by default. Basic request flow, app-ku avatar on demand ayuu generate gareeyaa wuxuuna return gareeyaa si toos ah."
storage_text = "Haddii object storage support enabled yahay oo signed-link ama persistence route la isticmaalo, generated avatar file iyo object key waxaa lagu store gareyn karaa configured S3-compatible bucket."
telemetry = "Privacy-Preserving Telemetry"
telemetry_text = "Haddii operator enable gareeyo telemetry, app-ku wuxuu emit gareeyaa aggregate OpenTelemetry metrics ee page views, visible page time, repository iyo crate clicks, demo actions, iyo avatar generation counts oo grouped ku ah bounded style choices sida kind, background, accessory, color, expression, shape, iyo size bucket."
telemetry_limits = "Telemetry kuma jiraan raw identifiers, tenant ama style namespace values, IP addresses, user agents, referrers, full URLs, cookies, ama free-form text. Telemetry endpoints waxay aqbalaan allow-listed aggregate labels kaliya."
logging = "Logs Iyo Infrastructure"
logging_text = "Iyadoo ku xiran deployment, infrastructure components sida nginx, Caddy, Cloudflare, hosting providers, ama S3-compatible storage waxay store gareyn karaan access logs iyo operational metadata. Logs-kan waa qayb ka mid ah socodsiinta public service waxayna ka koobnaan karaan requested identifier haddii uu ku jiro URL."
avoid = "Waxa Fiican Inaan La Dirin"
avoid_text = "Email-shaped identifiers waxaa loo aqbalaa compatibility, laakiin URLs waxay ka muuqan karaan infrastructure logs. Dir stable internal id ama one-way application hash haddii aad rabto inaad ka fogaato personal data gudaha request URL."
repository = "Repository Iyo Crate"
repository_text = "Waxaad implementation-ka ka eegi kartaa public GitHub repository iyo reusable avatar renderer gudaha Rust crate."
translations = "Ogeysiis tarjumaad"
translations_text = "Tarjumaadaha bogga waxaa caawiyay AI waxaana loo sameeyay dadaalka ugu fiican. Haddii aad aragto erayo u baahan hagaajin, wax ku biirinta GitHub waa la soo dhaweynayaa."
