[pages.help]
title = "Jålp"
description = "Integrasjuonsguide fyr at bruka hashavatar.app-avatar-API:t i webbappar, frontends og backends."
eyebrow = "Integrasjuonsguide"
lead = "Bruk hashavatar.app direkt frå webbläsaren, din frontend eld din backend. War avatar-URL ir deterministisk, so sama identifierär og alternativ ger alltið sama resultat."
basic_url = "Grund-URL"
