[pages.help]
title = "Aide"
description = "Guide d'intégration pour utiliser l'API d'avatars hashavatar.app dans des applications web, frontends et backends."
eyebrow = "Guide d'intégration"
lead = "Utilisez hashavatar.app directement depuis le navigateur, votre frontend ou votre backend. Chaque URL d'avatar est déterministe : le même identifiant et les mêmes options produisent toujours le même résultat."
basic_url = "URL de base"
basic_url_text = "Utilisez l'endpoint de requête quand vous voulez une simple URL d'image publique."
path_style = "URL en chemin"
path_style_text = "Utilisez la forme en chemin si vous préférez des URLs d'intégration plus propres."
html_example = "Exemple HTML"
javascript_example = "Exemple JavaScript"
supported_parameters = "Paramètres pris en charge"
style_layer_note = "Les couches d'accessoires et d'expressions s'appliquent aux familles de personnages. Les familles d'objets comme planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup et shield sont normalisées avec accessory=none et expression=default."
signed_storage_links = "Liens de stockage signés"
signed_storage_links_text = "Si ce déploiement a un stockage objet configuré, demandez un lien de stockage présigné depuis /v1/avatar/link. Cet endpoint stocke l'objet généré et renvoie du JSON avec l'URL signée, la clé d'objet et une clé de cache hachée. Les réponses d'avatar standard n'exposent pas de métadonnées de lien signé dans les en-têtes."
open_source = "Open source"
open_source_text = "Le code source du site public se trouve dans le dépôt API et le moteur d'avatars réutilisable est publié sur crates.io."

[pages.docs]
title = "Docs"
description = "Documentation de référence pour l'API publique d'avatars hashavatar.app, l'endpoint de lien de stockage et le contrat d'identité avec namespace."
eyebrow = "Référence API"
lead = "Ceci est la référence produit de l'API publique. La même identité, le même tenant, la même version de style, la même famille d'avatar, les mêmes options, la même taille et la sortie WebP sont destinés à rester stables dans une version majeure."
core_endpoints = "Endpoints principaux"
operational_endpoints = "Endpoints opérationnels"
operational_text = "GET /healthz est public pour les load balancers et les contrôles de disponibilité. GET /metrics est limité au loopback et renvoie 404 aux pairs non locaux."
namespace_support = "Prise en charge des namespaces"
namespace_text = "Utilisez tenant et style_version pour séparer les espaces d'identité visuelle entre produits ou phases de déploiement."
anonymous_ids = "Identifiants anonymes"
anonymous_text = "Envoyez un identifiant interne stable ou un hash applicatif à sens unique au lieu de données personnelles brutes."
rate_limits = "Limites de débit"
rate_limits_text = "Le service public applique des limites côté origine, avec des limites plus strictes sur /v1/avatar/link, les requêtes directes avec persist=true et /og.png, car les écritures de stockage objet et le rendu Open Graph sont plus coûteux que le rendu direct."
timeouts = "Délais"
timeouts_text = "La génération d'avatars et les opérations de stockage sont bornées par des délais serveur afin que les requêtes coûteuses ne monopolisent pas l'origine indéfiniment."
errors = "Erreurs"
error_bad_request = "kind invalide, algorithme ou format non pris en charge, taille invalide ou identité manquante"
error_timeout = "délai dépassé pendant la génération ou le stockage"
error_rate_limit = "limite de débit dépassée"
error_internal = "échec du rendu ou du stockage"
openapi = "OpenAPI"
openapi_text = "Pour les clients générés ou l'outillage, utilisez"

[pages.terms]
title = "Conditions"
description = "Conditions de service best-effort pour l'API publique d'avatars hashavatar.app et le site de démonstration."
eyebrow = "Conditions du service"
lead = "Ce service public est fourni à titre informatif et best-effort. Utilisez-le seulement si ce profil de risque convient à votre application."
no_warranty = "Aucune garantie"
no_warranty_text = "Ce service et toutes les sorties générées sont fournis tels quels et selon disponibilité, sans garantie d'aucune sorte, expresse ou implicite. Nous ne promettons pas la disponibilité, l'exactitude, l'adéquation à un usage particulier, le fonctionnement ininterrompu ou la compatibilité avec vos systèmes."
no_liability = "Aucune responsabilité"
no_liability_text = "Nous ne sommes pas responsables des indisponibilités, pannes, performances dégradées, liens cassés, comportements de cache, pertes de données, objets corrompus, défaillances de fournisseurs tiers ou dommages directs ou indirects liés à votre utilisation du service."
fallback_text = "Si ces avatars sont importants en production, vous devriez prévoir votre propre comportement de repli, stratégie de cache et plan de disponibilité."
acceptable_use = "Utilisation acceptable"
acceptable_use_text = "N'utilisez pas le service pour surcharger l'infrastructure, contourner les limites de débit ou contrôles de cache, tester des schémas de trafic abusifs, ou stocker du contenu illégal via une fonction de persistance."
changes = "Changements"
changes_text = "Nous pouvons modifier, limiter, suspendre ou arrêter le service public à tout moment et sans préavis. Les endpoints publics, détails de sortie ou limites opérationnelles peuvent changer avec l'évolution du service."
legal_note = "Cette page est une orientation opérationnelle, pas un conseil juridique. Si vous avez besoin de conditions juridiques formelles pour un déploiement professionnel, publiez une version revue pour votre juridiction et votre entité opératrice."

[pages.privacy]
title = "Confidentialité"
description = "Notice de confidentialité de hashavatar.app couvrant les données de requête, les logs et le comportement optionnel de stockage objet."
eyebrow = "Notice de confidentialité"
lead = "Le service est volontairement simple, mais une API publique d'avatars reçoit tout de même certaines données de requête pour fonctionner. Cette page décrit cette base pratique."
receives = "Ce que le service reçoit"
receives_identity = "l'identifiant opaque que vous placez dans la requête, comme un identifiant interne, un nom d'utilisateur ou un hash à sens unique"
receives_parameters = "les paramètres de requête comme le type d'avatar, les options de style, la taille, le format et l'arrière-plan"
receives_http_metadata = "les métadonnées HTTP standard traitées par le serveur, le reverse proxy et le CDN, comme l'adresse IP, le user agent, le referrer et le timing de requête"
stores = "Ce que l'application stocke elle-même"
stores_text = "L'application ne nécessite pas de compte utilisateur et ne définit pas de cookies applicatifs par défaut. Dans le flux de requête de base, elle génère l'avatar à la demande et le renvoie directement."
storage_text = "Si le stockage objet est activé et qu'une route de lien signé ou de persistance est utilisée, le fichier avatar généré et sa clé d'objet peuvent être stockés dans le bucket S3-compatible configuré."
telemetry = "Télémétrie respectueuse de la vie privée"
telemetry_text = "Si la télémétrie est activée par l'opérateur, l'application émet des métriques OpenTelemetry agrégées pour les vues de page, le temps visible, les clics vers le dépôt et le crate, les actions de démonstration et les générations d'avatars groupées par choix de style bornés comme kind, background, accessory, color, expression, shape et bucket de taille."
telemetry_limits = "La télémétrie n'inclut pas les identifiants bruts, les valeurs tenant ou style namespace, les adresses IP, user agents, referrers, URLs complètes, cookies ou texte libre. Les endpoints de télémétrie n'acceptent que des labels agrégés autorisés."
logging = "Logs et infrastructure"
logging_text = "Selon le déploiement, des composants d'infrastructure comme nginx, Caddy, Cloudflare, les hébergeurs ou le stockage S3-compatible peuvent conserver des logs d'accès et métadonnées opérationnelles. Ces logs font partie de l'exploitation d'un service public et peuvent contenir l'identifiant demandé s'il apparaît dans l'URL."
avoid = "Ce qu'il vaut mieux éviter d'envoyer"
avoid_text = "Les identifiants de forme e-mail sont acceptés pour compatibilité, mais les URLs peuvent apparaître dans les logs d'infrastructure. Envoyez un identifiant interne stable ou un hash applicatif à sens unique si vous voulez éviter de placer des données personnelles dans l'URL de requête."
repository = "Dépôt et crate"
repository_text = "Vous pouvez inspecter l'implémentation dans le dépôt API public et le moteur d'avatars réutilisable dans le crate Rust."
