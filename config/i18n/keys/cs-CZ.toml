[pages.help]
title = "Nápověda"
description = "Integrační průvodce pro použití hashavatar.app avatar API ve webových aplikacích, frontendech a backendech."
eyebrow = "Integrační Průvodce"
lead = "Používejte hashavatar.app přímo z prohlížeče, frontendu nebo backendu. Každý avatar URL je deterministický, takže stejný identifikátor a stejné možnosti vždy vytvoří stejný výsledek."
basic_url = "Základní URL"
basic_url_text = "Použijte query endpoint, když chcete jednoduchý veřejný image URL."
path_style = "Path Style URL"
path_style_text = "Použijte path formu, pokud preferujete čistší embed URL."
html_example = "HTML Příklad"
javascript_example = "JavaScript Příklad"
supported_parameters = "Podporované Parametry"
style_layer_note = "Accessory a expression layers se používají pro character-style families. Object-style families jako planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup a shield se normalizují na accessory=none a expression=default."
signed_storage_links = "Podepsané Odkazy Úložiště"
signed_storage_links_text = "Pokud má tento deployment nakonfigurované object storage, vyžádejte si presigned storage link z /v1/avatar/link. Tento endpoint uloží generated object a vrátí JSON se signed URL, object key a hashed cache key. Standardní avatar responses nevystavují signed-link metadata v response headers."
open_source = "Open Source"
open_source_text = "Zdroj veřejného webu je v API repository a reusable avatar renderer je publikován na crates.io."

[pages.docs]
title = "Dokumentace"
description = "Referenční dokumentace pro hashavatar.app public avatar API, storage link endpoint a namespace-aware identity contract."
eyebrow = "API Reference"
lead = "Toto je product-facing reference pro public API. Stejné identity, tenant, style version, avatar family, style options, size a WebP output mají zůstat stabilní v rámci major release."
core_endpoints = "Core Endpoints"
operational_endpoints = "Provozní Endpointy"
operational_text = "GET /healthz je public pro load balancers a uptime checks. GET /metrics je loopback-only a vrací 404 pro non-local peers."
namespace_support = "Namespace Podpora"
namespace_text = "Použijte tenant a style_version, abyste oddělili visual identity spaces mezi produkty nebo rollout fázemi."
anonymous_ids = "Anonymní ID"
anonymous_text = "Posílejte internal stable id nebo one-way application hash místo raw personal data."
rate_limits = "Rate Limity"
rate_limits_text = "Public service používá origin-side rate limits, s přísnějšími limity pro /v1/avatar/link, direct avatar requests s persist=true a /og.png, protože object storage writes a Open Graph image rendering jsou dražší než direct rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar generation a storage operations jsou omezeny server-side timeouts, aby drahé požadavky nemohly neomezeně monopolizovat origin."
errors = "Chyby"
error_bad_request = "neplatný kind, unsupported algorithm nebo format, size nebo missing identity"
error_timeout = "generation nebo storage timeout"
error_rate_limit = "rate limit exceeded"
error_internal = "rendering nebo storage failure"
openapi = "OpenAPI"
openapi_text = "Pro generated clients nebo tooling použijte"

[pages.terms]
title = "Podmínky"
description = "Best-effort service terms pro public hashavatar.app avatar API a demo website."
eyebrow = "Podmínky Služby"
lead = "Tato public service je poskytována pro informační účely a na best-effort bázi. Používejte ji pouze tehdy, pokud tento risk profile vyhovuje vaší aplikaci."
no_warranty = "Bez Záruky"
no_warranty_text = "Tato služba a všechny generated outputs jsou poskytovány as-is a as-available, bez jakýchkoli záruk. Neslibujeme availability, correctness, fitness for a particular purpose, uninterrupted operation ani compatibility with your systems."
no_liability = "Bez Odpovědnosti"
no_liability_text = "Neodpovídáme za downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures ani přímé či nepřímé damages vzniklé používáním služby."
fallback_text = "Pokud na těchto avatarech závisíte v production, měli byste implementovat vlastní fallback behavior, caching strategy a availability plan."
acceptable_use = "Přijatelné Použití"
acceptable_use_text = "Nepoužívejte službu k přetěžování infrastructure, obcházení rate limits nebo cache controls, testování abusive traffic patterns nebo ukládání illegal material přes persistence features."
changes = "Změny"
changes_text = "Public service můžeme kdykoli a bez upozornění změnit, omezit, pozastavit nebo ukončit. Public endpoints, output details nebo operational limits se mohou měnit s vývojem služby."
legal_note = "Tato stránka je operational guidance, nikoli legal advice. Pokud potřebujete formal legal terms pro business deployment, publikujte reviewed version pro vaši jurisdiction a operator entity."

[pages.privacy]
title = "Soukromí"
description = "Privacy notice pro hashavatar.app pokrývající request data, logs a optional object storage behavior."
eyebrow = "Oznámení O Soukromí"
lead = "Služba je záměrně jednoduchá, ale public avatar API stále přijímá některá request data, aby mohlo fungovat. Tato stránka popisuje praktický baseline."
receives = "Co Služba Přijímá"
receives_identity = "opaque identifier vložený do request, například internal id, username nebo one-way hash"
receives_parameters = "request parameters jako avatar type, style options, size, format a background"
receives_http_metadata = "standard HTTP metadata zpracovaná serverem, reverse proxy a CDN, například IP address, user agent, referrer a request timing"
stores = "Co Ukládá Samotná Aplikace"
stores_text = "Aplikace nevyžaduje user accounts a ve výchozím stavu nenastavuje application cookies. V basic request flow vygeneruje avatar on demand a vrátí jej přímo."
storage_text = "Pokud je zapnut object storage support a používá se signed-link nebo persistence route, generated avatar file a object key mohou být uloženy v nakonfigurovaném S3-compatible bucket."
telemetry = "Telemetrie Šetrná K Soukromí"
telemetry_text = "Pokud operator povolí telemetry, aplikace odesílá aggregate OpenTelemetry metrics pro page views, visible page time, repository a crate clicks, demo actions a avatar generation counts seskupené podle bounded style choices jako kind, background, accessory, color, expression, shape a size bucket."
telemetry_limits = "Telemetry nezahrnuje raw identifiers, tenant nebo style namespace values, IP addresses, user agents, referrers, full URLs, cookies ani free-form text. Telemetry endpoints přijímají pouze allow-listed aggregate labels."
logging = "Logy A Infrastruktura"
logging_text = "Podle deployment mohou infrastructure components jako nginx, Caddy, Cloudflare, hosting providers nebo S3-compatible storage uchovávat access logs a operational metadata. Tyto logs jsou součástí provozu public service a mohou obsahovat requested identifier, pokud je v URL."
avoid = "Co Raději Neposílat"
avoid_text = "Email-shaped identifiers jsou přijímány kvůli compatibility, ale URLs se mohou objevit v infrastructure logs. Posílejte stable internal id nebo one-way application hash, pokud nechcete dávat personal data do request URL."
repository = "Repository A Crate"
repository_text = "Implementation můžete zkontrolovat v public API repository a reusable avatar renderer v Rust crate."
translations = "Poznámka k překladům"
translations_text = "Překlady webu jsou podporované AI a vytvořené podle nejlepší snahy. Pokud uvidíte formulaci, kterou je vhodné zlepšit, příspěvky na GitHubu jsou vítány."
translations_link = "Vylepšit překlady"
