[pages.terms]
title = "Téarmaí"
description = "Best-effort service terms don public hashavatar.app avatar API agus demo website."
eyebrow = "Téarmaí Seirbhíse"
lead = "Cuirtear an public service seo ar fáil chun críocha faisnéise agus ar bhonn best-effort. Úsáid é amháin má oireann an risk profile sin do d'fheidhmchlár."
no_warranty = "Gan Bharántas"
no_warranty_text = "Cuirtear an tseirbhís seo agus gach generated outputs ar fáil as-is agus as-available, gan barántais de chineál ar bith. Ní gheallaimid availability, correctness, fitness for a particular purpose, uninterrupted operation ná compatibility with your systems."
no_liability = "Gan Dliteanas"
no_liability_text = "Nílimid freagrach as downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures ná aon damages díreacha nó indíreacha ó úsáid na seirbhíse."
fallback_text = "Má bhraitheann tú ar na habhatáir seo i production, ba cheart duit do fallback behavior, caching strategy agus availability plan féin a chur i bhfeidhm."
acceptable_use = "Úsáid Inghlactha"
acceptable_use_text = "Ná húsáid an tseirbhís chun infrastructure a ró-ualú, rate limits nó cache controls a sheachaint, abusive traffic patterns a thástáil, nó illegal material a stóráil trí persistence features."
changes = "Athruithe"
changes_text = "Féadfaimid an public service a athrú, a theorannú, a chur ar sos nó a scor am ar bith gan fógra. Féadfaidh public endpoints, output details nó operational limits athrú de réir mar a fhorbraíonn an tseirbhís."
legal_note = "Is operational guidance í an leathanach seo, ní legal advice. Má tá formal legal terms uait do business deployment, foilsigh reviewed version atá sonrach do do jurisdiction agus operator entity."

[pages.privacy]
title = "Príobháideachas"
description = "Privacy notice do hashavatar.app faoi request data, logs agus optional object storage behavior."
eyebrow = "Fógra Príobháideachais"
lead = "Tá an tseirbhís simplí d'aon ghnó, ach faigheann public avatar API roinnt request data fós chun feidhmiú. Déanann an leathanach seo cur síos ar an baseline praiticiúil."
receives = "Cad A Fhaigheann An tSeirbhís"
receives_identity = "an opaque identifier a chuireann tú sa request, mar internal id, username nó one-way hash"
receives_parameters = "request parameters cosúil le avatar type, style options, size, format agus background"
receives_http_metadata = "standard HTTP metadata a láimhseálann an server, reverse proxy agus CDN, mar IP address, user agent, referrer agus request timing"
stores = "Cad A Stórálann An Aip Féin"
stores_text = "Ní éilíonn an feidhmchlár user accounts agus ní shocraíonn sé application cookies de réir réamhshocraithe. Sa basic request flow gineann sé an avatar on demand agus filleann sé go díreach é."
storage_text = "Má tá object storage support cumasaithe agus signed-link nó persistence route in úsáid, féadfar an generated avatar file agus a object key a stóráil sa S3-compatible bucket cumraithe."
telemetry = "Telemetry A Chaomhnaíonn Príobháideachas"
telemetry_text = "Má chumasaíonn an operator telemetry, astaíonn an aip aggregate OpenTelemetry metrics do page views, visible page time, repository agus crate clicks, demo actions agus avatar generation counts grúpáilte de réir bounded style choices mar kind, background, accessory, color, expression, shape agus size bucket."
telemetry_limits = "Ní áirítear raw identifiers, tenant nó style namespace values, IP addresses, user agents, referrers, full URLs, cookies ná free-form text sa telemetry. Ní ghlacann telemetry endpoints ach allow-listed aggregate labels."
logging = "Logaí Agus Bonneagar"
logging_text = "Ag brath ar deployment, d'fhéadfadh infrastructure components mar nginx, Caddy, Cloudflare, hosting providers nó S3-compatible storage access logs agus operational metadata a choinneáil. Is cuid de public service a rith iad na logs sin agus d'fhéadfadh siad an requested identifier a áireamh má tá sé sa URL."
avoid = "Cad Ba Chóir A Sheachaint"
avoid_text = "Glactar le email-shaped identifiers ar mhaithe le compatibility, ach d'fhéadfadh URLs a bheith le feiceáil i infrastructure logs. Seol stable internal id nó one-way application hash nuair is mian leat personal data a sheachaint sa request URL."
repository = "Repository Agus Crate"
repository_text = "Is féidir leat an implementation a iniúchadh sa public API repository agus an reusable avatar renderer sa Rust crate."
