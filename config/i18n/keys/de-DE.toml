[hero]
eyebrow = "hashavatar.app"
title = "Öffentliche Avatare in Sekunden erzeugen"
description = "Verwandle eine opaque Benutzer-ID, einen stabilen Benutzernamen oder einen Einweg-Hash in eine deterministische Avatar-URL. Wähle Stil, Hintergrund und Größe, kopiere dann die WebP-URL, lade das Ergebnis herunter oder erstelle einen signierten Objekt-Speicher-Link."
privacy_tip = "Datenschutz-Tipp: E-Mail-artige Kennungen werden aus Komfortgründen akzeptiert, aber eine stabile interne ID oder ein Einweg-Hash ist besser, wenn weniger personenbezogene Daten in URL-Logs landen sollen."

