[pages.help]
title = "Ìrànlọ́wọ́"
description = "Integration guide fún lílo hashavatar.app avatar API nínú web apps, frontends, àti backends."
eyebrow = "Integration Guide"
lead = "Lo hashavatar.app taara láti browser, frontend, tàbí backend rẹ. Avatar URL kọọkan jẹ deterministic, nítorí náà identifier àti options kan náà máa ń fúnni ní output kan náà."
basic_url = "Basic URL"
basic_url_text = "Lo query endpoint nígbà tí o bá nílò public image URL tó rọrùn."
path_style = "Path Style URL"
path_style_text = "Lo path form bí o bá fẹ́ embed URLs tó mọ́ síi."
html_example = "HTML Àpẹẹrẹ"
javascript_example = "JavaScript Àpẹẹrẹ"
supported_parameters = "Supported Parameters"
style_layer_note = "Accessory àti expression layers ń ṣiṣẹ́ fún character-style families. Object-style families bí planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup, àti shield ni a normalize sí accessory=none àti expression=default."
signed_storage_links = "Signed Storage Links"
signed_storage_links_text = "Bí deployment yìí bá ní object storage configured, béèrè presigned storage link láti /v1/avatar/link. Endpoint náà ń store generated object, ó sì ń dá JSON padà pẹ̀lú signed URL, object key, àti hashed cache key. Standard avatar responses kì í fi signed-link metadata hàn nínú response headers."
open_source = "Open Source"
open_source_text = "Source ti public site wà nínú API repository, reusable avatar renderer sì wà ní crates.io."

[pages.docs]
title = "Ìwé ìtọ́nisọ́nà"
description = "Reference documentation fún hashavatar.app public avatar API, storage link endpoint, àti namespace-aware identity contract."
eyebrow = "API Reference"
lead = "Èyí ni product-facing reference fún public API. Identity, tenant, style version, avatar family, style options, size, àti WebP output kan náà yẹ kí ó stable jálẹ̀ major release."
core_endpoints = "Core Endpoints"
operational_endpoints = "Operational Endpoints"
operational_text = "GET /healthz jẹ public fún load balancers àti uptime checks. GET /metrics jẹ loopback-only, ó sì ń dá 404 padà fún non-local peers."
namespace_support = "Namespace Support"
namespace_text = "Lo tenant àti style_version láti ya visual identity spaces sọ́tọ̀ láàárín products tàbí rollout phases."
anonymous_ids = "Anonymous IDs"
anonymous_text = "Fi internal stable id tàbí one-way application hash ránṣẹ́ dípò raw personal data."
rate_limits = "Rate Limits"
rate_limits_text = "Public service ń fi origin-side rate limits sílẹ̀, pẹ̀lú limits tó lágbára fún /v1/avatar/link, direct avatar requests pẹ̀lú persist=true, àti /og.png nítorí object storage writes àti Open Graph image rendering gbowolori ju direct rendering lọ."
timeouts = "Timeouts"
timeouts_text = "Avatar generation àti storage operations wà labẹ server-side timeouts kí expensive requests má bàa gba origin mọ́lẹ̀ láìní opin."
