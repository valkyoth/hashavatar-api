[pages.terms]
title = "Feltételek"
description = "Best-effort service terms a hashavatar.app public avatar API és demo website használatához."
eyebrow = "Szolgáltatási Feltételek"
lead = "Ez a public service tájékoztató jelleggel és best-effort alapon érhető el. Csak akkor használja, ha ez a risk profile megfelel az alkalmazásának."
no_warranty = "Nincs Garancia"
no_warranty_text = "Ez a szolgáltatás és minden generated outputs as-is és as-available módon érhető el, bármilyen kifejezett vagy hallgatólagos garancia nélkül. Nem ígérünk availability, correctness, fitness for a particular purpose, uninterrupted operation vagy compatibility with your systems értékeket."
no_liability = "Nincs Felelősség"
no_liability_text = "Nem vállalunk felelősséget downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures vagy a szolgáltatás használatából eredő közvetlen vagy közvetett damages miatt."
fallback_text = "Ha production környezetben függ ezektől az avataroktól, valósítson meg saját fallback behavior, caching strategy és availability plan megoldást."
acceptable_use = "Elfogadható Használat"
acceptable_use_text = "Ne használja a szolgáltatást infrastructure túlterhelésére, rate limits vagy cache controls megkerülésére, abusive traffic patterns tesztelésére vagy illegal material tárolására persistence features útján."
changes = "Változások"
changes_text = "A public service-t bármikor és értesítés nélkül módosíthatjuk, korlátozhatjuk, felfüggeszthetjük vagy megszüntethetjük. A public endpoints, output details vagy operational limits változhatnak a szolgáltatás fejlődésével."
legal_note = "Ez az oldal operational guidance, nem legal advice. Ha business deploymenthez formal legal terms szükséges, tegyen közzé a jurisdiction és operator entity szerint reviewed versiont."

[pages.privacy]
title = "Adatvédelem"
description = "Privacy notice a hashavatar.app request data, logs és optional object storage behavior kezeléséről."
eyebrow = "Adatvédelmi Tájékoztató"
lead = "A szolgáltatás szándékosan egyszerű, de egy public avatar API működéséhez bizonyos request data szükséges. Ez az oldal a gyakorlati baseline-t írja le."
receives = "Mit Kap A Szolgáltatás"
receives_identity = "az opaque identifier, amelyet a requestbe tesz, például internal id, username vagy one-way hash"
receives_parameters = "request parameters, például avatar type, style options, size, format és background"
receives_http_metadata = "standard HTTP metadata, amelyet a server, reverse proxy és CDN kezel, például IP address, user agent, referrer és request timing"
stores = "Mit Tárol Maga Az Alkalmazás"
stores_text = "Az alkalmazás nem igényel user accounts használatot, és alapértelmezés szerint nem állít be application cookies-t. A basic request flow során on demand generálja az avatart és közvetlenül visszaadja."
storage_text = "Ha az object storage support engedélyezett és signed-link vagy persistence route használatban van, a generated avatar file és object key a konfigurált S3-compatible bucketben tárolódhat."
telemetry = "Adatvédelmet Kímélő Telemetria"
telemetry_text = "Ha az operator bekapcsolja a telemetry funkciót, az app aggregate OpenTelemetry metrics adatokat küld page views, visible page time, repository és crate clicks, demo actions, valamint avatar generation counts értékekről, bounded style choices szerint csoportosítva, például kind, background, accessory, color, expression, shape és size bucket."
telemetry_limits = "A telemetry nem tartalmaz raw identifiers, tenant vagy style namespace values, IP addresses, user agents, referrers, full URLs, cookies vagy free-form text adatokat. A telemetry endpoints csak allow-listed aggregate labels értékeket fogadnak el."
logging = "Naplók és Infrastruktúra"
logging_text = "Deploymenttől függően infrastructure components, például nginx, Caddy, Cloudflare, hosting providers vagy S3-compatible storage access logs és operational metadata adatokat tarthatnak meg. Ezek a logs a public service működtetésének részei, és tartalmazhatják a requested identifier értéket, ha az megjelenik az URL-ben."
avoid = "Mit Érdemes Nem Küldeni"
avoid_text = "Email-shaped identifiers compatibility okból elfogadottak, de URLs megjelenhetnek infrastructure logs-ban. Küldjön stable internal id-t vagy one-way application hash-t, ha el akarja kerülni personal data elhelyezését a request URL-ben."
repository = "Repository És Crate"
repository_text = "Az implementation megtekinthető a public API repositoryban, az reusable avatar renderer pedig a Rust crate-ben."
