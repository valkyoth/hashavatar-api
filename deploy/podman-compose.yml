version: "3.9"

services:
  hashavatar:
    build:
      context: ..
      dockerfile: Dockerfile
    image: hashavatar-api:latest-wolfi
    container_name: hashavatar-app
    environment:
      PORT: "8080"
      PUBLIC_WEBSITE_HOST: "0.0.0.0"
    restart: unless-stopped
    networks:
      - hashavatar

  fluxheim:
    image: ghcr.io/valkyoth/fluxheim:v1.0.0-wolfi
    container_name: hashavatar-fluxheim
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 15s
    depends_on:
      - hashavatar
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - ./fluxheim.toml:/etc/fluxheim/fluxheim.toml:ro,Z
      - ./tls:/etc/fluxheim/tls:ro,Z
      - fluxheim_state:/var/lib/fluxheim:Z,U
      - fluxheim_cache:/var/cache/fluxheim:Z,U
      - fluxheim_logs:/var/log/fluxheim:Z,U
    networks:
      - hashavatar

volumes:
  fluxheim_state:
  fluxheim_cache:
  fluxheim_logs:

networks:
  hashavatar:
    driver: bridge
