eyebrow = "API-referens"
lead = "Detta ir den produktnära referensen fyr det almenna API:t. Sama identitet, tenant, stilversion, avatarfamilj, stilalternativ, storlek og WebP-utdata ir avsett at vara stabilt inom ien major-version."
core_endpoints = "Kärn-endpoints"
operational_endpoints = "Drift-endpoints"
operational_text = "GET /healthz ir almenn fyr lastbalanserare og tillgänglighetskontroller. GET /metrics ir bara tillgänglig via loopback og returnerer 404 fyr icke-lokala peers."
namespace_support = "Namespace-stöd"
namespace_text = "Bruk tenant og style_version fyr at hålla visuella identitetsutrymmen separata mellan produkter eld utrullningsfaser."
anonymous_ids = "Anonyma ID:n"
anonymous_text = "Skicka iet stadugt internt id eld ien envägs-applikationshash i stället fyr rå persondata."
rate_limits = "Hastighetsgränser"
rate_limits_text = "Den almenna tjänsten bruker origin-baserade hastighetsgränser, med striktare gränser fyr /v1/avatar/link, direkta avatarförfrågningar med persist=true og /og.png eftersom objektlagringsskrivningar og Open Graph-rendering ir dyrare än direkt rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar-generering og lagringsoperationer begränsas av serverbaserade timeouts so at dyra förfrågningar int kan monopolisera origin-servern obegränsat."
