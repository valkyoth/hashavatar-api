[pages.help]
title = "Aiuto"
description = "Guida di integrazione per usare l'API avatar hashavatar.app in web app, frontend e backend."
eyebrow = "Guida di integrazione"
lead = "Usa hashavatar.app direttamente dal browser, dal frontend o dal backend. Ogni URL avatar è deterministico, quindi lo stesso identificatore e le stesse opzioni producono sempre lo stesso risultato."
basic_url = "URL base"
basic_url_text = "Usa l'endpoint query quando vuoi un semplice URL pubblico di immagine."
path_style = "URL con percorso"
path_style_text = "Usa la forma con percorso se preferisci URL di embed più puliti."
html_example = "Esempio HTML"
javascript_example = "Esempio JavaScript"
supported_parameters = "Parametri supportati"
style_layer_note = "I livelli accessorio ed espressione si applicano alle famiglie in stile personaggio. Le famiglie oggetto come planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup e shield sono normalizzate a accessory=none ed expression=default."
signed_storage_links = "Link storage firmati"
signed_storage_links_text = "Se questo deployment ha object storage configurato, richiedi un link storage presigned da /v1/avatar/link. L'endpoint salva l'oggetto generato e restituisce JSON con URL firmato, object key e cache key con hash. Le risposte avatar standard non espongono metadati di link firmati negli header."
open_source = "Open source"
open_source_text = "Il codice del sito pubblico si trova nel repository API e il renderer avatar riutilizzabile è pubblicato su crates.io."

[pages.docs]
title = "Documentazione"
description = "Documentazione di riferimento per l'API avatar pubblica hashavatar.app, l'endpoint link storage e il contratto di identità con namespace."
eyebrow = "Riferimento API"
lead = "Questo è il riferimento orientato al prodotto per l'API pubblica. La stessa identità, tenant, versione stile, famiglia avatar, opzioni stile, dimensione e output WebP sono pensati per rimanere stabili entro una major version."
core_endpoints = "Endpoint principali"
operational_endpoints = "Endpoint operativi"
operational_text = "GET /healthz è pubblico per load balancer e controlli uptime. GET /metrics è limitato al loopback e restituisce 404 ai peer non locali."
namespace_support = "Supporto namespace"
namespace_text = "Usa tenant e style_version per mantenere separati gli spazi di identità visiva tra prodotti o fasi di rollout."
anonymous_ids = "ID anonimi"
anonymous_text = "Invia un id interno stabile o un hash applicativo unidirezionale invece di dati personali grezzi."
rate_limits = "Rate limit"
rate_limits_text = "Il servizio pubblico applica rate limit lato origin, con limiti più stretti su /v1/avatar/link, richieste avatar dirette con persist=true e /og.png perché le scritture su object storage e il rendering Open Graph sono più costosi del rendering diretto."
timeouts = "Timeout"
timeouts_text = "La generazione avatar e le operazioni di storage sono limitate da timeout server-side, così le richieste costose non possono monopolizzare l'origin indefinitamente."
errors = "Errori"
error_bad_request = "kind non valido, algoritmo o formato non supportato, dimensione o identità mancante"
error_timeout = "timeout di generazione o storage"
error_rate_limit = "rate limit superato"
error_internal = "errore di rendering o storage"
openapi = "OpenAPI"
openapi_text = "Per client generati o strumenti, usa"

[pages.terms]
title = "Termini"
description = "Termini di servizio best-effort per l'API avatar pubblica hashavatar.app e il sito demo."
eyebrow = "Termini del servizio"
lead = "Questo servizio pubblico è fornito a scopo informativo e best-effort. Usalo solo se questo profilo di rischio è adatto alla tua applicazione."
no_warranty = "Nessuna garanzia"
no_warranty_text = "Questo servizio e tutti gli output generati sono forniti così come sono e in base alla disponibilità, senza garanzie di alcun tipo, espresse o implicite. Non promettiamo disponibilità, correttezza, idoneità a uno scopo specifico, funzionamento ininterrotto o compatibilità con i tuoi sistemi."
no_liability = "Nessuna responsabilità"
no_liability_text = "Non siamo responsabili di downtime, interruzioni, prestazioni degradate, link rotti, comportamento della cache, perdita di dati, oggetti corrotti, guasti di provider terzi o danni diretti o indiretti derivanti dal tuo uso del servizio."
fallback_text = "Se dipendi da questi avatar in produzione, dovresti implementare il tuo comportamento di fallback, una strategia di cache e un piano di disponibilità."
acceptable_use = "Uso accettabile"
acceptable_use_text = "Non usare il servizio per sovraccaricare l'infrastruttura, aggirare rate limit o controlli cache, testare pattern di traffico abusivi o salvare materiale illegale tramite qualsiasi funzione di persistenza."
changes = "Modifiche"
changes_text = "Possiamo modificare, limitare, sospendere o interrompere il servizio pubblico in qualsiasi momento e senza preavviso. Endpoint pubblici, dettagli di output o limiti operativi possono cambiare con l'evoluzione del servizio."
legal_note = "Questa pagina è orientamento operativo, non consulenza legale. Se ti servono termini legali formali per un deployment aziendale, pubblica una versione revisionata specifica per la tua giurisdizione e la tua entità operatrice."

[pages.privacy]
title = "Privacy"
description = "Informativa privacy per hashavatar.app relativa a dati di richiesta, log e comportamento opzionale di object storage."
eyebrow = "Informativa privacy"
lead = "Il servizio è volutamente semplice, ma un'API avatar pubblica riceve comunque alcuni dati di richiesta per funzionare. Questa pagina descrive quella base pratica."
receives = "Cosa riceve il servizio"
receives_identity = "l'identificatore opaco che inserisci nella richiesta, come un id interno, nome utente o hash unidirezionale"
receives_parameters = "parametri di richiesta come tipo avatar, opzioni stile, dimensione, formato e sfondo"
receives_http_metadata = "metadati HTTP standard gestiti da server, reverse proxy e CDN, come indirizzo IP, user agent, referrer e tempi di richiesta"
stores = "Cosa salva l'app"
stores_text = "L'applicazione non richiede account utente e non imposta cookie applicativi di default. Nel flusso di richiesta base genera l'avatar on demand e lo restituisce direttamente."
storage_text = "Se il supporto object storage è abilitato e viene usata una route di link firmato o persistenza, il file avatar generato e la sua object key possono essere salvati nel bucket S3-compatibile configurato."
telemetry = "Telemetria rispettosa della privacy"
telemetry_text = "Se la telemetria è abilitata dall'operatore, l'app emette metriche OpenTelemetry aggregate per page view, tempo visibile sulla pagina, click verso repository e crate, azioni demo e generazioni avatar raggruppate per scelte di stile limitate come kind, background, accessory, color, expression, shape e bucket dimensione."
telemetry_limits = "La telemetria non include identificatori grezzi, valori tenant o style namespace, indirizzi IP, user agent, referrer, URL completi, cookie o testo libero. Gli endpoint di telemetria accettano solo label aggregate consentite."
logging = "Log e infrastruttura"
logging_text = "A seconda del deployment, componenti infrastrutturali come nginx, Caddy, Cloudflare, provider hosting o storage S3-compatibile possono conservare access log e metadati operativi. Questi log fanno parte della gestione di un servizio pubblico e possono contenere l'identificatore richiesto se appare nell'URL."
avoid = "Cosa evitare di inviare"
avoid_text = "Gli identificatori simili a email sono accettati per compatibilità, ma gli URL possono comparire nei log infrastrutturali. Invia un id interno stabile o un hash applicativo unidirezionale quando vuoi evitare di inserire dati personali nell'URL di richiesta."
repository = "Repository e crate"
repository_text = "Puoi esaminare l'implementazione nel repository API pubblico e il renderer avatar riutilizzabile nel crate Rust."
translations = "Nota sulle traduzioni"
translations_text = "Le traduzioni del sito sono assistite dall'IA e fornite al meglio delle possibilità. Se vedi testi da migliorare, i contributi sono benvenuti su GitHub."
translations_link = "Migliorare le traduzioni"
