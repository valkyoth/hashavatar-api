[pages.help]
title = "Помощь"
description = "Руководство по интеграции avatar API hashavatar.app в web apps, frontends и backends."
eyebrow = "Руководство по интеграции"
lead = "Используйте hashavatar.app прямо из браузера, frontend или backend. Каждый URL аватара детерминирован, поэтому один и тот же идентификатор и опции всегда дают один результат."
basic_url = "Базовый URL"
