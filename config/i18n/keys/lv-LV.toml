core_endpoints = "Galvenie Endpointi"
operational_endpoints = "Operacionālie Endpointi"
operational_text = "GET /healthz ir publisks load balancers un uptime checks vajadzībām. GET /metrics ir tikai loopback un ne-vietējiem peers atgriež 404."
namespace_support = "Namespace Atbalsts"
namespace_text = "Izmantojiet tenant un style_version, lai nodalītu vizuālās identitātes telpas starp produktiem vai rollout posmiem."
anonymous_ids = "Anonīmi ID"
anonymous_text = "Sūtiet iekšēju stabilu id vai vienvirziena application hash nevis neapstrādātus personas datus."
rate_limits = "Rate Limits"
rate_limits_text = "Public service piemēro origin-side rate limits; stingrāki limiti ir /v1/avatar/link, direct avatar requests ar persist=true un /og.png, jo object storage writes un Open Graph image rendering ir dārgāki nekā direct rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar generation un storage operations tiek ierobežotas ar server-side timeouts, lai dārgi pieprasījumi nevarētu bezgalīgi aizņemt origin."
