telemetry_text = "As de operator telemetry ynskeakelet, stjoert de app aggregate OpenTelemetry metrics foar page views, visible page time, repository en crate clicks, demo actions en avatar generation counts groepearre op bounded style choices lykas kind, background, accessory, color, expression, shape en size bucket."
telemetry_limits = "Telemetry befettet gjin raw identifiers, tenant of style namespace values, IP addresses, user agents, referrers, full URLs, cookies of free-form text. Telemetry endpoints akseptearje allinnich allow-listed aggregate labels."
