[pages.help]
title = "Ajutor"
description = "Ghid de integrare pentru folosirea hashavatar.app avatar API în web apps, frontends și backends."
eyebrow = "Ghid De Integrare"
lead = "Folosește hashavatar.app direct din browser, frontend sau backend. Fiecare avatar URL este determinist, deci același identificator și aceleași opțiuni produc mereu același rezultat."
basic_url = "URL De Bază"
basic_url_text = "Folosește query endpoint când vrei un image URL public simplu."
path_style = "Path Style URL"
path_style_text = "Folosește forma path dacă preferi embed URLs mai curate."
html_example = "Exemplu HTML"
javascript_example = "Exemplu JavaScript"
supported_parameters = "Parametri Suportați"
style_layer_note = "Accessory și expression layers se aplică familiilor character-style. Familiile object-style precum planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup și shield sunt normalizate la accessory=none și expression=default."
signed_storage_links = "Linkuri De Stocare Semnate"
signed_storage_links_text = "Dacă acest deployment are object storage configurat, cere un presigned storage link de la /v1/avatar/link. Acel endpoint stochează generated object și returnează JSON cu signed URL, object key și hashed cache key. Răspunsurile standard de avatar nu expun signed-link metadata în response headers."
open_source = "Open Source"
open_source_text = "Sursa site-ului public se află în API repository, iar reusable avatar renderer este publicat pe crates.io."

[pages.docs]
title = "Documentație"
description = "Reference documentation pentru hashavatar.app public avatar API, storage link endpoint și namespace-aware identity contract."
eyebrow = "API Reference"
lead = "Aceasta este referința product-facing pentru public API. Aceeași identity, tenant, style version, avatar family, style options, size și WebP output sunt menite să rămână stabile într-un major release."
core_endpoints = "Core Endpoints"
operational_endpoints = "Endpointuri Operaționale"
operational_text = "GET /healthz este public pentru load balancers și uptime checks. GET /metrics este loopback-only și returnează 404 pentru non-local peers."
namespace_support = "Suport Namespace"
namespace_text = "Folosește tenant și style_version pentru a păstra visual identity spaces separate între produse sau rollout phases."
anonymous_ids = "ID-uri Anonime"
anonymous_text = "Trimite un internal stable id sau one-way application hash în loc de raw personal data."
rate_limits = "Rate Limits"
rate_limits_text = "Public service aplică origin-side rate limits, cu limite mai stricte pentru /v1/avatar/link, direct avatar requests cu persist=true și /og.png, deoarece object storage writes și Open Graph image rendering sunt mai costisitoare decât direct rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar generation și storage operations sunt limitate de server-side timeouts, astfel încât cererile costisitoare să nu poată monopoliza origin la nesfârșit."
errors = "Erori"
error_bad_request = "kind invalid, unsupported algorithm sau format, size sau missing identity"
error_timeout = "generation sau storage timeout"
error_rate_limit = "rate limit exceeded"
error_internal = "rendering sau storage failure"
openapi = "OpenAPI"
openapi_text = "Pentru generated clients sau tooling, folosește"

[pages.terms]
title = "Termeni"
description = "Best-effort service terms pentru public hashavatar.app avatar API și demo website."
eyebrow = "Termeni De Serviciu"
lead = "Acest public service este oferit în scop informativ și pe bază best-effort. Folosește-l doar dacă acest risk profile se potrivește aplicației tale."
no_warranty = "Fără Garanție"
no_warranty_text = "Acest serviciu și toate generated outputs sunt furnizate as-is și as-available, fără garanții de niciun fel. Nu promitem availability, correctness, fitness for a particular purpose, uninterrupted operation sau compatibility with your systems."
no_liability = "Fără Răspundere"
no_liability_text = "Nu suntem responsabili pentru downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures sau orice damages directe sau indirecte rezultate din folosirea serviciului."
fallback_text = "Dacă depinzi de aceste avatare în production, ar trebui să implementezi propriul fallback behavior, caching strategy și availability plan."
acceptable_use = "Utilizare Acceptabilă"
acceptable_use_text = "Nu folosi serviciul pentru a supraîncărca infrastructure, a ocoli rate limits sau cache controls, a testa abusive traffic patterns sau a stoca illegal material prin persistence features."
changes = "Modificări"
changes_text = "Putem modifica, limita, suspenda sau închide public service oricând și fără notificare. Public endpoints, output details sau operational limits se pot schimba pe măsură ce serviciul evoluează."
legal_note = "Această pagină este operational guidance, nu legal advice. Dacă ai nevoie de formal legal terms pentru business deployment, publică o reviewed version specifică pentru jurisdiction și operator entity."

[pages.privacy]
title = "Confidențialitate"
description = "Privacy notice pentru hashavatar.app despre request data, logs și optional object storage behavior."
eyebrow = "Notificare De Confidențialitate"
lead = "Serviciul este intenționat simplu, dar un public avatar API primește totuși unele request data pentru a funcționa. Această pagină descrie baseline-ul practic."
receives = "Ce Primește Serviciul"
receives_identity = "opaque identifier pe care îl pui în request, precum internal id, username sau one-way hash"
receives_parameters = "request parameters precum avatar type, style options, size, format și background"
receives_http_metadata = "standard HTTP metadata gestionate de server, reverse proxy și CDN, precum IP address, user agent, referrer și request timing"
stores = "Ce Stochează Aplicația"
stores_text = "Aplicația nu cere user accounts și nu setează application cookies implicit. În basic request flow generează avatarul on demand și îl returnează direct."
storage_text = "Dacă object storage support este activat și se folosește o signed-link sau persistence route, generated avatar file și object key pot fi stocate în bucket-ul S3-compatible configurat."
telemetry = "Telemetrie Cu Respect Pentru Confidențialitate"
telemetry_text = "Dacă operator activează telemetry, aplicația emite aggregate OpenTelemetry metrics pentru page views, visible page time, repository și crate clicks, demo actions și avatar generation counts grupate după bounded style choices precum kind, background, accessory, color, expression, shape și size bucket."
telemetry_limits = "Telemetry nu include raw identifiers, tenant sau style namespace values, IP addresses, user agents, referrers, full URLs, cookies sau free-form text. Telemetry endpoints acceptă doar allow-listed aggregate labels."
logging = "Loguri Și Infrastructură"
logging_text = "În funcție de deployment, infrastructure components precum nginx, Caddy, Cloudflare, hosting providers sau S3-compatible storage pot păstra access logs și operational metadata. Aceste logs fac parte din operarea unui public service și pot conține requested identifier dacă apare în URL."
avoid = "Ce Să Eviți Să Trimiți"
avoid_text = "Email-shaped identifiers sunt acceptați pentru compatibility, dar URLs pot apărea în infrastructure logs. Trimite stable internal id sau one-way application hash când vrei să eviți personal data în request URL."
repository = "Repository Și Crate"
repository_text = "Poți inspecta implementation în public API repository și reusable avatar renderer în Rust crate."
translations = "Notă despre traduceri"
translations_text = "Traducerile site-ului sunt asistate de AI și realizate cu cel mai bun efort. Dacă vedeți formulări care ar trebui îmbunătățite, contribuțiile pe GitHub sunt binevenite."
translations_link = "Îmbunătățiți traducerile"
