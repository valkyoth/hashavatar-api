[pages.terms]
title = "Termene"
description = "Best-effort service terms pe' 'o public hashavatar.app avatar API e demo website."
eyebrow = "Termene D' 'O Servizio"
lead = "Chistu public service è dato pe' informazione e ncopp'a base best-effort. Usalo sulo si chillu risk profile va buono pe' l'applicazione toja."
no_warranty = "Nisciuna Garanzia"
no_warranty_text = "Chistu servizio e tutte 'e generated outputs so' date as-is e as-available, senza garanzie. Nun prumettimmo availability, correctness, fitness for a particular purpose, uninterrupted operation o compatibility with your systems."
no_liability = "Nisciuna Responsabilità"
no_liability_text = "Nun simmo responsabile pe' downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures o damages dirette o indirette nate da l'uso d' 'o servizio."
fallback_text = "Si dipienne da chisti avatar in production, avisse implementà nu fallback behavior, caching strategy e availability plan tuoje."
acceptable_use = "Uso Accettabile"
acceptable_use_text = "Nun usà 'o servizio pe' sovraccaricà infrastructure, scavalcà rate limits o cache controls, testà abusive traffic patterns o sarvà illegal material via persistence features."
changes = "Cagnamiente"
changes_text = "Putimmo cagnà, limità, sospennere o fernì 'o public service quanno vulimmo e senza avviso. Public endpoints, output details o operational limits ponno cagnà cu l'evoluzione d' 'o servizio."
legal_note = "Chesta pagina è operational guidance, nun legal advice. Si te servono formal legal terms pe' business deployment, pubblica na reviewed version specifica p' 'a toja jurisdiction e operator entity."

[pages.privacy]
title = "Privacy"
description = "Privacy notice pe' hashavatar.app supra request data, logs e optional object storage behavior."
eyebrow = "Avviso Privacy"
lead = "'O servizio è apposta semplice, ma nu public avatar API riceve sempe quacche request data pe' funzionà. Chesta pagina spiega 'o baseline pratico."
receives = "Che Riceve 'O Servizio"
receives_identity = "l'opaque identifier ca mitte dint'â request, comme internal id, username o one-way hash"
receives_parameters = "request parameters comme avatar type, style options, size, format e background"
receives_http_metadata = "standard HTTP metadata trattate da server, reverse proxy e CDN, comme IP address, user agent, referrer e request timing"
stores = "Che Sarva L'App"
stores_text = "L'applicazione nun richiede user accounts e nun mette application cookies di default. Dint'ô basic request flow genera l'avatar on demand e 'o torna direttamente."
storage_text = "Si object storage support è attivo e s'usa signed-link o persistence route, 'o generated avatar file e 'o object key ponno essere sarvate dint'ô S3-compatible bucket configurato."
telemetry = "Telemetry Ca Rispetta 'A Privacy"
telemetry_text = "Si l'operator abilita telemetry, l'app emette aggregate OpenTelemetry metrics pe' page views, visible page time, repository e crate clicks, demo actions e avatar generation counts raggruppate pe' bounded style choices comme kind, background, accessory, color, expression, shape e size bucket."
telemetry_limits = "Telemetry nun include raw identifiers, tenant o style namespace values, IP addresses, user agents, referrers, full URLs, cookies o free-form text. Telemetry endpoints accettano sulo allow-listed aggregate labels."
logging = "Log E Infrastruttura"
logging_text = "A seconda d' 'o deployment, infrastructure components comme nginx, Caddy, Cloudflare, hosting providers o S3-compatible storage ponno mantené access logs e operational metadata. Chisti logs fanno parte d' 'o public service e ponno contené 'o requested identifier si sta dint'â URL."
avoid = "Che È Meglio Nun Mannà"
avoid_text = "Email-shaped identifiers so' accettate pe' compatibility, ma URLs ponno apparì dint'ê infrastructure logs. Manna stable internal id o one-way application hash si vuo' evitá personal data dint'â request URL."
repository = "Repository E Crate"
repository_text = "Può guardà l'implementation dint'ô public API repository e 'o reusable avatar renderer dint'â Rust crate."
translations = "Nota ncopp' 'e traduziune"
translations_text = "'E traduziune d' 'o sito so' aiutate cu AI e fatte cu 'o meglio sforzo. Si vide parole ca se ponno migliurà, 'e cuntribute ncopp' a GitHub so' benvenute."
