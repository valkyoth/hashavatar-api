[pages.help]
title = "Hulp"
description = "Integration guide vir die gebruik van die hashavatar.app avatar API in web apps, frontends, en backends."
eyebrow = "Integration Guide"
lead = "Gebruik hashavatar.app direk vanaf jou browser, frontend, of backend. Elke avatar URL is deterministic, dus gee dieselfde identifier en options altyd dieselfde output."
basic_url = "Basic URL"
basic_url_text = "Gebruik die query endpoint wanneer jy 'n eenvoudige public image URL nodig het."
path_style = "Path Style URL"
path_style_text = "Gebruik die path form as jy skoner embed URLs verkies."
html_example = "HTML Voorbeeld"
javascript_example = "JavaScript Voorbeeld"
supported_parameters = "Supported Parameters"
style_layer_note = "Accessory en expression layers word op character-style families toegepas. Object-style families soos planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup, en shield word na accessory=none en expression=default genormaliseer."
signed_storage_links = "Signed Storage Links"
signed_storage_links_text = "As hierdie deployment object storage configured het, vra 'n presigned storage link vanaf /v1/avatar/link. Die endpoint store die generated object en gee JSON terug met 'n signed URL, object key, en hashed cache key. Standard avatar responses wys nie signed-link metadata in response headers nie."
open_source = "Open Source"
open_source_text = "Die public site source is in die GitHub repository en die reusable avatar renderer is op crates.io gepublish."

[pages.docs]
title = "Dokumentasie"
description = "Reference documentation vir die hashavatar.app public avatar API, storage link endpoint, en namespace-aware identity contract."
eyebrow = "API Reference"
lead = "Dit is die product-facing reference vir die public API. Dieselfde identity, tenant, style version, avatar family, style options, size, en WebP output behoort stabiel te bly deur 'n major release."
core_endpoints = "Core Endpoints"
operational_endpoints = "Operational Endpoints"
operational_text = "GET /healthz is public vir load balancers en uptime checks. GET /metrics is loopback-only en gee 404 terug vir non-local peers."
namespace_support = "Namespace Support"
namespace_text = "Gebruik tenant en style_version om visual identity spaces tussen products of rollout phases te skei."
anonymous_ids = "Anonymous IDs"
anonymous_text = "Stuur 'n internal stable id of one-way application hash eerder as raw personal data."
rate_limits = "Rate Limits"
rate_limits_text = "Die public service pas origin-side rate limits toe, met strenger limits vir /v1/avatar/link, direct avatar requests met persist=true, en /og.png omdat object storage writes en Open Graph image rendering duurder is as direct rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar generation en storage operations is bounded deur server-side timeouts sodat expensive requests nie die origin onbeperk kan vashou nie."
errors = "Errors"
error_bad_request = "invalid kind, unsupported algorithm of format, size, of missing identity"
error_timeout = "generation of storage timeout"
error_rate_limit = "rate limit exceeded"
error_internal = "rendering of storage failure"
openapi = "OpenAPI"
openapi_text = "Vir generated clients of tooling, gebruik"

[pages.terms]
title = "Voorwaardes"
description = "Best-effort service terms vir die public hashavatar.app avatar API en demo website."
eyebrow = "Service Terms"
lead = "Hierdie public service word vir inligting en op 'n best-effort basis verskaf. Gebruik dit net as hierdie risk profile by jou application pas."
no_warranty = "No Warranty"
no_warranty_text = "Hierdie service en alle generated outputs word as-is en as-available verskaf, sonder enige warranty. Ons belowe nie availability, correctness, fitness for a particular purpose, uninterrupted operation, of compatibility with your systems nie."
no_liability = "No Liability"
no_liability_text = "Ons is nie aanspreeklik vir downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures, of direct/indirect damages uit die gebruik van die service nie."
fallback_text = "As jy in production op hierdie avatars staatmaak, moet jy jou eie fallback behavior, caching strategy, en availability plan implementeer."
acceptable_use = "Acceptable Use"
acceptable_use_text = "Moenie die service gebruik om infrastructure te overload, rate limits of cache controls te bypass, abusive traffic patterns te test, of illegal material deur persistence features te store nie."
changes = "Veranderinge"
changes_text = "Ons kan die public service enige tyd sonder notice change, limit, suspend, of discontinue. Public endpoints, output details, of operational limits kan verander soos die service evolve."
legal_note = "Hierdie page is operational guidance, nie legal advice nie. As jy formal legal terms vir business deployment nodig het, publish 'n reviewed version wat by jou jurisdiction en operator entity pas."

[pages.privacy]
title = "Privaatheid"
description = "Privacy notice vir hashavatar.app oor request data, logs, en optional object storage behavior."
eyebrow = "Privacy Notice"
lead = "Hierdie service is doelbewus simple, maar die public avatar API ontvang steeds sekere request data om te werk. Hierdie page verduidelik daardie practical baseline."
receives = "Wat Die Service Ontvang"
receives_identity = "opaque identifier wat jy in die request sit, soos internal id, username, of one-way hash"
receives_parameters = "request parameters soos avatar type, style options, size, format, en background"
receives_http_metadata = "standard HTTP metadata wat deur die server, reverse proxy, en CDN hanteer word, soos IP address, user agent, referrer, en request timing"
stores = "Wat Die App Store"
stores_text = "Die application vereis nie user accounts nie en set nie by default application cookies nie. In die basic request flow generate die app 'n avatar on demand en return dit direk."
storage_text = "As object storage support enabled is en 'n signed-link of persistence route gebruik word, kan die generated avatar file en object key in die configured S3-compatible bucket gestore word."
telemetry = "Privacy-Preserving Telemetry"
telemetry_text = "As die operator telemetry enable, emit die app aggregate OpenTelemetry metrics vir page views, visible page time, repository en crate clicks, demo actions, en avatar generation counts grouped volgens bounded style choices soos kind, background, accessory, color, expression, shape, en size bucket."
telemetry_limits = "Telemetry bevat nie raw identifiers, tenant of style namespace values, IP addresses, user agents, referrers, full URLs, cookies, of free-form text nie. Telemetry endpoints aanvaar net allow-listed aggregate labels."
logging = "Logs En Infrastructure"
logging_text = "Afhangend van deployment kan infrastructure components soos nginx, Caddy, Cloudflare, hosting providers, of S3-compatible storage access logs en operational metadata store. Hierdie logs is deel van die public service bedryf en kan die requested identifier bevat as dit in die URL verskyn."
avoid = "Wat Jy Liewer Nie Moet Stuur Nie"
avoid_text = "Email-shaped identifiers word vir compatibility aanvaar, maar URLs kan in infrastructure logs verskyn. Stuur 'n stable internal id of one-way application hash as jy personal data in request URLs wil vermy."
repository = "Repository En Crate"
repository_text = "Jy kan die implementation in die public GitHub repository en die reusable avatar renderer in die Rust crate nagaan."
translations = "Vertaalnota"
translations_text = "Die webwerfvertalings is met KI ondersteun en volgens beste poging gedoen. As jy bewoording sien wat verbeter moet word, is bydraes op GitHub welkom."
translations_link = "Verbeter vertalings"
