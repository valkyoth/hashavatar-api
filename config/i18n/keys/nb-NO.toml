no_liability = "Intet ansvar"
no_liability_text = "Vi er ikke ansvarlige for nedetid, avbrudd, redusert ytelse, brutte lenker, cache-atferd, datatap, korrupte objekter, feil hos tredjepartsleverandører eller direkte eller indirekte skader som oppstår fra din bruk av tjenesten."
fallback_text = "Hvis du er avhengig av disse avatarene i produksjon, bør du implementere egen fallback-atferd, en cache-strategi og en tilgjengelighetsplan."
acceptable_use = "Akseptabel bruk"
acceptable_use_text = "Ikke bruk tjenesten til å overbelaste infrastrukturen, omgå rate limits eller cache-kontroller, teste misbrukende trafikkmønstre eller lagre ulovlig materiale gjennom noen persistensfunksjon."
changes = "Endringer"
changes_text = "Vi kan endre, begrense, suspendere eller avslutte den offentlige tjenesten når som helst og uten varsel. Offentlige endepunkter, utdatasdetaljer eller driftsgrenser kan endres etter hvert som tjenesten utvikler seg."
legal_note = "Denne siden er operasjonell veiledning, ikke juridisk rådgivning. Hvis du trenger formelle juridiske vilkår for en forretningsdeployment, bør du publisere en gjennomgått versjon som er spesifikk for din jurisdiksjon og operatørenhet."

[pages.privacy]
title = "Personvern"
description = "Personvernerklæring for hashavatar.app som dekker forespørselsdata, logger og valgfri objektlagringsatferd."
eyebrow = "Personvernerklæring"
lead = "Tjenesten er med vilje enkel, men et offentlig avatar-API mottar likevel noe forespørselsdata for å fungere. Denne siden beskriver den praktiske grunnlinjen."
receives = "Hva tjenesten mottar"
receives_identity = "den ugjennomsiktige identifikatoren du legger i forespørselen, for eksempel en intern id, et brukernavn eller en enveis-hash"
receives_parameters = "forespørselsparametere som avatartype, stilalternativer, størrelse, format og bakgrunn"
receives_http_metadata = "standard HTTP-metadata som håndteres av serveren, reverse proxyen og CDN-et, for eksempel IP-adresse, user agent, referrer og forespørselstid"
stores = "Hva appen selv lagrer"
stores_text = "Applikasjonen krever ikke brukerkontoer og setter som standard ingen applikasjonscookies. I den grunnleggende forespørselsflyten genererer den avataren ved behov og returnerer den direkte."
storage_text = "Hvis objektlagringsstøtte er aktivert og en signert lenke- eller persistensrute brukes, kan den genererte avatarfilen og objektnøkkelen lagres i den konfigurerte S3-kompatible bucketen."
telemetry = "Personvernvennlig telemetri"
telemetry_text = "Hvis telemetri er aktivert av operatøren, sender appen aggregerte OpenTelemetry-målinger for sidevisninger, synlig sidetid, klikk til repository og crate, demo-handlinger og avatar-genereringer gruppert etter begrensede stilvalg som kind, background, accessory, color, expression, shape og størrelsesbucket."
telemetry_limits = "Telemetri inkluderer ikke rå identifikatorer, tenant- eller style namespace-verdier, IP-adresser, user agents, referrers, fullstendige URL-er, cookies eller fritekst. Telemetri-endepunktene godtar bare tillatte aggregerte labels."
logging = "Logger og infrastruktur"
logging_text = "Avhengig av deployment kan infrastrukturkomponenter som nginx, Caddy, Cloudflare, hostingleverandører eller S3-kompatibel lagring lagre tilgangslogger og driftsmetadata. Disse loggene er en del av å drive en offentlig tjeneste og kan inneholde identifikatoren du ba om hvis den vises i URL-en."
avoid = "Hva du bør unngå å sende"
avoid_text = "E-postlignende identifikatorer godtas for kompatibilitet, men URL-er kan dukke opp i infrastrukturlogger. Send en stabil intern id eller en enveis applikasjonshash når du vil unngå å plassere persondata i forespørsels-URL-en."
repository = "Repository og crate"
repository_text = "Du kan inspisere implementasjonen i det offentlige API-repositoryet og den gjenbrukbare avatar-rendereren i Rust-craten."
