[pages.help]
title = "Ajuda"
description = "Guia de integração para usar a API de avatares hashavatar.app em aplicações web, frontends e backends."
eyebrow = "Guia de integração"
lead = "Usa hashavatar.app diretamente no navegador, frontend ou backend. Cada URL de avatar é determinístico, por isso o mesmo identificador e as mesmas opções produzem sempre o mesmo resultado."
basic_url = "URL básico"
basic_url_text = "Usa o endpoint com query quando quiseres um URL de imagem pública simples."
path_style = "URL em caminho"
path_style_text = "Usa a forma em caminho se preferires URLs de integração mais limpos."
html_example = "Exemplo HTML"
javascript_example = "Exemplo JavaScript"
supported_parameters = "Parâmetros suportados"
style_layer_note = "As camadas de acessório e expressão aplicam-se a famílias com estilo de personagem. Famílias de objeto como planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup e shield são normalizadas para accessory=none e expression=default."
signed_storage_links = "Ligações de armazenamento assinadas"
signed_storage_links_text = "Se este deployment tiver armazenamento de objetos configurado, pede uma ligação de armazenamento pré-assinada em /v1/avatar/link. Esse endpoint guarda o objeto gerado e devolve JSON com o URL assinado, chave do objeto e uma chave de cache com hash. As respostas normais de avatar não expõem metadados de ligações assinadas nos headers."
open_source = "Open source"
open_source_text = "O código do site público está no repositório da API e o renderer reutilizável de avatares é publicado em crates.io."

[pages.docs]
title = "Documentação"
description = "Documentação de referência para a API pública de avatares hashavatar.app, o endpoint de ligação de armazenamento e o contrato de identidade com namespaces."
eyebrow = "Referência API"
lead = "Esta é a referência orientada ao produto para a API pública. A mesma identidade, tenant, versão de estilo, família de avatar, opções de estilo, tamanho e saída WebP devem permanecer estáveis dentro de uma versão major."
core_endpoints = "Endpoints principais"
operational_endpoints = "Endpoints operacionais"
operational_text = "GET /healthz é público para load balancers e verificações de disponibilidade. GET /metrics é limitado a loopback e devolve 404 para peers não locais."
namespace_support = "Suporte de namespaces"
namespace_text = "Usa tenant e style_version para manter espaços de identidade visual separados entre produtos ou fases de rollout."
anonymous_ids = "IDs anónimos"
anonymous_text = "Envia um id interno estável ou um hash unidirecional da aplicação em vez de dados pessoais em bruto."
rate_limits = "Limites de taxa"
rate_limits_text = "O serviço público aplica limites de taxa no origin, com limites mais rigorosos em /v1/avatar/link, pedidos diretos de avatar com persist=true e /og.png porque escritas em armazenamento de objetos e renderização Open Graph são mais caras do que renderização direta."
timeouts = "Timeouts"
timeouts_text = "A geração de avatares e as operações de armazenamento são limitadas por timeouts do servidor para que pedidos caros não monopolizem o origin indefinidamente."
errors = "Erros"
error_bad_request = "kind inválido, algoritmo ou formato não suportado, tamanho ou identidade em falta"
error_timeout = "timeout de geração ou armazenamento"
error_rate_limit = "limite de taxa excedido"
error_internal = "falha de renderização ou armazenamento"
openapi = "OpenAPI"
openapi_text = "Para clientes gerados ou ferramentas, usa"

[pages.terms]
title = "Termos"
description = "Termos de serviço best-effort para a API pública de avatares hashavatar.app e o site de demonstração."
eyebrow = "Termos do serviço"
lead = "Este serviço público é fornecido para fins informativos e em regime best-effort. Usa-o apenas se esse perfil de risco for adequado à tua aplicação."
no_warranty = "Sem garantia"
no_warranty_text = "Este serviço e todos os resultados gerados são fornecidos tal como estão e conforme disponibilidade, sem garantias de qualquer tipo, expressas ou implícitas. Não prometemos disponibilidade, exatidão, adequação a um fim específico, funcionamento ininterrupto ou compatibilidade com os teus sistemas."
no_liability = "Sem responsabilidade"
no_liability_text = "Não somos responsáveis por downtime, falhas, desempenho degradado, ligações quebradas, comportamento de cache, perda de dados, objetos corrompidos, falhas de fornecedores terceiros ou danos diretos ou indiretos resultantes da tua utilização do serviço."
fallback_text = "Se dependeres destes avatares em produção, deves implementar o teu próprio comportamento de fallback, estratégia de cache e plano de disponibilidade."
acceptable_use = "Uso aceitável"
acceptable_use_text = "Não uses o serviço para sobrecarregar a infraestrutura, contornar limites de taxa ou controlos de cache, testar padrões de tráfego abusivos ou armazenar material ilegal através de qualquer funcionalidade de persistência."
changes = "Alterações"
changes_text = "Podemos alterar, limitar, suspender ou descontinuar o serviço público a qualquer momento e sem aviso. Endpoints públicos, detalhes de saída ou limites operacionais podem mudar à medida que o serviço evolui."
legal_note = "Esta página é orientação operacional, não aconselhamento jurídico. Se precisares de termos jurídicos formais para um deployment empresarial, publica uma versão revista específica para a tua jurisdição e entidade operadora."

[pages.privacy]
title = "Privacidade"
description = "Aviso de privacidade de hashavatar.app sobre dados de pedidos, logs e comportamento opcional de armazenamento de objetos."
eyebrow = "Aviso de privacidade"
lead = "O serviço é intencionalmente simples, mas uma API pública de avatares ainda recebe alguns dados de pedido para funcionar. Esta página descreve essa base prática."
receives = "O que o serviço recebe"
receives_identity = "o identificador opaco que colocas no pedido, como um id interno, nome de utilizador ou hash unidirecional"
receives_parameters = "parâmetros do pedido como tipo de avatar, opções de estilo, tamanho, formato e fundo"
receives_http_metadata = "metadados HTTP padrão tratados pelo servidor, reverse proxy e CDN, como endereço IP, user agent, referrer e temporização do pedido"
stores = "O que a app guarda"
stores_text = "A aplicação não exige contas de utilizador e não define cookies de aplicação por defeito. No fluxo básico de pedido, gera o avatar a pedido e devolve-o diretamente."
storage_text = "Se o suporte de armazenamento de objetos estiver ativo e for usada uma rota de ligação assinada ou persistência, o ficheiro de avatar gerado e a sua chave de objeto podem ser guardados no bucket S3-compatível configurado."
telemetry = "Telemetria respeitadora da privacidade"
telemetry_text = "Se a telemetria for ativada pelo operador, a app emite métricas OpenTelemetry agregadas para visualizações de página, tempo visível, cliques para repositório e crate, ações de demo e gerações de avatar agrupadas por escolhas de estilo limitadas como kind, background, accessory, color, expression, shape e bucket de tamanho."
telemetry_limits = "A telemetria não inclui identificadores em bruto, valores tenant ou style namespace, endereços IP, user agents, referrers, URLs completos, cookies ou texto livre. Os endpoints de telemetria aceitam apenas labels agregados permitidos."
logging = "Logs e infraestrutura"
logging_text = "Dependendo do deployment, componentes de infraestrutura como nginx, Caddy, Cloudflare, fornecedores de hosting ou armazenamento S3-compatível podem manter access logs e metadados operacionais. Esses logs fazem parte da operação de um serviço público e podem conter o identificador pedido se aparecer no URL."
avoid = "O que evitar enviar"
avoid_text = "Identificadores com formato de e-mail são aceites por compatibilidade, mas URLs podem aparecer em logs de infraestrutura. Envia um id interno estável ou um hash unidirecional da aplicação quando quiseres evitar colocar dados pessoais no URL do pedido."
repository = "Repositório e crate"
repository_text = "Podes inspecionar a implementação no repositório público da API e o renderer reutilizável de avatares no crate Rust."
