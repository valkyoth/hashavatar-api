[pages.help]
title = "Taimako"
description = "Integration guide don amfani da hashavatar.app avatar API a web apps, frontends, da backends."
eyebrow = "Integration Guide"
lead = "Yi amfani da hashavatar.app kai tsaye daga browser, frontend, ko backend. Kowane avatar URL deterministic ne, don haka identifier da options iri ɗaya koyaushe suna bada output iri ɗaya."
basic_url = "Basic URL"
basic_url_text = "Yi amfani da query endpoint idan kana buƙatar public image URL mai sauƙi."
path_style = "Path Style URL"
path_style_text = "Yi amfani da path form idan kana son embed URLs masu tsabta."
html_example = "Misalin HTML"
javascript_example = "Misalin JavaScript"
supported_parameters = "Supported Parameters"
style_layer_note = "Accessory da expression layers suna aiki ga character-style families. Object-style families kamar planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup, da shield ana normalize su zuwa accessory=none da expression=default."
signed_storage_links = "Signed Storage Links"
signed_storage_links_text = "Idan wannan deployment yana da object storage configured, nemi presigned storage link daga /v1/avatar/link. Endpoint ɗin yana store generated object kuma yana dawo da JSON mai signed URL, object key, da hashed cache key. Standard avatar responses ba sa nuna signed-link metadata a response headers."
open_source = "Open Source"
open_source_text = "Source na public site yana cikin API repository, kuma reusable avatar renderer an publish shi a crates.io."

[pages.docs]
title = "Takardu"
description = "Reference documentation don hashavatar.app public avatar API, storage link endpoint, da namespace-aware identity contract."
eyebrow = "API Reference"
lead = "Wannan product-facing reference ne don public API. Ana sa ran identity, tenant, style version, avatar family, style options, size, da WebP output iri ɗaya su kasance stable a cikin major release."
core_endpoints = "Core Endpoints"
operational_endpoints = "Operational Endpoints"
operational_text = "GET /healthz public ne don load balancers da uptime checks. GET /metrics loopback-only ne kuma yana dawo da 404 ga non-local peers."
namespace_support = "Namespace Support"
namespace_text = "Yi amfani da tenant da style_version don raba visual identity spaces tsakanin products ko rollout phases."
anonymous_ids = "Anonymous IDs"
anonymous_text = "Aika internal stable id ko one-way application hash maimakon raw personal data."
rate_limits = "Rate Limits"
rate_limits_text = "Public service yana aiwatar da origin-side rate limits, tare da limits masu tsauri ga /v1/avatar/link, direct avatar requests masu persist=true, da /og.png saboda object storage writes da Open Graph image rendering sun fi direct rendering tsada."
timeouts = "Timeouts"
timeouts_text = "Avatar generation da storage operations suna bounded da server-side timeouts domin expensive requests ba za su riƙe origin ba har abada."
errors = "Errors"
error_bad_request = "invalid kind, unsupported algorithm ko format, size, ko missing identity"
error_timeout = "generation ko storage timeout"
error_rate_limit = "rate limit exceeded"
