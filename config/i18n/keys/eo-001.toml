[pages.help]
title = "Helpo"
description = "Integriĝa gvidilo por uzi la avataran API de hashavatar.app en retaplikaĵoj, frontendoj kaj backendoj."
eyebrow = "Integriĝa gvidilo"
lead = "Uzu hashavatar.app rekte el la retumilo, via frontendo aŭ via backendo. Ĉiu avatara URL estas determinisma, do la sama identigilo kaj opcioj ĉiam produktas la saman rezulton."
basic_url = "Baza URL"
basic_url_text = "Uzu la query-endpoint kiam vi volas simplan publikan bildan URL-on."
path_style = "Voja-forma URL"
