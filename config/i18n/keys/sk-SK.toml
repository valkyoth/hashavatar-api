[pages.help]
title = "Pomoc"
description = "Integračná príručka pre používanie hashavatar.app avatar API vo web apps, frontends a backends."
eyebrow = "Integračná Príručka"
lead = "Použite hashavatar.app priamo z prehliadača, frontendu alebo backendu. Každé avatar URL je deterministické, takže rovnaký identifikátor a možnosti vždy vytvoria rovnaký výsledok."
basic_url = "Základné URL"
basic_url_text = "Použite query endpoint, keď chcete jednoduché verejné image URL."
path_style = "Path Style URL"
path_style_text = "Použite path formu, ak preferujete čistejšie embed URL."
html_example = "HTML Príklad"
javascript_example = "JavaScript Príklad"
supported_parameters = "Podporované Parametre"
style_layer_note = "Accessory a expression layers sa používajú pre character-style families. Object-style families ako planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup a shield sa normalizujú na accessory=none a expression=default."
signed_storage_links = "Podpísané Odkazy Úložiska"
signed_storage_links_text = "Ak má tento deployment nakonfigurované object storage, vyžiadajte si presigned storage link z /v1/avatar/link. Tento endpoint uloží generated object a vráti JSON so signed URL, object key a hashed cache key. Štandardné avatar responses nezverejňujú signed-link metadata v response headers."
open_source = "Open Source"
open_source_text = "Zdroj verejnej stránky je v API repository a reusable avatar renderer je publikovaný na crates.io."

[pages.docs]
title = "Dokumentácia"
description = "Reference documentation pre hashavatar.app public avatar API, storage link endpoint a namespace-aware identity contract."
eyebrow = "API Reference"
lead = "Toto je product-facing reference pre public API. Rovnaké identity, tenant, style version, avatar family, style options, size a WebP output majú zostať stabilné v rámci major release."
core_endpoints = "Core Endpoints"
operational_endpoints = "Prevádzkové Endpointy"
operational_text = "GET /healthz je public pre load balancers a uptime checks. GET /metrics je loopback-only a vracia 404 pre non-local peers."
namespace_support = "Namespace Podpora"
namespace_text = "Použite tenant a style_version na oddelenie visual identity spaces medzi produktmi alebo rollout phases."
anonymous_ids = "Anonymné ID"
anonymous_text = "Namiesto raw personal data posielajte internal stable id alebo one-way application hash."
rate_limits = "Rate Limits"
rate_limits_text = "Public service používa origin-side rate limits, s prísnejšími limitmi pre /v1/avatar/link, direct avatar requests s persist=true a /og.png, pretože object storage writes a Open Graph image rendering sú drahšie než direct rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar generation a storage operations sú obmedzené server-side timeouts, aby drahé požiadavky nemohli neobmedzene monopolizovať origin."
errors = "Chyby"
error_bad_request = "neplatný kind, unsupported algorithm alebo format, size alebo missing identity"
error_timeout = "generation alebo storage timeout"
error_rate_limit = "rate limit exceeded"
error_internal = "rendering alebo storage failure"
openapi = "OpenAPI"
openapi_text = "Pre generated clients alebo tooling použite"

[pages.terms]
title = "Podmienky"
description = "Best-effort service terms pre public hashavatar.app avatar API a demo website."
eyebrow = "Podmienky Služby"
lead = "Táto public service sa poskytuje na informačné účely a na best-effort báze. Používajte ju len vtedy, ak tento risk profile vyhovuje vašej aplikácii."
no_warranty = "Bez Záruky"
no_warranty_text = "Táto služba a všetky generated outputs sa poskytujú as-is a as-available, bez akýchkoľvek záruk. Nesľubujeme availability, correctness, fitness for a particular purpose, uninterrupted operation ani compatibility with your systems."
no_liability = "Bez Zodpovednosti"
no_liability_text = "Nezodpovedáme za downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures ani priame alebo nepriame damages vzniknuté používaním služby."
fallback_text = "Ak sa na tieto avatary spoliehate v production, mali by ste implementovať vlastný fallback behavior, caching strategy a availability plan."
acceptable_use = "Prijateľné Použitie"
acceptable_use_text = "Nepoužívajte službu na preťažovanie infrastructure, obchádzanie rate limits alebo cache controls, testovanie abusive traffic patterns alebo ukladanie illegal material cez persistence features."
changes = "Zmeny"
changes_text = "Public service môžeme kedykoľvek a bez upozornenia zmeniť, obmedziť, pozastaviť alebo ukončiť. Public endpoints, output details alebo operational limits sa môžu meniť s vývojom služby."
legal_note = "Táto stránka je operational guidance, nie legal advice. Ak potrebujete formal legal terms pre business deployment, publikujte reviewed version pre svoju jurisdiction a operator entity."

[pages.privacy]
title = "Súkromie"
description = "Privacy notice pre hashavatar.app o request data, logs a optional object storage behavior."
eyebrow = "Oznámenie O Súkromí"
lead = "Služba je zámerne jednoduchá, ale public avatar API stále prijíma niektoré request data, aby fungovalo. Táto stránka opisuje praktický baseline."
receives = "Čo Služba Prijíma"
receives_identity = "opaque identifier, ktorý vložíte do request, napríklad internal id, username alebo one-way hash"
receives_parameters = "request parameters ako avatar type, style options, size, format a background"
receives_http_metadata = "standard HTTP metadata spracované serverom, reverse proxy a CDN, napríklad IP address, user agent, referrer a request timing"
stores = "Čo Ukladá Samotná Aplikácia"
stores_text = "Aplikácia nevyžaduje user accounts a predvolene nenastavuje application cookies. V basic request flow generuje avatar on demand a vracia ho priamo."
storage_text = "Ak je zapnutý object storage support a používa sa signed-link alebo persistence route, generated avatar file a object key môžu byť uložené v nakonfigurovanom S3-compatible bucket."
telemetry = "Telemetria Chrániaca Súkromie"
telemetry_text = "Ak operator povolí telemetry, aplikácia odosiela aggregate OpenTelemetry metrics pre page views, visible page time, repository a crate clicks, demo actions a avatar generation counts zoskupené podľa bounded style choices ako kind, background, accessory, color, expression, shape a size bucket."
telemetry_limits = "Telemetry nezahŕňa raw identifiers, tenant alebo style namespace values, IP addresses, user agents, referrers, full URLs, cookies ani free-form text. Telemetry endpoints prijímajú iba allow-listed aggregate labels."
logging = "Logy A Infraštruktúra"
logging_text = "Podľa deployment môžu infrastructure components ako nginx, Caddy, Cloudflare, hosting providers alebo S3-compatible storage uchovávať access logs a operational metadata. Tieto logs sú súčasťou prevádzky public service a môžu obsahovať requested identifier, ak sa nachádza v URL."
avoid = "Čo Radšej Neposielať"
avoid_text = "Email-shaped identifiers sa prijímajú kvôli compatibility, ale URLs sa môžu objaviť v infrastructure logs. Posielajte stable internal id alebo one-way application hash, ak sa chcete vyhnúť personal data v request URL."
repository = "Repository A Crate"
repository_text = "Implementation môžete skontrolovať v public API repository a reusable avatar renderer v Rust crate."
translations = "Poznámka k prekladom"
translations_text = "Preklady webu sú podporené AI a vytvorené podľa najlepšej snahy. Ak uvidíte formuláciu, ktorú treba zlepšiť, príspevky na GitHube sú vítané."
translations_link = "Vylepšiť preklady"
