namespace_support = "Поддержка namespace"
namespace_text = "Используйте tenant и style_version, чтобы разделять визуальные пространства идентичности между продуктами или rollout phases."
anonymous_ids = "Анонимные ID"
anonymous_text = "Отправляйте стабильный внутренний id или односторонний application hash вместо сырых персональных данных."
rate_limits = "Rate limits"
rate_limits_text = "Публичный сервис применяет origin-side rate limits, с более строгими лимитами для /v1/avatar/link, direct avatar requests с persist=true и /og.png, потому что object storage writes и Open Graph rendering дороже прямого rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar generation и storage operations ограничены server-side timeouts, чтобы дорогие requests не могли бесконечно занимать origin."
