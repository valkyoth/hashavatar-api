[pages.terms]
title = "ข้อกำหนด"
description = "ข้อกำหนดบริการแบบ best-effort สำหรับ API อวาตาร์สาธารณะและเว็บไซต์ demo ของ hashavatar.app"
eyebrow = "ข้อกำหนดบริการ"
lead = "บริการสาธารณะนี้ให้ไว้เพื่อข้อมูลและแบบ best-effort ใช้เฉพาะเมื่อระดับความเสี่ยงนี้เหมาะกับแอปพลิเคชันของคุณ"
no_warranty = "ไม่มีการรับประกัน"
no_warranty_text = "บริการนี้และผลลัพธ์ที่สร้างทั้งหมดให้ตามสภาพและตามความพร้อมใช้งาน โดยไม่มีการรับประกันใด ๆ ทั้งโดยชัดแจ้งหรือโดยนัย เราไม่รับประกันความพร้อมใช้งาน ความถูกต้อง ความเหมาะสมต่อวัตถุประสงค์เฉพาะ การทำงานต่อเนื่อง หรือความเข้ากันได้กับระบบของคุณ"
no_liability = "ไม่มีความรับผิด"
no_liability_text = "เราไม่รับผิดชอบต่อ downtime, outage, ประสิทธิภาพลดลง, ลิงก์เสีย, พฤติกรรม cache, การสูญหายของข้อมูล, object เสียหาย, ความล้มเหลวของผู้ให้บริการภายนอก หรือความเสียหายโดยตรงหรือโดยอ้อมจากการใช้บริการ"
fallback_text = "หากคุณพึ่งพาอวาตาร์เหล่านี้ใน production คุณควรทำ fallback, กลยุทธ์ cache และแผนความพร้อมใช้งานของคุณเอง"
acceptable_use = "การใช้งานที่ยอมรับได้"
acceptable_use_text = "อย่าใช้บริการเพื่อทำให้โครงสร้างพื้นฐานทำงานเกินกำลัง หลีกเลี่ยง rate limit หรือการควบคุม cache ทดสอบรูปแบบ traffic ที่เป็นการละเมิด หรือเก็บเนื้อหาผิดกฎหมายผ่านฟีเจอร์ persistence"
changes = "การเปลี่ยนแปลง"
changes_text = "เราอาจเปลี่ยน จำกัด ระงับ หรือยุติบริการสาธารณะได้ทุกเมื่อโดยไม่ต้องแจ้งล่วงหน้า Endpoint สาธารณะ รายละเอียดผลลัพธ์ หรือขีดจำกัดด้านปฏิบัติการอาจเปลี่ยนเมื่อบริการพัฒนา"
legal_note = "หน้านี้เป็นแนวทางปฏิบัติการ ไม่ใช่คำแนะนำทางกฎหมาย หากต้องการข้อกำหนดทางกฎหมายอย่างเป็นทางการสำหรับ deployment ทางธุรกิจ ให้เผยแพร่ฉบับที่ผ่านการตรวจสอบสำหรับเขตอำนาจและหน่วยงานผู้ดำเนินการของคุณ"

[pages.privacy]
title = "ความเป็นส่วนตัว"
description = "ประกาศความเป็นส่วนตัวของ hashavatar.app เกี่ยวกับข้อมูล request, logs และพฤติกรรม object storage แบบเลือกได้"
