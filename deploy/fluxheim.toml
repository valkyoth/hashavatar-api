[server]
listen = ["0.0.0.0:8080"]
tls_listen = ["0.0.0.0:8443"]
default_vhost = "hashavatar.app"
trusted_proxies = []

[server.process]
daemon = false
pid_file = "/run/fluxheim/fluxheim.pid"
upgrade_sock = "/run/fluxheim/fluxheim-upgrade.sock"
grace_period_seconds = 2
graceful_shutdown_timeout_seconds = 5

[server.https_redirect]
enabled = true
status = 308
target_port = 443

[server.limits]
max_request_header_bytes = "64KiB"
max_uri_bytes = "8KiB"
max_request_headers = 100
max_request_body_bytes = "16MiB"

[logging]
level = "info"
format = "json"
target = "stderr"

[logging.file]
enabled = false
append = true

[logging.access]
enabled = true
include_host = true
include_path = true
request_id = true
request_id_header = "x-request-id"

[headers.request]
enabled = true
strip_inbound_client_ip_headers = true
x_forwarded_for = "replace"
x_real_ip = true
x_forwarded_host = true
x_forwarded_proto = true
forwarded = false
remove = ["x-powered-by"]

[headers.request.add]
x-proxy-by = "Fluxheim"
x-forwarded-host = "{host}"

[headers.request.append]
via = "fluxheim"

[headers.response]
enabled = true
x_content_type_options = "nosniff"
x_frame_options = "DENY"
referrer_policy = "no-referrer"
remove = ["x-powered-by"]

[headers.response.append]
vary = ["Accept-Encoding"]

[tls]
enabled = true
backend = "rustls"

[[tls.certificates]]
cert_path = "/etc/fluxheim/tls/hashavatar.app/fullchain.pem"
key_path = "/etc/fluxheim/tls/hashavatar.app/privkey.pem"

[cache]
enabled = false
image_extensions = ["avif", "gif", "jpeg", "jpg", "png", "svg", "webp"]
methods = ["GET", "HEAD"]
max_object_bytes = "32MiB"

[cache.memory]
enabled = false
max_size_bytes = "1GiB"

[cache.disk]
enabled = false
max_size_bytes = "10GiB"

[[vhosts]]
name = "www.hashavatar.app"
hosts = ["www.hashavatar.app"]

[vhosts.tls]
enabled = true

[vhosts.tls.certificate]
cert_path = "/etc/fluxheim/tls/hashavatar.app/fullchain.pem"
key_path = "/etc/fluxheim/tls/hashavatar.app/privkey.pem"

[vhosts.redirect]
enabled = true
to = "https://hashavatar.app{uri}"
status = 308

[[vhosts]]
name = "hashavatar.app"
hosts = ["hashavatar.app"]

[vhosts.tls]
enabled = true

[vhosts.tls.certificate]
cert_path = "/etc/fluxheim/tls/hashavatar.app/fullchain.pem"
key_path = "/etc/fluxheim/tls/hashavatar.app/privkey.pem"

[vhosts.proxy]
upstreams = ["hashavatar:8080"]
upstream_tls = false
connect_timeout_secs = 5
read_timeout_secs = 60
send_timeout_secs = 60
