[pages.help]
title = "Hjælp"
description = "Integrationsguide til brug af hashavatar.app avatar-API i webapps, frontends og backends."
eyebrow = "Integrationsguide"
lead = "Brug hashavatar.app direkte fra browseren, din frontend eller din backend. Hver avatar-URL er deterministisk, så samme identifikator og indstillinger giver altid samme resultat."
basic_url = "Basis-URL"
basic_url_text = "Brug query-endpointet, når du vil have en simpel offentlig billed-URL."
path_style = "Path style URL"
path_style_text = "Brug path-formen, hvis du foretrækker renere embed-URL'er."
html_example = "HTML-eksempel"
javascript_example = "JavaScript-eksempel"
supported_parameters = "Understøttede parametre"
style_layer_note = "Tilbehørs- og udtrykslag gælder for karakterlignende familier. Objektfamilier som planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup og shield normaliseres til accessory=none og expression=default."
signed_storage_links = "Signerede lagerlinks"
signed_storage_links_text = "Hvis denne deployment har objektlager konfigureret, så anmod om et presigned lagerlink fra /v1/avatar/link. Endpointet gemmer det genererede objekt og returnerer JSON med signeret URL, objekt-key og hashed cache-key. Standard avatar-svar eksponerer ikke signed-link metadata i response headers."
open_source = "Open source"
open_source_text = "Kildekoden til det offentlige site ligger i API-repositoriet, og den genbrugelige avatar-renderer er publiceret på crates.io."

[pages.docs]
title = "Dokumentation"
description = "Referencedokumentation for hashavatar.app public avatar API, storage link endpoint og namespace-aware identity contract."
eyebrow = "API-reference"
lead = "Dette er den produktrettede reference for den offentlige API. Samme identitet, tenant, stilversion, avatarfamilie, stilindstillinger, størrelse og WebP-output er beregnet til at forblive stabile inden for en major-version."
core_endpoints = "Core endpoints"
operational_endpoints = "Operationelle endpoints"
operational_text = "GET /healthz er offentlig for load balancers og uptime checks. GET /metrics er loopback-only og returnerer 404 til ikke-lokale peers."
namespace_support = "Namespace-understøttelse"
namespace_text = "Brug tenant og style_version til at holde visuelle identitetsrum adskilt mellem produkter eller rollout-faser."
anonymous_ids = "Anonyme ID'er"
anonymous_text = "Send en stabil intern id eller en envejs application hash i stedet for rå persondata."
rate_limits = "Rate limits"
rate_limits_text = "Den offentlige service anvender origin-side rate limits, med strengere limits på /v1/avatar/link, direkte avatar-requests med persist=true og /og.png, fordi objektlager-skrivninger og Open Graph-rendering er dyrere end direkte rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar-generering og lageroperationer er begrænset af server-side timeouts, så dyre requests ikke kan monopolisere origin uendeligt."
