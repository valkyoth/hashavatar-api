[pages.terms]
title = "Kushtet"
description = "Best-effort service terms për public hashavatar.app avatar API dhe demo website."
eyebrow = "Service Terms"
lead = "Ky public service jepet për informacion dhe mbi best-effort basis. Përdore vetëm nëse ky risk profile i përshtatet application-it tënd."
no_warranty = "No Warranty"
no_warranty_text = "Ky service dhe të gjitha generated outputs jepen as-is dhe as-available, pa warranty. Nuk premtojmë availability, correctness, fitness for a particular purpose, uninterrupted operation ose compatibility with your systems."
no_liability = "No Liability"
no_liability_text = "Nuk mbajmë liability për downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures ose direct/indirect damages nga përdorimi i service."
fallback_text = "Nëse mbështetesh te këto avatars në production, duhet të implementosh fallback behavior, caching strategy dhe availability plan tënd."
acceptable_use = "Acceptable Use"
acceptable_use_text = "Mos e përdor service për të overload infrastructure, bypass rate limits ose cache controls, test abusive traffic patterns, ose store illegal material përmes persistence features."
changes = "Ndryshime"
changes_text = "Mund ta change, limit, suspend ose discontinue public service në çdo kohë pa notice. Public endpoints, output details ose operational limits mund të ndryshojnë ndërsa service evolve."
legal_note = "Kjo page është operational guidance, jo legal advice. Nëse të duhen formal legal terms për business deployment, publish një reviewed version të përshtatshëm për jurisdiction dhe operator entity tënd."

[pages.privacy]
title = "Privatësia"
description = "Privacy notice për hashavatar.app mbi request data, logs dhe optional object storage behavior."
eyebrow = "Privacy Notice"
lead = "Ky service është ndërtuar qëllimisht simple, por public avatar API ende merr disa request data për të funksionuar. Kjo page shpjegon atë practical baseline."
receives = "Çfarë Merr Service"
receives_identity = "opaque identifier që vendos në request, si internal id, username ose one-way hash"
receives_parameters = "request parameters si avatar type, style options, size, format dhe background"
receives_http_metadata = "standard HTTP metadata që trajtohet nga server, reverse proxy dhe CDN, si IP address, user agent, referrer dhe request timing"
stores = "Çfarë Store App"
stores_text = "Application nuk kërkon user accounts dhe nuk set application cookies by default. Në basic request flow, app generate avatar on demand dhe e return direkt."
storage_text = "Nëse object storage support është enabled dhe përdoret signed-link ose persistence route, generated avatar file dhe object key mund të store në configured S3-compatible bucket."
telemetry = "Privacy-Preserving Telemetry"
telemetry_text = "Nëse operator enable telemetry, app emit aggregate OpenTelemetry metrics për page views, visible page time, repository dhe crate clicks, demo actions dhe avatar generation counts grouped sipas bounded style choices si kind, background, accessory, color, expression, shape dhe size bucket."
telemetry_limits = "Telemetry nuk përmban raw identifiers, tenant ose style namespace values, IP addresses, user agents, referrers, full URLs, cookies ose free-form text. Telemetry endpoints pranojnë vetëm allow-listed aggregate labels."
logging = "Logs Dhe Infrastructure"
logging_text = "Sipas deployment, infrastructure components si nginx, Caddy, Cloudflare, hosting providers ose S3-compatible storage mund të store access logs dhe operational metadata. Këto logs janë pjesë e funksionimit të public service dhe mund të përmbajnë requested identifier nëse shfaqet në URL."
avoid = "Çfarë Është Më Mirë Të Mos Dërgohet"
avoid_text = "Email-shaped identifiers pranohen për compatibility, por URLs mund të shfaqen në infrastructure logs. Dërgo stable internal id ose one-way application hash nëse do të shmangësh personal data në request URL."
repository = "Repository Dhe Crate"
repository_text = "Mund të kontrollosh implementation në public GitHub repository dhe reusable avatar renderer në Rust crate."
translations = "Shënim për përkthimet"
translations_text = "Përkthimet e faqes janë të ndihmuara nga AI dhe të bëra me përpjekjen më të mirë. Nëse sheh formulime që duhen përmirësuar, kontributet në GitHub janë të mirëpritura."
translations_link = "Përmirëso përkthimet"
