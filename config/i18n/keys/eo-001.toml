javascript_example = "JavaScript-ekzemplo"
supported_parameters = "Subtenataj parametroj"
style_layer_note = "Akcesoraĵaj kaj mienaj tavoloj aplikiĝas al karakter-stilaj familioj. Objekt-stilaj familioj kiel planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup kaj shield estas normaligitaj al accessory=none kaj expression=default."
signed_storage_links = "Subskribitaj stokaj ligiloj"
signed_storage_links_text = "Se ĉi tiu deployment havas objektan stokadon agorditan, petu antaŭsubskribitan stokan ligilon de /v1/avatar/link. Tiu endpoint stokas la generitan objekton kaj redonas JSON kun la subskribita URL, objekta ŝlosilo kaj haŝita kaŝmemora ŝlosilo. Normaj avataraj respondoj ne malkaŝas subskribit-ligilan metadata en response headers."
open_source = "Malferma fonto"
open_source_text = "La fonto de la publika retejo troviĝas en la GitHub-deponejo kaj la reuzebla avatara renderilo estas publikigita ĉe crates.io."

