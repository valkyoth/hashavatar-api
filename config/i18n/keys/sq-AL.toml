title = "Dokumentim"
description = "Reference documentation për hashavatar.app public avatar API, storage link endpoint dhe namespace-aware identity contract."
eyebrow = "API Reference"
lead = "Ky është product-facing reference për public API. I njëjti identity, tenant, style version, avatar family, style options, size dhe WebP output pritet të mbeten stable gjatë major release."
