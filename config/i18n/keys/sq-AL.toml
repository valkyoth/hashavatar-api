anonymous_ids = "Anonymous IDs"
anonymous_text = "Dërgo internal stable id ose one-way application hash në vend të raw personal data."
rate_limits = "Rate Limits"
rate_limits_text = "Public service zbaton origin-side rate limits, me limits më të rrepta për /v1/avatar/link, direct avatar requests me persist=true dhe /og.png sepse object storage writes dhe Open Graph image rendering janë më të kushtueshme se direct rendering."
timeouts = "Timeouts"
