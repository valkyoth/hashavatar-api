[pages.privacy]
title = "தனியுரிமை"
description = "hashavatar.app request data, logs மற்றும் optional object storage behavior குறித்த privacy notice."
eyebrow = "Privacy notice"
lead = "Service எளிமையாக வைத்திருக்கப்பட்டுள்ளது, ஆனால் public avatar API இயங்க சில request data பெறுகிறது. இந்த page அந்த practical baseline-ஐ விளக்குகிறது."
receives = "Service பெறுவது"
receives_identity = "request-ல் நீங்கள் வைக்கும் opaque identifier, உதாரணமாக internal id, username, அல்லது one-way hash"
receives_parameters = "avatar type, style options, size, format, background போன்ற request parameters"
receives_http_metadata = "server, reverse proxy, CDN கையாளும் standard HTTP metadata, உதாரணமாக IP address, user agent, referrer, request timing"
stores = "App தானாக store செய்வது"
stores_text = "Application user accounts தேவைப்படாது மற்றும் default-ஆக application cookies set செய்யாது. Basic request flow-ல் avatar on demand generate செய்து direct return செய்கிறது."
storage_text = "Object storage support enabled இருந்து signed-link அல்லது persistence route பயன்படுத்தப்பட்டால், generated avatar file மற்றும் அதன் object key configured S3-compatible bucket-ல் store ஆகலாம்."
telemetry = "Privacy-preserving telemetry"
telemetry_text = "Operator telemetry enable செய்தால், app page views, visible page time, repository மற்றும் crate clicks, demo actions, மேலும் kind, background, accessory, color, expression, shape, size bucket போன்ற bounded style choices மூலம் grouped avatar generation counts-க்கு aggregate OpenTelemetry metrics emit செய்கிறது."
telemetry_limits = "Telemetry raw identifiers, tenant அல்லது style namespace values, IP addresses, user agents, referrers, full URLs, cookies, அல்லது free-form text include செய்யாது. Telemetry endpoints allow-listed aggregate labels மட்டும் accept செய்கிறது."
logging = "Logs மற்றும் infrastructure"
logging_text = "Deployment-ஐ பொறுத்து nginx, Caddy, Cloudflare, hosting providers, அல்லது S3-compatible storage போன்ற infrastructure components access logs மற்றும் operational metadata வைத்திருக்கலாம். இந்த logs public service இயக்கத்தின் ஒரு பகுதி; URL-ல் இருந்தால் requested identifier-ஐ கொண்டிருக்கலாம்."
avoid = "அனுப்பாமல் இருக்க வேண்டியது"
avoid_text = "Email-shaped identifiers compatibility-க்காக accepted, ஆனால் URLs infrastructure logs-ல் தோன்றலாம். Request URL-ல் personal data வைக்க தவிர்க்க stable internal id அல்லது one-way application hash அனுப்புங்கள்."
repository = "Repository மற்றும் crate"
