[pages.help]
title = "Hjelp"
description = "Integrasjonsguide for å bruke hashavatar.app-avatar-API-et i webapper, frontends og backends."
eyebrow = "Integrasjonsguide"
lead = "Bruk hashavatar.app direkte fra nettleseren, frontenden eller backenden din. Hver avatar-URL er deterministisk, så samme identifikator og alternativer gir alltid samme resultat."
basic_url = "Grunn-URL"
basic_url_text = "Bruk query-endepunktet når du vil ha en enkel offentlig bilde-URL."
path_style = "Sti-URL"
path_style_text = "Bruk sti-formen hvis du foretrekker renere innebyggings-URL-er."
html_example = "HTML-eksempel"
javascript_example = "JavaScript-eksempel"
supported_parameters = "Støttede parametere"
style_layer_note = "Tilbehørs- og uttrykkslag gjelder for karakterlignende familier. Objektfamilier som planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup og shield normaliseres til accessory=none og expression=default."
signed_storage_links = "Signerte lagringslenker"
signed_storage_links_text = "Hvis denne deploymenten har objektlagring konfigurert, kan du be om en forhåndssignert lagringslenke fra /v1/avatar/link. Det endepunktet lagrer det genererte objektet og returnerer JSON med signert URL, objektnøkkel og en hashet cache-nøkkel. Vanlige avatarsvar eksponerer ikke metadata for signerte lenker i svarheadere."
open_source = "Åpen kildekode"
open_source_text = "Kildekoden til det offentlige nettstedet ligger i API-repositoryet, og den gjenbrukbare avatar-rendereren publiseres på crates.io."

[pages.docs]
title = "Dokumentasjon"
description = "Referansedokumentasjon for det offentlige hashavatar.app-avatar-API-et, lagringslenke-endepunktet og den namespace-bevisste identitetskontrakten."
eyebrow = "API-referanse"
lead = "Dette er den produktrettede referansen for det offentlige API-et. Samme identitet, tenant, stilversjon, avatarfamilie, stilalternativer, størrelse og WebP-utdata er ment å være stabile innenfor en major-versjon."
core_endpoints = "Kjerne-endepunkter"
operational_endpoints = "Driftsendepunkter"
operational_text = "GET /healthz er offentlig for lastbalanserere og oppetidskontroller. GET /metrics er bare tilgjengelig via loopback og returnerer 404 for ikke-lokale peers."
namespace_support = "Namespace-støtte"
namespace_text = "Bruk tenant og style_version for å holde visuelle identitetsrom adskilt mellom produkter eller utrullingsfaser."
anonymous_ids = "Anonyme ID-er"
anonymous_text = "Send en stabil intern id eller en enveis applikasjonshash i stedet for rå persondata."
rate_limits = "Rate limits"
rate_limits_text = "Den offentlige tjenesten bruker origin-side rate limits, med strengere grenser for /v1/avatar/link, direkte avatarforespørsler med persist=true og /og.png fordi objektlagringsskrivinger og Open Graph-rendering er dyrere enn direkte rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar-generering og lagringsoperasjoner begrenses av serverbaserte timeouts, slik at dyre forespørsler ikke kan monopolisere origin-serveren ubegrenset."
errors = "Feil"
error_bad_request = "ugyldig kind-verdi, algoritme eller format som ikke støttes, størrelse eller manglende identitet"
error_timeout = "timeout ved generering eller lagring"
error_rate_limit = "rate limit overskredet"
error_internal = "renderings- eller lagringsfeil"
openapi = "OpenAPI"
