[pages.help]
title = "Hjälp"
description = "Integrationsguide för att använda hashavatar.app-avatar-API:t i webbappar, frontends och backends."
eyebrow = "Integrationsguide"
lead = "Använd hashavatar.app direkt från webbläsaren, din frontend eller din backend. Varje avatar-URL är deterministisk, så samma identifierare och alternativ ger alltid samma resultat."
basic_url = "Grund-URL"
basic_url_text = "Använd query-endpointen när du vill ha en enkel offentlig bild-URL."
path_style = "Sökvägs-URL"
path_style_text = "Använd sökvägsformen om du föredrar renare inbäddnings-URL:er."
html_example = "HTML-exempel"
javascript_example = "JavaScript-exempel"
supported_parameters = "Parametrar som stöds"
style_layer_note = "Tillbehörs- och uttryckslager gäller för karaktärsliknande familjer. Objektfamiljer som planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup och shield normaliseras till accessory=none och expression=default."
signed_storage_links = "Signerade lagringslänkar"
signed_storage_links_text = "Om denna deployment har objektlagring konfigurerad, begär en försignerad lagringslänk från /v1/avatar/link. Den endpointen lagrar det genererade objektet och returnerar JSON med signerad URL, objektnyckel och en hashad cachenyckel. Vanliga avatarsvar exponerar inte metadata för signerade länkar i svarshuvuden."
open_source = "Öppen källkod"
open_source_text = "Den offentliga webbplatsens källkod finns i GitHub-repositoryt och den återanvändbara avatar-renderaren publiceras på crates.io."

[pages.docs]
title = "Dokumentation"
description = "Referensdokumentation för det offentliga hashavatar.app-avatar-API:t, lagringslänk-endpointen och det namespace-medvetna identitetskontraktet."
eyebrow = "API-referens"
lead = "Detta är den produktnära referensen för det offentliga API:t. Samma identitet, tenant, stilversion, avatarfamilj, stilalternativ, storlek och WebP-utdata är avsedda att vara stabila inom en major-version."
core_endpoints = "Kärn-endpoints"
operational_endpoints = "Drift-endpoints"
operational_text = "GET /healthz är offentlig för lastbalanserare och tillgänglighetskontroller. GET /metrics är endast tillgänglig via loopback och returnerar 404 för icke-lokala peers."
namespace_support = "Namespace-stöd"
namespace_text = "Använd tenant och style_version för att hålla visuella identitetsutrymmen separata mellan produkter eller utrullningsfaser."
anonymous_ids = "Anonyma ID:n"
anonymous_text = "Skicka ett stabilt internt id eller en envägs-applikationshash i stället för råa personuppgifter."
rate_limits = "Hastighetsgränser"
rate_limits_text = "Den offentliga tjänsten använder origin-baserade hastighetsgränser, med striktare gränser för /v1/avatar/link, direkta avatarförfrågningar med persist=true och /og.png eftersom objektlagringsskrivningar och Open Graph-rendering är dyrare än direkt rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar-generering och lagringsoperationer begränsas av serverbaserade timeouts så att dyra förfrågningar inte kan monopolisera origin-servern obegränsat."
errors = "Fel"
error_bad_request = "ogiltigt kind-värde, algoritm eller format som inte stöds, storlek eller saknad identitet"
error_timeout = "timeout vid generering eller lagring"
error_rate_limit = "hastighetsgränsen överskreds"
error_internal = "renderings- eller lagringsfel"
openapi = "OpenAPI"
