no_liability = "Inget ansvar"
no_liability_text = "Vi ansvarar inte för driftstopp, avbrott, försämrad prestanda, trasiga länkar, cachebeteende, dataförlust, korrupta objekt, fel hos tredjepartsleverantörer eller direkta eller indirekta skador som uppstår genom din användning av tjänsten."
fallback_text = "Om du är beroende av dessa avatarer i produktion bör du implementera eget fallback-beteende, en cache-strategi och en tillgänglighetsplan."
acceptable_use = "Godtagbar användning"
acceptable_use_text = "Använd inte tjänsten för att överbelasta infrastrukturen, kringgå hastighetsgränser eller cachekontroller, testa missbrukande trafikmönster eller lagra olagligt material via någon persistensfunktion."
changes = "Ändringar"
changes_text = "Vi kan ändra, begränsa, pausa eller avsluta den offentliga tjänsten när som helst och utan förvarning. Offentliga endpoints, utdatasdetaljer eller driftsgränser kan ändras när tjänsten utvecklas."
legal_note = "Denna sida är operativ vägledning, inte juridisk rådgivning. Om du behöver formella juridiska villkor för en affärsdeployment bör du publicera en granskad version som är specifik för din jurisdiktion och operatörsenhet."

[pages.privacy]
title = "Integritet"
description = "Integritetsmeddelande för hashavatar.app som täcker förfrågningsdata, loggar och valfritt objektlagringsbeteende."
eyebrow = "Integritetsmeddelande"
lead = "Tjänsten är avsiktligt enkel, men ett offentligt avatar-API tar ändå emot viss förfrågningsdata för att fungera. Den här sidan beskriver den praktiska baslinjen."
receives = "Vad tjänsten tar emot"
receives_identity = "den opaka identifierare du lägger i förfrågan, till exempel ett internt id, användarnamn eller envägs-hash"
receives_parameters = "förfrågningsparametrar som avatartyp, stilalternativ, storlek, format och bakgrund"
receives_http_metadata = "standardiserad HTTP-metadata som hanteras av servern, reverse proxyn och CDN:et, till exempel IP-adress, user agent, referrer och förfrågningstid"
stores = "Vad appen själv lagrar"
stores_text = "Applikationen kräver inga användarkonton och sätter som standard inga applikationscookies. I det grundläggande förfrågningsflödet genererar den avataren vid behov och returnerar den direkt."
storage_text = "Om objektlagringsstöd är aktiverat och en signerad länk- eller persistensroute används kan den genererade avatarfilen och dess objektnyckel lagras i den konfigurerade S3-kompatibla bucketen."
telemetry = "Integritetsvänlig telemetri"
telemetry_text = "Om telemetri är aktiverat av operatören skickar appen aggregerade OpenTelemetry-mätvärden för sidvisningar, synlig sidtid, klick till repository och crate, demoåtgärder och avatar-genereringar grupperade efter begränsade stilval som kind, background, accessory, color, expression, shape och storleksbucket."
telemetry_limits = "Telemetri inkluderar inte råa identifierare, tenant- eller style namespace-värden, IP-adresser, user agents, referrers, fullständiga URL:er, cookies eller fritext. Telemetri-endpoints accepterar bara tillåtna aggregerade labels."
logging = "Loggar och infrastruktur"
logging_text = "Beroende på deployment kan infrastrukturkomponenter som nginx, Caddy, Cloudflare, hosting-leverantörer eller S3-kompatibel lagring spara åtkomstloggar och driftmetadata. Dessa loggar är en del av att driva en offentlig tjänst och kan innehålla identifieraren du begärde om den finns i URL:en."
avoid = "Vad du bör undvika att skicka"
avoid_text = "E-postliknande identifierare accepteras för kompatibilitet, men URL:er kan förekomma i infrastrukturloggar. Skicka ett stabilt internt id eller en envägs-applikationshash när du vill undvika att placera persondata i förfrågnings-URL:en."
repository = "Repository och crate"
repository_text = "Du kan granska implementationen i det offentliga GitHub-repositoryt och den återanvändbara avatar-renderaren i Rust-craten."
translations = "Översättningsnotis"
translations_text = "Webbplatsens översättningar är AI-assisterade och gjorda efter bästa förmåga. Om du ser formuleringar som bör förbättras är bidrag välkomna på GitHub."
translations_link = "Förbättra översättningar"
