signed_storage_links = "簽署儲存連結"
signed_storage_links_text = "如果此部署已設定物件儲存，可以從 /v1/avatar/link 要求預簽署儲存連結。該端點會儲存產生的物件，並回傳包含簽署 URL、物件鍵和雜湊快取鍵的 JSON。標準頭像回應不會在回應標頭暴露簽署連結中繼資料。"
