[pages.help]
title = "Помоћ"
description = "Водич за интеграцију hashavatar.app avatar API у web apps, frontends и backends."
eyebrow = "Водич За Интеграцију"
lead = "Користите hashavatar.app директно из прегледача, frontend-а или backend-а. Сваки avatar URL је детерминистички, па исти идентификатор и опције увек дају исти резултат."
basic_url = "Основни URL"
basic_url_text = "Користите query endpoint када желите једноставан јавни image URL."
path_style = "Path Style URL"
path_style_text = "Користите path форму ако више волите чистије embed URLs."
html_example = "HTML Пример"
javascript_example = "JavaScript Пример"
supported_parameters = "Подржани Параметри"
style_layer_note = "Accessory и expression layers примењују се на character-style families. Object-style families као planet, rocket, paws, mushroom, cactus, cupcake, pizza, icecream, diamond, coffee-cup и shield нормализују се на accessory=none и expression=default."
signed_storage_links = "Потписани Storage Линкови"
signed_storage_links_text = "Ако овај deployment има object storage, затражите presigned storage link од /v1/avatar/link. Тај endpoint чува generated object и враћа JSON са signed URL, object key и hashed cache key. Стандардни avatar responses не излажу signed-link metadata у response headers."
open_source = "Open Source"
open_source_text = "Извор јавног сајта налази се у GitHub repository, а reusable avatar renderer је објављен на crates.io."

[pages.docs]
title = "Документација"
description = "Reference documentation за hashavatar.app public avatar API, storage link endpoint и namespace-aware identity contract."
eyebrow = "API Reference"
lead = "Ово је product-facing reference за public API. Исти identity, tenant, style version, avatar family, style options, size и WebP output намењени су стабилности у оквиру major release."
core_endpoints = "Core Endpoints"
operational_endpoints = "Оперативни Endpoint-и"
operational_text = "GET /healthz је public за load balancers и uptime checks. GET /metrics је loopback-only и враћа 404 за non-local peers."
namespace_support = "Namespace Подршка"
namespace_text = "Користите tenant и style_version да одвојите visual identity spaces између производа или rollout phases."
anonymous_ids = "Анонимни ID-јеви"
anonymous_text = "Пошаљите internal stable id или one-way application hash уместо raw personal data."
rate_limits = "Rate Limits"
rate_limits_text = "Public service примењује origin-side rate limits, са строжим лимитима за /v1/avatar/link, direct avatar requests са persist=true и /og.png, јер су object storage writes и Open Graph image rendering скупљи од direct rendering."
timeouts = "Timeouts"
timeouts_text = "Avatar generation и storage operations ограничени су server-side timeouts како скупи захтеви не би могли бесконачно да монополизују origin."
errors = "Грешке"
error_bad_request = "неважећи kind, unsupported algorithm или format, size или missing identity"
error_timeout = "generation или storage timeout"
error_rate_limit = "rate limit exceeded"
error_internal = "rendering или storage failure"
openapi = "OpenAPI"
openapi_text = "За generated clients или tooling користите"

[pages.terms]
title = "Услови"
description = "Best-effort service terms за public hashavatar.app avatar API и demo website."
eyebrow = "Услови Услуге"
lead = "Ова public service се пружа у информативне сврхе и на best-effort основи. Користите је само ако тај risk profile одговара вашој апликацији."
no_warranty = "Без Гаранције"
no_warranty_text = "Ова услуга и сви generated outputs пружају се as-is и as-available, без гаранција било које врсте. Не обећавамо availability, correctness, fitness for a particular purpose, uninterrupted operation или compatibility with your systems."
no_liability = "Без Одговорности"
no_liability_text = "Не одговарамо за downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures или директне или индиректне damages настале коришћењем услуге."
fallback_text = "Ако зависите од ових аватара у production, требало би да имплементирате сопствени fallback behavior, caching strategy и availability plan."
acceptable_use = "Прихватљива Употреба"
acceptable_use_text = "Не користите услугу за преоптерећење infrastructure, заобилажење rate limits или cache controls, тестирање abusive traffic patterns или складиштење illegal material преко persistence features."
changes = "Промене"
changes_text = "Можемо променити, ограничити, паузирати или прекинути public service у било ком тренутку без обавештења. Public endpoints, output details или operational limits могу се мењати како се услуга развија."
legal_note = "Ова страница је operational guidance, не legal advice. Ако су вам потребни formal legal terms за business deployment, објавите reviewed version за вашу jurisdiction и operator entity."

[pages.privacy]
title = "Приватност"
description = "Privacy notice за hashavatar.app о request data, logs и optional object storage behavior."
eyebrow = "Обавештење О Приватности"
lead = "Услуга је намерно једноставна, али public avatar API ипак прима неке request data да би функционисао. Ова страница описује практични baseline."
receives = "Шта Услуга Прима"
receives_identity = "opaque identifier који стављате у request, као internal id, username или one-way hash"
receives_parameters = "request parameters као avatar type, style options, size, format и background"
receives_http_metadata = "standard HTTP metadata које обрађују server, reverse proxy и CDN, као IP address, user agent, referrer и request timing"
stores = "Шта Сама Апликација Чува"
stores_text = "Апликација не захтева user accounts и подразумевано не поставља application cookies. У basic request flow генерише avatar on demand и враћа га директно."
storage_text = "Ако је object storage support омогућен и користи се signed-link или persistence route, generated avatar file и object key могу бити сачувани у конфигурисаном S3-compatible bucket."
telemetry = "Телеметрија Која Чува Приватност"
telemetry_text = "Ако operator омогући telemetry, апликација шаље aggregate OpenTelemetry metrics за page views, visible page time, repository и crate clicks, demo actions и avatar generation counts груписане по bounded style choices као kind, background, accessory, color, expression, shape и size bucket."
telemetry_limits = "Telemetry не укључује raw identifiers, tenant или style namespace values, IP addresses, user agents, referrers, full URLs, cookies или free-form text. Telemetry endpoints прихватају само allow-listed aggregate labels."
logging = "Логови И Инфраструктура"
logging_text = "У зависности од deployment, infrastructure components као nginx, Caddy, Cloudflare, hosting providers или S3-compatible storage могу чувати access logs и operational metadata. Ти logs су део рада public service и могу садржати requested identifier ако је у URL-у."
avoid = "Шта Избегавати Да Шаљете"
avoid_text = "Email-shaped identifiers прихватају се због compatibility, али URLs могу да се појаве у infrastructure logs. Пошаљите stable internal id или one-way application hash ако желите да избегнете personal data у request URL."
repository = "Repository И Crate"
repository_text = "Implementation можете прегледати у public GitHub repository и reusable avatar renderer у Rust crate."
translations = "Напомена о преводима"
translations_text = "Преводи сајта су потпомогнути вештачком интелигенцијом и урађени по најбољем труду. Ако видите текст који треба побољшати, доприноси на GitHub-у су добродошли."
translations_link = "Побољшај преводе"
