[pages.terms]
title = "Noteikumi"
description = "Best-effort service terms hashavatar.app public avatar API un demo website."
eyebrow = "Servisa Noteikumi"
lead = "Šis public service tiek sniegts informatīvi un pēc best-effort principa. Izmantojiet to tikai tad, ja šāds riska profils der jūsu lietotnei."
no_warranty = "Bez Garantijas"
no_warranty_text = "Šis serviss un visi generated outputs tiek sniegti as-is un as-available, bez jebkādām tiešām vai netiešām garantijām. Mēs nesolām availability, correctness, fitness for a particular purpose, uninterrupted operation vai compatibility with your systems."
no_liability = "Bez Atbildības"
no_liability_text = "Mēs neatbildam par downtime, outages, degraded performance, broken links, cache behavior, lost data, corrupted objects, third-party provider failures vai jebkādiem tiešiem vai netiešiem damages, kas rodas no servisa lietošanas."
fallback_text = "Ja production vidē paļaujaties uz šiem avatariem, ieviesiet savu fallback behavior, caching strategy un availability plan."
acceptable_use = "Pieņemama Lietošana"
acceptable_use_text = "Neizmantojiet servisu, lai pārslogotu infrastructure, apietu rate limits vai cache controls, testētu abusive traffic patterns vai glabātu illegal material caur persistence features."
changes = "Izmaiņas"
changes_text = "Mēs varam jebkurā laikā un bez paziņojuma mainīt, ierobežot, apturēt vai pārtraukt public service. Public endpoints, output details vai operational limits var mainīties, servisam attīstoties."
legal_note = "Šī lapa ir operational guidance, nevis legal advice. Ja business deployment vajadzīgi formal legal terms, publicējiet reviewed version jūsu jurisdiction un operator entity."

[pages.privacy]
title = "Privātums"
description = "hashavatar.app privacy notice par request data, logs un optional object storage behavior."
eyebrow = "Privātuma Paziņojums"
lead = "Serviss apzināti ir vienkāršs, bet public avatar API darbībai tomēr saņem daļu request data. Šī lapa apraksta praktisko baseline."
receives = "Ko Serviss Saņem"
receives_identity = "opaque identifier, ko ievietojat request, piemēram, internal id, username vai one-way hash"
receives_parameters = "request parameters, piemēram, avatar type, style options, size, format un background"
receives_http_metadata = "standard HTTP metadata, ko apstrādā serveris, reverse proxy un CDN, piemēram, IP address, user agent, referrer un request timing"
stores = "Ko Glabā Pati Lietotne"
stores_text = "Lietotne neprasa user accounts un pēc noklusējuma neiestata application cookies. Basic request flow tā ģenerē avataru on demand un atgriež tieši."
storage_text = "Ja object storage support ir ieslēgts un tiek izmantots signed-link vai persistence route, generated avatar file un object key var tikt glabāti konfigurētā S3-compatible bucket."
telemetry = "Privātumu Saudzējoša Telemetrija"
telemetry_text = "Ja operator ieslēdz telemetry, lietotne sūta aggregate OpenTelemetry metrics par page views, visible page time, repository un crate clicks, demo actions un avatar generation counts, kas grupēti pēc bounded style choices, piemēram, kind, background, accessory, color, expression, shape un size bucket."
telemetry_limits = "Telemetry neietver raw identifiers, tenant vai style namespace values, IP addresses, user agents, referrers, full URLs, cookies vai free-form text. Telemetry endpoints pieņem tikai allow-listed aggregate labels."
logging = "Žurnāli un Infrastruktūra"
logging_text = "Atkarībā no deployment, infrastructure components, piemēram, nginx, Caddy, Cloudflare, hosting providers vai S3-compatible storage, var glabāt access logs un operational metadata. Šie logs ir daļa no public service darbības un var saturēt requested identifier, ja tas ir URL."
avoid = "Ko Labāk Nesūtīt"
avoid_text = "Email-shaped identifiers tiek pieņemti compatibility dēļ, bet URLs var parādīties infrastructure logs. Sūtiet stable internal id vai one-way application hash, ja vēlaties izvairīties no personal data request URL."
repository = "Repozitorijs un Crate"
repository_text = "Implementation varat apskatīt public GitHub repository, bet reusable avatar renderer - Rust crate."
translations = "Piezīme par tulkojumiem"
translations_text = "Vietnes tulkojumi ir veidoti ar MI palīdzību un pēc labākās iespējas. Ja redzi tekstu, ko vajadzētu uzlabot, ieguldījumi GitHub ir gaidīti."
